<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bon de commande — VESTA</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f2efe8;--card:#fff;--border:#ddd9cf;--text:#1c1c18;--muted:#8a8880;--accent:#1e1e1a;--green:#1D9E75;--radius:14px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:var(--sans);color:var(--text);min-height:100vh;}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;}
.spinner{width:32px;height:32px;border:2px solid rgba(0,0,0,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-msg{font-size:13px;color:var(--muted);font-family:var(--mono);}

/* HEADER */
.hdr{background:var(--accent);color:#f2efe8;padding:20px 24px 18px;}
.hdr-brand{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;}
.hdr-name{font-size:18px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
.hdr-sub{font-family:var(--mono);font-size:10px;color:#88887f;}
.hdr-doc{font-size:13px;color:rgba(255,255,255,0.5);margin-top:6px;}
.print-btn{float:right;padding:6px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:#f2efe8;cursor:pointer;font-size:12px;font-family:var(--sans);}
.print-btn:hover{background:rgba(255,255,255,0.18);}

/* CONTENT */
.content{max-width:760px;margin:0 auto;padding:24px 20px 40px;}

/* INFO BLOCKS */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.info-block{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px 16px;}
.info-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);margin-bottom:5px;}
.info-val{font-size:14px;font-weight:600;}
.info-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.info-date{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;}

/* TABLE */
.table-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;}
.bc-table{width:100%;border-collapse:collapse;}
.bc-table th{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:var(--mono);padding:10px 14px;border-bottom:2px solid var(--border);text-align:left;background:#faf9f6;}
.bc-table th:last-child{text-align:right;}
.bc-table td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.bc-table td:last-child{text-align:right;font-family:var(--mono);font-weight:500;}
.bc-table tr:last-child td{border-bottom:none;}
.bc-table tr.done td{color:#bbb;}
.bc-table tr.done .task-name{text-decoration:line-through;}
.status-badge{font-size:10px;padding:2px 7px;border-radius:5px;font-family:var(--mono);font-weight:500;}
.status-done{background:#E1F5EE;color:#0F6E56;}
.status-todo{background:#f2efe8;color:#8a8880;}
.duree-cell{font-size:11px;color:var(--muted);font-family:var(--mono);}

/* TOTAL */
.total-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.total-label{font-size:13px;color:var(--muted);}
.total-val{font-size:22px;font-weight:600;font-family:var(--mono);}
.total-tva{font-size:11px;color:var(--muted);margin-top:2px;text-align:right;}

/* FOOTER */
.bc-footer{text-align:center;margin-top:32px;font-size:11px;color:var(--muted);font-family:var(--mono);}

/* ERROR */
.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;padding:24px;text-align:center;}
.error-icon{font-size:40px;}
.error-title{font-size:18px;font-weight:600;}
.error-msg{font-size:13px;color:var(--muted);max-width:340px;}

@media print{
  .print-btn{display:none!important;}
  body{background:#fff;}
  .hdr{background:#1e1e1a !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .table-wrap,.info-block,.total-wrap{break-inside:avoid;}
}
@media(max-width:520px){
  .info-grid{grid-template-columns:1fr;}
  .bc-table th:nth-child(3),.bc-table td:nth-child(3){display:none;}
}
</style>
</head>
<body>

<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="load-msg">Chargement du bon de commande...</div>
  </div>
</div>

<script>
const SUPA_URL = 'https://tnxpiymffegmadwkharl.supabase.co';
const SUPA_KEY = 'sb_publishable_JdPMrgKWvzF9PFpaq8CMAA_5RNFViKk';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

function fmtPrice(n) {
  if(!n && n!==0) return '—';
  return Number(n).toLocaleString('fr-FR',{minimumFractionDigits:2}) + ' €';
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
}

async function load() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if(!token) {
    showError('Lien invalide','Aucun bon de commande trouvé à cette adresse.');
    return;
  }

  try {
    const {data, error} = await db.from('bons_commande').select('*').eq('token', token).single();
    if(error || !data) { showError('Bon de commande introuvable','Ce lien est invalide ou expiré.'); return; }
    renderBC(data);
  } catch(e) {
    showError('Erreur de connexion', e.message);
  }
}

function renderBC(bc) {
  const lignes = bc.lignes || [];
  const total = lignes.reduce((s,l) => s + (l.prix||0), 0);
  const doneLignes = lignes.filter(l=>l.done).length;
  const dateCreation = fmtDate(bc.created_at);

  const html = `
    <div class="hdr">
      <button class="print-btn" onclick="window.print()">&#128438; Imprimer</button>
      <div class="hdr-brand"><div class="hdr-name">VESTA</div><div class="hdr-sub">Suivi de chantier</div></div>
      <div class="hdr-doc">Bon de commande</div>
    </div>
    <div class="content">

      <div class="info-grid">
        <div class="info-block">
          <div class="info-label">Chantier</div>
          <div class="info-val">${esc(bc.chantier_nom)}</div>
          ${bc.chantier_addr?`<div class="info-sub">${esc(bc.chantier_addr)}</div>`:''}
        </div>
        <div class="info-block">
          <div class="info-label">Intervenant</div>
          <div class="info-val">${esc(bc.intervenant_nom)}</div>
          <div class="info-date">Emis le ${dateCreation}</div>
        </div>
      </div>

      <div class="table-wrap">
        <table class="bc-table">
          <thead>
            <tr>
              <th style="width:50%">Prestation</th>
              <th>Statut</th>
              <th>Duree</th>
              <th>Prix HT</th>
            </tr>
          </thead>
          <tbody>
            ${lignes.map(l => `
              <tr class="${l.done?'done':''}">
                <td><span class="task-name">${esc(l.texte)}</span></td>
                <td><span class="status-badge ${l.done?'status-done':'status-todo'}">${l.done?'Terminé':'En cours'}</span></td>
                <td class="duree-cell">${l.duree?l.duree+'&nbsp;j':'—'}</td>
                <td>${fmtPrice(l.prix)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <div class="total-wrap">
        <div>
          <div class="total-label">Total HT</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${doneLignes}/${lignes.length} prestations terminées</div>
        </div>
        <div>
          <div class="total-val">${fmtPrice(total)}</div>
          <div class="total-tva">TVA selon conditions</div>
        </div>
      </div>

      <div class="bc-footer">
        Document généré via VESTA — support-lch.com
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
}

function showError(title, msg) {
  document.getElementById('app').innerHTML = `
    <div class="error-state">
      <div class="error-icon">&#128196;</div>
      <div class="error-title">${esc(title)}</div>
      <div class="error-msg">${esc(msg)}</div>
    </div>`;
}

function esc(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
