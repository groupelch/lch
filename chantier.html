/* ── Bons de commande : vue liste avec total + cumul ──────────── */
function bcTotal(b, allTaches){
  const tIds=(b.bons_taches||[]).map(x=>x.tache_id);
  const tTotal=allTaches.filter(t=>tIds.includes(t.id)).reduce((s,t)=>{const p=getTachePrix(t.id);return s+(Number(p.revient)||0);},0);
  const lignes=getBCLines(b.id);
  const lTotal=lignes.reduce((s,l)=>s+(Number(l.prixRevient)||0)*(Number(l.qte)||1),0);
  return tTotal+lTotal;
}
function BonsListView({bons,chantiers,artisans,allTaches,loading,onNew,onRefresh,notify}){
  const [filter,setFilter]=useState('all');
  const totals=bons.map(b=>({b,total:bcTotal(b,allTaches)}));
  const grand=totals.reduce((s,x)=>s+x.total,0);
  const byArtisan={};artisans.forEach(a=>{byArtisan[a.id]=0;});
  totals.forEach(({b,total})=>{if(byArtisan[b.intervenant_id]!==undefined)byArtisan[b.intervenant_id]+=total;});
  const filtered=filter==='all'?totals:totals.filter(x=>x.b.intervenant_id===filter);
  const filteredTotal=filtered.reduce((s,x)=>s+x.total,0);
  const sendMail=(b)=>{
    const ar=artisans.find(a=>a.id===b.intervenant_id);if(!ar)return;
    const ch=chantiers.find(c=>c.id===b.chantier_id);
    const lignes=getBCLines(b.id);const cfg=getBCConfig(b.id);
    const ent=getEntity();
    const tIds=(b.bons_taches||[]).map(x=>x.tache_id);
    const ts=allTaches.filter(t=>tIds.includes(t.id));
    let body=`Bonjour ${ar.nom.split(' ')[0]},\n\nVeuillez trouver ci-dessous le bon de commande ${b.num} pour le chantier ${ch?.nom||''}.\n\n`;
    if(ts.length){body+='=== PRESTATIONS ===\n';ts.forEach(t=>{const p=getTachePrix(t.id);body+=`• ${t.titre} (${t.section}) — ${t.duree}j${p.revient?` — ${fmtMoney(p.revient)}`:''}\n`;});}
    if(lignes.length){body+='\n=== LIGNES SUPPL. ===\n';lignes.forEach(l=>{body+=`• ${l.description} — ${l.qte} ${l.unite} — ${fmtMoney(l.prixRevient*(l.qte||1))}\n`;});}
    body+=`\n=== TOTAL : ${fmtMoney(bcTotal(b,allTaches))} ===\n`;
    if(b.date_butoir)body+=`\nDate butoir : ${fmtDate(b.date_butoir)}\n`;
    if(cfg.conditions)body+=`\nConditions : ${cfg.conditions}`;
    if(cfg.mode)body+=`\nMode paiement : ${cfg.mode}`;
    if(b.notes)body+=`\n\nNotes : ${b.notes}`;
    body+=`\n\nCordialement,\n${ent.nom||'Louis'}\n${ent.tel||''}`;
    const subject=`Bon de commande ${b.num} — ${ch?.nom||''}`;
    window.location.href=`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  };
  return <div style={{display:'flex',flexDirection:'column',gap:18,animation:'fadeIn .2s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2,margin:0}}>Commandes</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:'4px 0 0'}}>Bons de commande</h1></div><Btn variant="primary" onClick={onNew}>＋ Nouveau bon</Btn></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>
      <Card style={{padding:14}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1}}>Cumul (tous bons)</div><div style={{fontSize:22,fontWeight:800,color:C.accent,fontFamily:H,marginTop:4}}>{fmtMoney(grand)}</div></Card>
      <Card style={{padding:14}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1}}>Nombre de bons</div><div style={{fontSize:22,fontWeight:800,color:C.blue,fontFamily:H,marginTop:4}}>{bons.length}</div></Card>
      {filter!=='all'&&<Card style={{padding:14}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1}}>Sélection</div><div style={{fontSize:22,fontWeight:800,color:C.green,fontFamily:H,marginTop:4}}>{fmtMoney(filteredTotal)}</div></Card>}
    </div>
    {artisans.length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
      <button onClick={()=>setFilter('all')} style={{padding:'5px 13px',borderRadius:99,fontSize:12,fontWeight:600,cursor:'pointer',background:filter==='all'?C.accent:'transparent',color:filter==='all'?'#000':C.secondary,border:`1px solid ${filter==='all'?C.accent:C.border}`,fontFamily:F}}>Tous ({bons.length})</button>
      {artisans.filter(a=>byArtisan[a.id]>0).map(a=><button key={a.id} onClick={()=>setFilter(a.id)} style={{padding:'5px 13px',borderRadius:99,fontSize:12,fontWeight:600,cursor:'pointer',background:filter===a.id?`${a.color}22`:'transparent',color:filter===a.id?a.color:C.secondary,border:`1px solid ${filter===a.id?a.color:C.border}`,fontFamily:F}}>{a.nom} · {fmtMoney(byArtisan[a.id])}</button>)}
    </div>}
    {loading?<div style={{padding:40,textAlign:'center'}}><Spinner/></div>:bons.length===0?<div style={{textAlign:'center',padding:'50px 20px',color:C.muted,fontFamily:F}}><div style={{fontSize:36,marginBottom:12}}>📋</div><Btn onClick={onNew} variant="primary">Créer un bon de commande</Btn></div>:
    <div style={{display:'flex',flexDirection:'column',gap:8}}>{filtered.map(({b,total})=>{const ar=artisans.find(a=>a.id===b.intervenant_id);const ch=chantiers.find(c=>c.id===b.chantier_id);const lignes=getBCLines(b.id);const nbT=(b.bons_taches?.length||0)+lignes.length;return <Card key={b.id} style={{padding:'14px 16px'}}><div style={{display:'flex',alignItems:'center',gap:14}}>{ar&&<Av code={ar.avatar} color={ar.color} size={36}/>}<div style={{flex:1}}><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H}}>{b.num}</div>{total>0&&<Badge label={fmtMoney(total)} color={C.accent}/>}</div><div style={{fontSize:12,color:C.secondary,fontFamily:F,marginTop:2}}>{ar?.nom} · {ch?.nom?.split('–')[0]?.trim()}</div><div style={{fontSize:11,color:C.muted,marginTop:2,fontFamily:F}}>{nbT} ligne{nbT>1?'s':''}{b.date_butoir?` · butoir ${fmtDate(b.date_butoir)}`:''} · Créé le {new Date(b.created_at).toLocaleDateString('fr-FR')}</div></div><Btn small variant="subtle" onClick={()=>sendMail(b)}>✉️ Envoyer</Btn><button onClick={async()=>{if(confirm('Supprimer ce bon ?')){await DB.deleteBon(b.id);onRefresh();notify('Bon supprimé');}}} style={{background:'none',border:'none',color:C.red,cursor:'pointer',fontSize:16}}>🗑</button></div></Card>;})}</div>}
  </div>;

/* ── Achats Global (refondu : groupé par chantier + totaux) ──── */
function AchatsGlobal({allTaches,chantiers,loading,onRefresh}){
  const [expanded,setExpanded]=useState({});

  const [newA,setNewA]=useState({chantierId:chantiers[0]?.id||'',libelle:'',qte:1,prix:0,fournisseur:''});
  const tog=(id)=>setExpanded(p=>({...p,[id]:!p[id]}));
  const addAchat=()=>{if(!newA.libelle.trim()||!newA.chantierId)return;const libres=getAchatsLibres(newA.chantierId);const n={id:uid(),libelle:newA.libelle,qte:Number(newA.qte)||1,prix:Number(newA.prix)||0,fournisseur:newA.fournisseur,statut:'a_acheter'};setAchatsLibres(newA.chantierId,[...libres,n]);setNewA({chantierId:newA.chantierId,libelle:'',qte:1,prix:0,fournisseur:''});setShowAdd(false);onRefresh();};
  // Achats liés aux tâches groupés par chantier
  const byChantier=chantiers.map(c=>{
    const tAch=allTaches.filter(t=>t.chantierId===c.id).flatMap(t=>t.achats.map(a=>({...a,tache:t,source:'tache'})));
    const libs=getAchatsLibres(c.id).map(a=>({...a,source:'libre'}));
    const all=[...tAch,...libs];
    const total=all.reduce((s,a)=>s+(a.prix||0)*(a.qte||1),0);
    const pending=all.filter(a=>a.statut==='a_acheter').length;
    return {chantier:c,achats:all,total,pending};
  }).filter(g=>g.achats.length>0);
  const grandTotal=byChantier.reduce((s,g)=>s+g.total,0);
  const grandPending=byChantier.reduce((s,g)=>s+g.pending,0);

      <div style={{display:'grid',gridTemplateColumns:'1.5fr 2fr 60px 90px 1fr',gap:8}}>
        <FInput label="Chantier" as="select" value={newA.chantierId} onChange={e=>setNewA(p=>({...p,chantierId:e.target.value}))} options={chantiers.map(c=>({value:c.id,label:c.nom.split('–')[0].trim()}))}/>
        <FInput label="Libellé" value={newA.libelle} onChange={e=>setNewA(p=>({...p,libelle:e.target.value}))} placeholder="ex: Ciment 25kg"/>
        <FInput label="Qté" type="number" value={newA.qte} onChange={e=>setNewA(p=>({...p,qte:e.target.value}))}/>
        <FInput label="Prix (€)" type="number" value={newA.prix} onChange={e=>setNewA(p=>({...p,prix:e.target.value}))}/>
        <FInput label="Fournisseur" value={newA.fournisseur} onChange={e=>setNewA(p=>({...p,fournisseur:e.target.value}))}/>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}><Btn variant="ghost" onClick={()=>setShowAdd(false)}>Annuler</Btn><Btn variant="primary" onClick={addAchat}>Créer l'achat</Btn></div>
    </Card>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:10}}>

          {g.achats.map(a=>{const ast=ACHAT_ST[a.statut];return <div key={a.id+a.source} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:C.bg,borderRadius:8}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:ast.color,flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,color:C.text,fontFamily:F}}>{a.libelle} {a.qte>1&&<span style={{color:C.muted,fontWeight:400}}>× {a.qte}</span>}</div><div style={{fontSize:10,color:C.muted,fontFamily:F,marginTop:1}}>{a.source==='tache'?`→ ${a.tache.titre}`:'🔸 Achat libre'}{a.fournisseur?` · ${a.fournisseur}`:''}</div></div>
            {a.prix>0&&<span style={{fontSize:12,fontWeight:700,color:C.accent,fontFamily:H}}>{fmtMoney(a.prix*(a.qte||1))}</span>}
            <Badge label={ast.label} color={ast.color}/>
          </div>;})}
        </div>}
      </Card>;})}
    </div>}
  </div>;
}

/* ── Planning Global View ─────────────────────────────────────── */
function PlanningGlobalView({chantiers,artisans,allTaches,loading,loadAll}){
  const [grp,setGrp]=useState('chantier');
  const [mode,setMode]=useState('agenda');
  const valid=allTaches.map(completeDates).filter(Boolean);
  if(loading)return <div style={{padding:40,textAlign:'center'}}><Spinner/></div>;
  return <div style={{display:'flex',flexDirection:'column',gap:18,animation:'fadeIn .2s'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:10}}>
      <div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2,margin:0}}>Vue globale</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:'4px 0 0'}}>Planning</h1></div>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        <Btn small variant={mode==='agenda'?'primary':'ghost'} onClick={()=>setMode('agenda')}>🗓 Agenda</Btn>
        <Btn small variant={mode==='gantt'?'primary':'ghost'} onClick={()=>setMode('gantt')}>📊 Gantt</Btn>
        <span style={{width:10}}/>
        {[['chantier','Par chantier'],['artisan','Par artisan'],['all','Tout confondu']].map(([v,l])=><Btn key={v} onClick={()=>setGrp(v)} variant={grp===v?'primary':'ghost'} small>{l}</Btn>)}
      </div>
    </div>
    {!valid.length&&<div style={{color:C.muted,fontFamily:F,padding:20}}>Aucune tâche avec dates planifiées.</div>}
    {valid.length>0&&grp==='all'&&(mode==='agenda'?<AgendaCalendar taches={valid} artisans={artisans} chantierId="_global" onDatesChanged={loadAll}/>:<DraggableGantt taches={valid} artisans={artisans} chantierId="_global" onDatesChanged={loadAll}/>)}
    {valid.length>0&&grp!=='all'&&(grp==='chantier'?chantiers.map(c=>({label:c.nom.split('–')[0].trim(),items:valid.filter(t=>t.chantierId===c.id),id:c.id,color:C.blue})):artisans.map(a=>({label:a.nom,items:valid.filter(t=>t.artisanId===a.id),id:a.id,color:a.color}))).filter(g=>g.items.length>0).map(g=>(
      <div key={g.id}>
        <div style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:H,marginBottom:8,display:'flex',alignItems:'center',gap:8}}><div style={{width:8,height:8,borderRadius:'50%',background:g.color}}/>{g.label}</div>
        {mode==='agenda'?<AgendaCalendar taches={g.items} artisans={artisans} chantierId={g.id} onDatesChanged={loadAll}/>:<DraggableGantt taches={g.items} artisans={artisans} chantierId={g.id} onDatesChanged={loadAll}/>}
      </div>
    ))}
  </div>;
}

/* ══ ROOT APP ══════════════════════════════════════════════════ */
function App(){
  const [chantiers,setChantiers]=useState([]);
  const [artisans,setArtisans]=useState([]);
  const [bons,setBons]=useState([]);
  const [allTaches,setAllTaches]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dashboard');
  const [selCh,setSelCh]=useState(null);
  const [newCh,setNewCh]=useState(false);
  const [showMobile,setShowMobile]=useState(false);
  const [showBon,setShowBon]=useState(false);
  const [bonCh,setBonCh]=useState(null);
  const [bonAr,setBonAr]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showAvatarMenu,setShowAvatarMenu]=useState(false);
  const [toast,setToast]=useState(null);
  const [hasAPIKey,setHasAPIKey]=useState(!!getAPIKey());
  const [role,setRoleS]=useState(getRole());
  const [themePref,setThemePrefS]=useState(getThemePref());
  const [resolvedTheme,setResolvedTheme]=useState(resolveTheme(getThemePref()));

  // Applique le thème au montage + à chaque changement + check auto toutes les 5 min
  useEffect(()=>{
    const resolved=applyTheme(themePref);
    setResolvedTheme(resolved);
    setThemePref(themePref);
    if(themePref==='auto'){
      const iv=setInterval(()=>{const r=applyTheme('auto');setResolvedTheme(r);},5*60*1000);
      return()=>clearInterval(iv);
    }
  },[themePref]);

  const toggleTheme=()=>{const next=themePref==='dark'?'light':themePref==='light'?'auto':'dark';const r=applyTheme(next);setResolvedTheme(r);setThemePref(next);setThemePrefS(next);};

  const notify=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const loadAll=useCallback(async()=>{
    if(!sb){setLoading(false);return;}
    setLoading(true);
    try{
      const [ch,ar,bn]=await Promise.all([DB.listChantiers(),DB.listIntervenants(),DB.listBons()]);
      setChantiers(ch);setArtisans(normalizeArtisans(ar));setBons(bn);
      const allRaw=await Promise.all(ch.map(c=>DB.getChantierDetail(c.id)));
      setAllTaches(allRaw.flatMap((raw,i)=>normalizeTaches(raw,ch[i].id)));
    }catch(e){notify('Erreur: '+e.message,'error');}
    setLoading(false);
  },[]);

  useEffect(()=>{loadAll();},[loadAll]);
  // Auto-ouverture vue mobile pour rôle artisan identifié
  useEffect(()=>{if(role==='artisan'&&getArtisanId()&&artisans.length>0&&!showMobile)setShowMobile(true);},[role,artisans.length]);
  useEffect(()=>{const close=()=>setShowAvatarMenu(false);if(showAvatarMenu){setTimeout(()=>document.addEventListener('click',close),0);return()=>document.removeEventListener('click',close);}},[showAvatarMenu]);

  const goTo=(v,cid=null)=>{setView(v);if(cid)setSelCh(cid);setNewCh(false);};
  const openBon=(chId,arId)=>{setBonCh(chId);setBonAr(arId);setShowBon(true);};
  const goIndex=()=>{if(confirm('Retourner à la page index (support-lch.com) ?'))window.location.href='https://support-lch.com/';};

  const nav=[{id:'dashboard',label:'Tableau de bord',icon:'⬛'},{id:'chantiers',label:'Chantiers',icon:'🏗'},{id:'planning',label:'Planning',icon:'📅'},{id:'taches',label:'Tâches',icon:'☑'},{id:'artisans',label:'Artisans',icon:'👷'},{id:'achats',label:'Achats',icon:'📦'},{id:'bons',label:'Bons de commande',icon:'📋'}];
  const badges={taches:allTaches.filter(t=>t.statut==='en_attente').length,achats:allTaches.flatMap(t=>t.achats).filter(a=>a.statut==='a_acheter').length,bons:bons.length};

  if(!sb && !loading) return (
    <div style={{height:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:F}}>
      <div style={{textAlign:'center',maxWidth:400,padding:32}}>
        <div style={{fontSize:48,marginBottom:16}}>🔌</div>
        <h2 style={{fontSize:20,fontWeight:800,color:C.text,fontFamily:H,marginBottom:8}}>Base de données non disponible</h2>
        <p style={{fontSize:14,color:C.secondary,lineHeight:1.6,marginBottom:20}}>L'aperçu Claude.ai bloque les connexions externes.<br/>L'application fonctionne sur <strong style={{color:C.accent}}>support-lch.com</strong></p>
        <a href="https://support-lch.com/" style={{display:'inline-block',padding:'10px 18px',background:C.accent,color:'#000',borderRadius:8,textDecoration:'none',fontWeight:700}}>← Retour à l'index</a>
      </div>
    </div>
  );

  return (
    <div style={{display:'flex',height:'100vh',background:C.bg,fontFamily:F,overflow:'hidden'}}>
    <nav style={{width:215,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:'14px 14px 12px',borderBottom:`1px solid ${C.border}`}}>
        <button onClick={goIndex} title="Retour à support-lch.com" style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'7px 10px',borderRadius:8,background:`${C.blue}10`,border:`1px solid ${C.blue}33`,cursor:'pointer',marginBottom:10}}>
          <span style={{fontSize:13}}>←</span><span style={{fontSize:11,fontWeight:600,color:C.blue,fontFamily:F}}>support-lch.com</span>
        </button>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:32,height:32,borderRadius:9,background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>🏗</div>
          <div><div style={{fontSize:15,fontWeight:800,color:C.text,fontFamily:H,lineHeight:1}}>Chantier</div><div style={{fontSize:9,color:C.accent,fontFamily:H,textTransform:'uppercase',letterSpacing:2,marginTop:1}}>Pro</div></div>
        </div>
      </div>
      <div style={{flex:1,padding:'10px 8px',display:'flex',flexDirection:'column',gap:1,overflowY:'auto'}}>
        {nav.map(n=>{const active=view===n.id;const badge=badges[n.id];return <button key={n.id} onClick={()=>goTo(n.id)} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 11px',borderRadius:10,background:active?`${C.accent}18`:'transparent',border:active?`1px solid ${C.accent}33`:'1px solid transparent',cursor:'pointer',textAlign:'left',width:'100%'}}>
          <span style={{fontSize:14,lineHeight:1}}>{n.icon}</span>
          <span style={{flex:1,fontSize:13,fontWeight:active?700:500,color:active?C.accent:C.secondary,fontFamily:F}}>{n.label}</span>
          {badge>0&&<Pill n={badge} color={n.id==='achats'?C.red:n.id==='bons'?C.green:C.accent}/>}
        </button>;})}
      </div>
      <div style={{padding:'8px 10px',borderTop:`1px solid ${C.border}`}}>
        <button onClick={()=>setShowMobile(true)} style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:10,background:`${C.purple}18`,border:`1px solid ${C.purple}33`,cursor:'pointer',marginBottom:6}}>
          <span style={{fontSize:13}}>📱</span><span style={{fontSize:12,fontWeight:600,color:C.purple,fontFamily:F}}>Vue artisan mobile</span>
        </button>
        <button onClick={toggleTheme} title={`Thème : ${themePref==='auto'?`Auto (${resolvedTheme})`:themePref}`} style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:10,background:C.surface,border:`1px solid ${C.border}`,cursor:'pointer'}}>
          <span style={{fontSize:13}}>{themePref==='light'?'☀️':themePref==='dark'?'🌙':'🕐'}</span>
          <span style={{fontSize:12,fontWeight:600,color:C.secondary,fontFamily:F}}>{themePref==='light'?'Mode clair':themePref==='dark'?'Mode sombre':`Auto (${resolvedTheme==='light'?'clair':'sombre'})`}</span>
        </button>
      </div>
      <div style={{padding:'10px 14px',borderTop:`1px solid ${C.border}`,position:'relative'}}>
        <button onClick={e=>{e.stopPropagation();setShowAvatarMenu(!showAvatarMenu);}} style={{width:'100%',display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer',padding:4,borderRadius:8}}>
          <div style={{width:32,height:32,borderRadius:'50%',background:`${C.accent}22`,border:`1.5px solid ${C.accent}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:C.accent,fontFamily:H}}>LC</div>
          <div style={{flex:1,textAlign:'left'}}><div style={{fontSize:12,fontWeight:600,color:C.text,fontFamily:F}}>Louis</div><div style={{fontSize:10,color:C.muted,fontFamily:F}}>{role==='admin'?'Administrateur':role==='chef'?'Chef de chantier':'Artisan'}</div></div>
          <span style={{fontSize:14,color:hasAPIKey?C.green:C.muted}}>⚙️</span>
        </button>
        {showAvatarMenu&&<div onClick={e=>e.stopPropagation()} style={{position:'absolute',bottom:'100%',left:10,right:10,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,boxShadow:'0 10px 40px rgba(0,0,0,.5)',overflow:'hidden',marginBottom:6,zIndex:100}}>
          <button onClick={()=>{setShowSettings(true);setShowAvatarMenu(false);}} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'none',border:'none',borderBottom:`1px solid ${C.border}`,cursor:'pointer',textAlign:'left'}}>
            <span>⚙️</span><div><div style={{fontSize:12,fontWeight:600,color:C.text,fontFamily:F}}>Paramètres</div><div style={{fontSize:10,color:C.muted,fontFamily:F}}>Entité, IA, connecteurs, rôle</div></div>
          </button>
          <button onClick={goIndex} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:'none',border:'none',cursor:'pointer',textAlign:'left'}}>
            <span>←</span><div><div style={{fontSize:12,fontWeight:600,color:C.text,fontFamily:F}}>Retour à l'index</div><div style={{fontSize:10,color:C.muted,fontFamily:F}}>support-lch.com</div></div>
          </button>
        </div>}
      </div>
    </nav>

    <main style={{flex:1,overflowY:'auto',padding:'26px 30px'}}>
      {view==='dashboard'&&<Dashboard chantiers={chantiers} artisans={artisans} allTaches={allTaches} loading={loading} onGoTo={goTo} loadAll={loadAll}/>}
      {view==='chantiers'&&!newCh&&!selCh&&<ChantiersList chantiers={chantiers} allTaches={allTaches} onSelect={id=>setSelCh(id)} onNew={()=>setNewCh(true)} loading={loading}/>}
      {view==='chantiers'&&newCh&&<NewChantierForm onSaved={()=>{loadAll();setNewCh(false);notify('Chantier créé ✓');}} onCancel={()=>setNewCh(false)}/>}
      {view==='chantiers'&&selCh&&!newCh&&(()=>{const ch=chantiers.find(c=>c.id===selCh);return ch?<ChantierDetail chantier={ch} artisans={artisans} allBons={bons} onBack={()=>setSelCh(null)} onRefreshAll={loadAll} onNewBon={openBon}/>:null;})()}
      {view==='planning'&&<PlanningGlobalView chantiers={chantiers} artisans={artisans} allTaches={allTaches} loading={loading} loadAll={loadAll}/>}
      {view==='taches'&&<ToutesLesTaches allTaches={allTaches} chantiers={chantiers} artisans={artisans} loading={loading} onRefresh={loadAll}/>}
      {view==='artisans'&&<ArtisanView artisans={artisans} allTaches={allTaches} chantiers={chantiers} loading={loading} onRefresh={loadAll} onNewBon={openBon}/>}
      {view==='achats'&&<AchatsGlobal allTaches={allTaches} chantiers={chantiers} loading={loading} onRefresh={loadAll}/>}
      {view==='bons'&&<BonsListView bons={bons} chantiers={chantiers} artisans={artisans} allTaches={allTaches} loading={loading} onNew={()=>openBon(null,null)} onRefresh={loadAll} notify={notify}/>}
    </main>

    {showMobile&&<MobileView artisans={artisans} taches={allTaches} chantiers={chantiers} onClose={()=>setShowMobile(false)} lockedArtisanId={role==='artisan'?getArtisanId():null}/>}
    {showBon&&<BonCommandeModal chantiers={chantiers} artisans={artisans} allTaches={allTaches} prefillCh={bonCh} prefillAr={bonAr} onSaved={()=>{loadAll();setShowBon(false);notify('Bon créé ✓ — visible dans l\'onglet Bons de commande');}} onClose={()=>setShowBon(false)}/>}
    {showSettings&&<SettingsModal artisans={artisans} onClose={()=>{setHasAPIKey(!!getAPIKey());setShowSettings(false);}} onRoleChange={(r)=>setRoleS(r)}/>}
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
  </div>
  );
}

/* ── Error Boundary ───────────────────────────────────────────── */
class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null,info:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){this.setState({info});}
  render(){
    if(this.state.error) return (
      <div style={{padding:32,fontFamily:"'DM Sans',sans-serif",background:'#080a0f',minHeight:'100vh',color:'#e8ecf4'}}>
        <div style={{background:'#161b27',border:'1px solid #f43f5e',borderRadius:14,padding:24,maxWidth:700}}>
          <div style={{fontSize:18,fontWeight:800,color:'#f43f5e',fontFamily:"'Syne',sans-serif",marginBottom:12}}>⚠️ Erreur de rendu</div>
          <pre style={{background:'#10131a',padding:16,borderRadius:8,fontSize:12,color:'#f59e0b',overflow:'auto',whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{this.state.error?.toString()}</pre>
          {this.state.info&&<pre style={{background:'#10131a',padding:16,borderRadius:8,fontSize:11,color:'#7e8fa8',overflow:'auto',marginTop:8,whiteSpace:'pre-wrap',wordBreak:'break-all',maxHeight:200}}>{this.state.info.componentStack}</pre>}
          <button onClick={()=>window.location.reload()} style={{marginTop:16,padding:'8px 18px',background:'#f59e0b',color:'#000',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>Recharger</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

window.onerror=(msg,src,line,col,err)=>{
  document.getElementById('root').innerHTML=`<div style="padding:32px;font-family:sans-serif;background:#080a0f;color:#e8ecf4;min-height:100vh"><div style="background:#161b27;border:1px solid #f43f5e;border-radius:14px;padding:24px;max-width:700px"><div style="color:#f43f5e;font-size:18px;font-weight:800;margin-bottom:12px">⚠️ Erreur JavaScript</div><pre style="background:#10131a;padding:16px;border-radius:8px;font-size:12px;color:#f59e0b;overflow:auto;white-space:pre-wrap;word-break:break-all">${msg}\nFichier: ${src}\nLigne: ${line}:${col}\n${err?.stack||''}</pre><button onclick="location.reload()" style="margin-top:16px;padding:8px 18px;background:#f59e0b;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700">Recharger</button></div></div>`;
  return true;
};

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
