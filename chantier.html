/* ── Normalize ────────────────────────────────────────────────── */
function normalizeTaches(raw,chantierId){
  const {sections,taches,assignations,achats,etats,commentaires}=raw;
  return taches.map(t=>{
    const sec=sections.find(s=>s.id===t.section_id);
    const asgn=assignations.find(a=>a.tache_id===t.id);
    const etat=etats.find(e=>e.tache_id===t.id);
    return {id:t.id,chantierId,sectionId:t.section_id,section:sec?.label||'Autre',titre:t.texte,description:t.description||'',artisanId:asgn?.intervenant_id||null,duree:t.duree||1,dateDebut:t.date_debut||'',dateFin:t.date_butoir||'',priorite:t.priorite||'normale',statut:t.statut||(etat?.done?'valide':'planifie'),commentaires:commentaires.filter(c=>c.tache_id===t.id).map(c=>`${c.texte} — ${c.auteur||'Louis'}, ${fmtDate(c.created_at)}`),achats:achats.filter(a=>a.tache_id===t.id).map(a=>({id:a.id,libelle:a.libelle,statut:a.statut}))};
  });
}

/* ════════════════════════════════════════════════════════════════
   GANTT DRAGGABLE
════════════════════════════════════════════════════════════════ */
function DraggableGantt({taches, artisans, chantierId, onDatesChanged}){
  const LABEL_W = 190;
  const ROW_H = 36;
  const containerRef = useRef();
  const [drag, setDrag] = useState(null); // {tacheId, mode:'move'|'resize', startX, origDebut, origFin, linkedIds}
  const [tempDates, setTempDates] = useState({}); // {tacheId: {dateDebut, dateFin}}
  const [links, setLinks] = useState(()=>getLinks(chantierId));
  const [linkMode, setLinkMode] = useState(false);
  const [linkFirst, setLinkFirst] = useState(null);
  const [savingIds, setSavingIds] = useState(new Set());

  const valid = taches.filter(t=>t.dateDebut && t.dateFin);

  const {minD, maxD, totalDays, ticks} = useMemo(()=>{
    if(!valid.length) return {minD:null,maxD:null,totalDays:0,ticks:[]};
    const allD = valid.flatMap(t=>[new Date(t.dateDebut+'T12:00:00'),new Date(t.dateFin+'T12:00:00')]);
    const mn = new Date(Math.min(...allD)); mn.setDate(mn.getDate()-3);
    const mx = new Date(Math.max(...allD)); mx.setDate(mx.getDate()+7);
    const td = Math.ceil((mx-mn)/864e5)||1;
    const tks=[]; const d=new Date(mn); while(d<=mx){tks.push(new Date(d));d.setDate(d.getDate()+7);}
    return {minD:mn, maxD:mx, totalDays:td, ticks:tks};
  },[valid.map(t=>t.id+t.dateDebut+t.dateFin).join()]);

  const getPPD = useCallback(()=>{
    if(!containerRef.current||!totalDays) return 0;
    const w = containerRef.current.getBoundingClientRect().width - LABEL_W;
    return w / totalDays;
  },[totalDays]);

  const xpct = (d) => { if(!minD||!d) return 0; return ((new Date(d+'T12:00:00')-minD)/864e5/totalDays)*100; };
  const wpct = (d1,d2) => { if(!d1||!d2) return 0; return Math.max(((new Date(d2+'T12:00:00')-new Date(d1+'T12:00:00'))/864e5/totalDays)*100,0.8); };

  /* Mouse drag handlers */
  useEffect(()=>{
    if(!drag) return;
    const onMove=(e)=>{
      const ppd=getPPD(); if(!ppd) return;
      const deltaX=e.clientX-drag.startX;
      const deltaDays=Math.round(deltaX/ppd);
      const nd={};
      const applyDelta=(tid,origDebut,origFin)=>{
        if(drag.mode==='move'){
          nd[tid]={dateDebut:addDays(origDebut,deltaDays),dateFin:addDays(origFin,deltaDays)};
        } else {
          const newFin=addDays(origFin,deltaDays);
          if(new Date(newFin+'T12:00:00')>new Date(origDebut+'T12:00:00')){
            nd[tid]={dateDebut:origDebut,dateFin:newFin};
          }
        }
      };
      applyDelta(drag.tacheId, drag.origDebut, drag.origFin);
      if(drag.mode==='move'){
        (drag.linkedIds||[]).forEach(lid=>{
          const lt=taches.find(t=>t.id===lid);
          if(lt) applyDelta(lid,lt.dateDebut,lt.dateFin);
        });
      }
      setTempDates(nd);
    };
    const onUp=async()=>{
      if(Object.keys(tempDates).length){
        const ids=Object.keys(tempDates);
        setSavingIds(new Set(ids));
        await Promise.all(ids.map(id=>{
          const td=tempDates[id];
          return DB.updateTacheDates(id,td.dateDebut,td.dateFin);
        }));
        onDatesChanged(tempDates);
        setSavingIds(new Set());
      }
      setDrag(null); setTempDates({});
    };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{ window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
  },[drag,tempDates,getPPD,taches]);

  const onBarDown=(e,t,mode)=>{
    if(linkMode) return;
    e.preventDefault(); e.stopPropagation();
    const allLinked=new Set();
    const collect=(id)=>{ (links[id]||[]).forEach(lid=>{if(!allLinked.has(lid)){allLinked.add(lid);collect(lid);}}); };
    collect(t.id);
    setDrag({tacheId:t.id,mode,startX:e.clientX,origDebut:t.dateDebut,origFin:t.dateFin,linkedIds:[...allLinked]});
  };

  const onBarClick=(e,t)=>{
    if(!linkMode) return;
    e.stopPropagation();
    if(!linkFirst){ setLinkFirst(t.id); return; }
    if(linkFirst===t.id){ setLinkFirst(null); return; }
    const newLinks={...links};
    const a=linkFirst, b=t.id;
    if(!newLinks[a]) newLinks[a]=[];
    if(!newLinks[b]) newLinks[b]=[];
    const alreadyLinked=newLinks[a].includes(b);
    if(alreadyLinked){
      newLinks[a]=newLinks[a].filter(x=>x!==b);
      newLinks[b]=newLinks[b].filter(x=>x!==a);
    } else {
      newLinks[a]=[...newLinks[a],b];
      newLinks[b]=[...newLinks[b],a];
    }
    setLinks(newLinks);
    saveLinks(chantierId,newLinks);
    setLinkFirst(null);
  };

  const getT=(t)=>{
    const td=tempDates[t.id];
    return {dateDebut:td?.dateDebut||t.dateDebut, dateFin:td?.dateFin||t.dateFin};
  };

  const bc={planifie:C.secondary,en_cours:C.blue,en_attente:C.accent,valide:C.green,refuse:C.red};

  if(!valid.length) return <div style={{padding:24,color:C.muted,fontFamily:F,fontSize:13,textAlign:'center'}}>Aucune tâche avec dates planifiées. Ajoutez des dates aux tâches pour afficher le planning.</div>;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {/* Controls */}
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <Btn small variant={linkMode?'active':'subtle'} onClick={()=>{setLinkMode(!linkMode);setLinkFirst(null);}}>
          🔗 {linkMode?'Mode liaison actif — cliquer 2 barres':'Lier des tâches'}
        </Btn>
        {linkMode&&linkFirst&&<span style={{fontSize:12,color:C.accent,fontFamily:F}}>1ère tâche sélectionnée → cliquez une 2ème</span>}
        {Object.keys(links).length>0&&<Btn small variant="danger" onClick={()=>{const empty={};setLinks(empty);saveLinks(chantierId,empty);}}>✕ Effacer les liaisons</Btn>}
        <span style={{fontSize:11,color:C.muted,fontFamily:F,marginLeft:'auto'}}>Glisser une barre pour déplacer · Bord droit pour redimensionner</span>
      </div>

      {/* Gantt grid */}
      <div ref={containerRef} style={{overflowX:'auto',borderRadius:14,border:`1px solid ${C.border}`,background:C.card}}>
        {/* Header */}
        <div style={{display:'grid',gridTemplateColumns:`${LABEL_W}px 1fr`,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,background:C.card,zIndex:5}}>
          <div style={{padding:'10px 14px',borderRight:`1px solid ${C.border}`,fontSize:10,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1}}>Tâche / Artisan</div>
          <div style={{position:'relative',height:34,minWidth:600}}>
            {ticks.map((t,i)=>{
              const pct=xpct(t.toISOString().split('T')[0]);
              return <div key={i} style={{position:'absolute',left:`${pct}%`,top:0,height:'100%',borderLeft:`1px dashed ${C.border}`,paddingLeft:3,display:'flex',alignItems:'center'}}>
                <span style={{fontSize:9,color:C.muted,fontFamily:F,whiteSpace:'nowrap'}}>{t.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</span>
              </div>;
            })}
            {(()=>{const p=xpct(new Date().toISOString().split('T')[0]);return(p>0&&p<100)&&<div style={{position:'absolute',left:`${p}%`,top:0,height:'100%',borderLeft:`2px solid ${C.red}`,zIndex:2,pointerEvents:'none'}}><div style={{background:C.red,color:'#fff',fontSize:8,padding:'0 3px',borderRadius:'0 3px 3px 0',fontFamily:F,lineHeight:'14px',whiteSpace:'nowrap'}}>Auj.</div></div>;})()}
          </div>
        </div>

        {/* Rows */}
        {valid.map(t=>{
          const ar=artisans.find(a=>a.id===t.artisanId);
          const {dateDebut,dateFin}=getT(t);
          const px=xpct(dateDebut), pw=wpct(dateDebut,dateFin);
          const color=bc[t.statut]||C.secondary;
          const isDragging=drag?.tacheId===t.id||drag?.linkedIds?.includes(t.id);
          const isSaving=savingIds.has(t.id);
          const isLinked=Object.keys(links).some(k=>k===t.id&&links[k].length>0);
          const isLinkSelected=linkFirst===t.id;
          return (
            <div key={t.id} style={{display:'grid',gridTemplateColumns:`${LABEL_W}px 1fr`,borderBottom:`1px solid ${C.border}`}}>
              <div style={{padding:'6px 12px',borderRight:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:6,background:isLinkSelected?`${C.accent}10`:'transparent'}}>
                {ar?<Av code={ar.avatar} color={ar.color} size={20}/>:<div style={{width:20,height:20,borderRadius:'50%',background:C.border,flexShrink:0}}/>}
                <div style={{overflow:'hidden'}}>
                  <div style={{fontSize:11,color:C.text,fontFamily:F,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titre}</div>
                  <div style={{fontSize:9,color:C.muted,fontFamily:F}}>{t.section} · {dateDebut?fmtDate(dateDebut):''}{dateFin?' → '+fmtDate(dateFin):''}</div>
                </div>
                {isLinked&&<span style={{fontSize:9,color:C.accent,marginLeft:'auto',flexShrink:0}}>🔗</span>}
              </div>
              <div style={{position:'relative',height:ROW_H,minWidth:600,cursor:linkMode?'pointer':'default'}} onClick={e=>linkMode&&onBarClick(e,t)}>
                {/* grid lines */}
                {ticks.map((tk,i)=>{const pp=xpct(tk.toISOString().split('T')[0]);return <div key={i} style={{position:'absolute',left:`${pp}%`,top:0,bottom:0,borderLeft:`1px dashed ${C.border}`,pointerEvents:'none'}}/>;} )}
                {/* bar */}
                {dateDebut&&dateFin&&<div
                  className="gantt-bar"
                  onMouseDown={e=>onBarDown(e,t,'move')}
                  style={{position:'absolute',top:'18%',left:`${px}%`,width:`${pw}%`,height:'64%',background:color,borderRadius:5,opacity:isDragging?0.7:0.85,zIndex:isDragging?10:1,boxShadow:isDragging?`0 4px 16px ${color}66`:'none',border:isLinkSelected?`2px solid ${C.accent}`:'none',display:'flex',alignItems:'center',paddingLeft:6,minWidth:8}}>
                  <span style={{fontSize:9,color:'#fff',fontFamily:F,whiteSpace:'nowrap',overflow:'hidden',pointerEvents:'none'}}>{isSaving?'…':t.duree+'j'}</span>
                  {/* Resize handle */}
                  <div className="resize-handle" onMouseDown={e=>{e.stopPropagation();onBarDown(e,t,'resize');}}/>
                </div>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
        {Object.entries(STATUTS).map(([k,v])=><div key={k} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:10,height:10,borderRadius:2,background:bc[k]}}/><span style={{fontSize:11,color:C.secondary,fontFamily:F}}>{v.label}</span></div>)}
        <div style={{display:'flex',alignItems:'center',gap:5,marginLeft:'auto'}}><span style={{fontSize:10,color:C.muted,fontFamily:F}}>🔗 = tâches liées (bougent ensemble)</span></div>
      </div>
    </div>
  );
}

/* ── Import Devis Modal ───────────────────────────────────────── */
function ImportDevisModal({chantierId,chantierNom,artisans,existingSections,onSaved,onClose}){
  const [step,setStep]=useState(()=>getAPIKey()?'upload':'nokey');
  const [lines,setLines]=useState([]);
  const [error,setError]=useState('');
  const [saving,setSaving]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef();

  const extractWithAI=async(content)=>{
    const apiKey=getAPIKey();
    if(!apiKey){setError('Clé API manquante — configurez-la dans les paramètres ⚙️');setStep('nokey');return;}
    setStep('extracting');setError('');
    const prompt=`Tu es un expert BTP. Analyse ce devis/bordereau pour le chantier "${chantierNom}" et extrais toutes les lignes de travaux.
Pour chaque ligne renvoie un objet JSON avec : titre (string), section (parmi: ${SECTIONS.join(', ')}), description (string), duree (number jours), prixUnitaire (number|null), quantite (number|null), unite (string).
Réponds UNIQUEMENT avec un tableau JSON valide, sans backticks, sans texte avant ni après.
Si le contenu est insuffisant, génère 5 exemples réalistes pour ce chantier.
Contenu : ${content.slice(0,3500)}`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:prompt}]})});
      const data=await res.json();
      if(data.error){setError('API: '+data.error.message);setStep('upload');return;}
      const txt=data.content?.find(b=>b.type==='text')?.text||'[]';
      const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
      setLines(parsed.map((l,i)=>({_id:uid(),selected:true,titre:l.titre||'Tâche '+(i+1),section:SECTIONS.includes(l.section)?l.section:'Autre',description:l.description||'',duree:Number(l.duree)||1,prixUnitaire:l.prixUnitaire||null,artisanId:artisans[0]?.id||'',dateDebut:'',dateFin:'',priorite:'normale'})));
      setStep('review');
    }catch(e){setError('Erreur: '+e.message);setStep('upload');}
  };

  const readFile=async(file)=>{
    let text='';
    if(file.name.match(/\.(csv|txt)$/i)) text=await file.text();
    else text=`Fichier: ${file.name} (${Math.round(file.size/1024)}ko). Génère des exemples réalistes pour un chantier de rénovation.`;
    await extractWithAI(text);
  };

  const onDrop=e=>{e.preventDefault();setDragOver(false);const file=e.dataTransfer.files[0];if(file)readFile(file);};
  const toggle=id=>setLines(l=>l.map(x=>x._id===id?{...x,selected:!x.selected}:x));
  const upd=(id,k,v)=>setLines(l=>l.map(x=>x._id===id?{...x,[k]:v}:x));

  const importLines=async()=>{
    setSaving(true);
    try{for(const l of lines.filter(x=>x.selected)){const sec=await DB.getOrCreateSection(chantierId,l.section,existingSections);await DB.createTache(sec.id,{titre:l.titre,description:l.description,duree:l.duree,dateDebut:l.dateDebut,dateFin:l.dateFin,priorite:l.priorite},l.artisanId||null);}onSaved();onClose();}
    catch(e){alert('Erreur: '+e.message);}
    setSaving(false);
  };

  return <Modal title="Import devis / bordereau" subtitle={chantierNom} onClose={onClose} wide>
    {step==='nokey'&&<div style={{padding:28,display:'flex',flexDirection:'column',alignItems:'center',gap:18}}>
      <div style={{fontSize:48}}>🔑</div>
      <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:H}}>Clé API requise</div><div style={{fontSize:13,color:C.secondary,fontFamily:F,marginTop:4}}>Configurez votre clé Anthropic pour activer la lecture IA</div></div>
      <div style={{background:`${C.blue}10`,border:`1px solid ${C.blue}33`,borderRadius:10,padding:'14px 18px',fontSize:13,fontFamily:F,color:C.text,lineHeight:1.7,width:'100%'}}>
        <b style={{color:C.accent}}>Comment obtenir une clé :</b><br/>
        1. Allez sur <a href="https://console.anthropic.com" target="_blank" style={{color:C.accent}}>console.anthropic.com</a><br/>
        2. API Keys → Create Key<br/>
        3. Copiez la clé <span style={{fontFamily:'monospace',color:C.muted}}>sk-ant-api03-...</span><br/>
        4. Cliquez ⚙️ dans le menu puis "Configuration IA"
      </div>
      {error&&<div style={{color:C.red,fontSize:12,fontFamily:F}}>{error}</div>}
      <div style={{display:'flex',gap:10}}>
        <Btn onClick={onClose} variant="ghost">Annuler</Btn>
        <Btn onClick={()=>setStep('upload')} variant="primary">J'ai configuré ma clé →</Btn>
      </div>
    </div>}

    {step==='upload'&&<div style={{padding:28,display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <div style={{fontSize:48}}>📄</div>
      <div style={{textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:H}}>Glissez votre devis ici</div><div style={{fontSize:13,color:C.secondary,fontFamily:F,marginTop:4}}>PDF, CSV, Excel, texte brut</div></div>
      <div
        className={`drop-zone${dragOver?' drag-over':''}`}
        onClick={()=>fileRef.current.click()}
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragEnter={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={onDrop}
        style={{border:`2px dashed ${dragOver?C.accent:C.border}`,borderRadius:14,padding:'36px 40px',cursor:'pointer',textAlign:'center',width:'100%',background:dragOver?`${C.accent}08`:C.surface}}>
        <div style={{fontSize:32,marginBottom:8}}>⬇</div>
        <div style={{fontSize:14,fontWeight:600,color:dragOver?C.accent:C.secondary,fontFamily:H}}>Glisser le fichier ici</div>
        <div style={{fontSize:12,color:C.muted,marginTop:4,fontFamily:F}}>ou cliquer pour parcourir</div>
      </div>
      <input ref={fileRef} type="file" accept=".pdf,.xlsx,.csv,.txt,.xls" style={{display:'none'}} onChange={e=>e.target.files[0]&&readFile(e.target.files[0])}/>
      <div style={{display:'flex',alignItems:'center',gap:10,width:'100%'}}><div style={{flex:1,height:1,background:C.border}}/><span style={{fontSize:11,color:C.muted,fontFamily:F}}>ou</span><div style={{flex:1,height:1,background:C.border}}/></div>
      <Btn onClick={()=>extractWithAI('Génère des exemples réalistes pour un chantier de rénovation BTP.')} variant="subtle">✨ Générer des exemples avec l'IA</Btn>
      {error&&<div style={{color:C.red,fontSize:12,fontFamily:F}}>{error}</div>}
    </div>}

    {step==='extracting'&&<div style={{padding:60,display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <div style={{fontSize:40,display:'inline-block',animation:'spin 1.2s linear infinite'}}>⚙️</div>
      <div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:H}}>Analyse en cours…</div>
      <div style={{fontSize:13,color:C.secondary,fontFamily:F}}>L'IA extrait les lignes de votre devis</div>
    </div>}

    {step==='review'&&<>
      <div style={{padding:'12px 20px',background:`${C.green}10`,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:13,color:C.green,fontFamily:F}}>✓ {lines.length} lignes extraites — {lines.filter(l=>l.selected).length} sélectionnées</span>
        <div style={{display:'flex',gap:8}}>
          <Btn small variant="subtle" onClick={()=>setLines(l=>l.map(x=>({...x,selected:true})))}>Tout cocher</Btn>
          <Btn small variant="subtle" onClick={()=>setLines(l=>l.map(x=>({...x,selected:false})))}>Tout décocher</Btn>
        </div>
      </div>
      <div style={{padding:14,display:'flex',flexDirection:'column',gap:9,overflowY:'auto',maxHeight:380}}>
        {lines.map(l=><div key={l._id} style={{background:l.selected?C.surface:C.bg,border:`1px solid ${l.selected?C.border:C.muted+'22'}`,borderRadius:11,padding:'11px 13px',opacity:l.selected?1:.5}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:10}}>
            <input type="checkbox" checked={l.selected} onChange={()=>toggle(l._id)} style={{marginTop:4,accentColor:C.accent,cursor:'pointer',flexShrink:0,width:15,height:15}}/>
            <div style={{flex:1,display:'grid',gridTemplateColumns:'2fr 1fr 1fr 90px',gap:8}}>
              <div>
                <input value={l.titre} onChange={e=>upd(l._id,'titre',e.target.value)} style={{background:'transparent',border:`1px solid ${C.border}`,borderRadius:7,padding:'4px 8px',color:C.text,fontSize:13,fontWeight:600,fontFamily:F,outline:'none',width:'100%'}}/>
                <div style={{fontSize:11,color:C.muted,marginTop:3,paddingLeft:2,fontFamily:F}}>{l.description||'—'}</div>
              </div>
              <select value={l.section} onChange={e=>upd(l._id,'section',e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:'4px 7px',color:C.text,fontSize:11,fontFamily:F,outline:'none'}}>
                {SECTIONS.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <select value={l.artisanId} onChange={e=>upd(l._id,'artisanId',e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:'4px 7px',color:C.text,fontSize:11,fontFamily:F,outline:'none'}}>
                <option value=''>—</option>
                {artisans.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}
              </select>
              <div style={{display:'flex',alignItems:'center',gap:4}}>
                <input type="number" value={l.duree} onChange={e=>upd(l._id,'duree',Number(e.target.value))} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:'4px 6px',color:C.accent,fontSize:12,fontFamily:F,outline:'none',width:44}}/>
                <span style={{fontSize:11,color:C.muted,fontFamily:F}}>j</span>
                {l.prixUnitaire&&<span style={{fontSize:10,color:C.green,fontFamily:F}}>{fmtMoney(l.prixUnitaire)}</span>}
              </div>
            </div>
          </div>
        </div>)}
      </div>
      <div style={{padding:'14px 20px',borderTop:`1px solid ${C.border}`,display:'flex',gap:8,justifyContent:'flex-end'}}>
        <Btn onClick={()=>setStep('upload')} variant="ghost">← Retour</Btn>
        <Btn onClick={importLines} variant="primary" loading={saving} disabled={!lines.filter(l=>l.selected).length}>
          ＋ Importer {lines.filter(l=>l.selected).length} tâche{lines.filter(l=>l.selected).length>1?'s':''}
        </Btn>
      </div>
    </>}
  </Modal>;
}

/* ── Tache Modal ──────────────────────────────────────────────── */

/* ── Add Tache Modal ──────────────────────────────────────────── */
function AddTacheModal({chantierId,artisans,existingSections,onSaved,onClose}){
  const [f,setF]=useState({titre:'',section:existingSections[0]?.label||SECTIONS[0],newSection:'',artisanId:artisans[0]?.id||'',dateDebut:'',dateFin:'',duree:'1',priorite:'normale',description:''});
  const [saving,setSaving]=useState(false);
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const isNew=f.section==='__new__';
  const sectionLabel=isNew?f.newSection:f.section;
  const save=async()=>{
    if(!f.titre.trim()||!sectionLabel.trim()) return;
    setSaving(true);
    try{const sec=await DB.getOrCreateSection(chantierId,sectionLabel,existingSections);await DB.createTache(sec.id,f,f.artisanId||null);onSaved();onClose();}
    catch(e){alert('Erreur: '+e.message);}
    setSaving(false);
  };
  const sectionOpts=[...existingSections.map(s=>({value:s.label,label:s.label})),...SECTIONS.filter(s=>!existingSections.find(es=>es.label===s)).map(s=>({value:s,label:s})),{value:'__new__',label:'＋ Nouvelle section…'}];
  return <Modal title="Nouvelle tâche" subtitle="Tâches" onClose={onClose}>
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
      <FInput label="Titre de la tâche" value={f.titre} onChange={e=>u('titre',e.target.value)} placeholder="ex: Pose carrelage 40m²"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FInput label="Section" as="select" value={f.section} onChange={e=>u('section',e.target.value)} options={sectionOpts}/>
        {isNew&&<FInput label="Nom nouvelle section" value={f.newSection} onChange={e=>u('newSection',e.target.value)} placeholder="ex: Façade"/>}
        <FInput label="Artisan" as="select" value={f.artisanId} onChange={e=>u('artisanId',e.target.value)} options={[{value:'',label:'— Non assigné —'},...artisans.map(a=>({value:a.id,label:`${a.nom} (${a.metier})`}))]}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        <FInput label="Début" type="date" value={f.dateDebut} onChange={e=>u('dateDebut',e.target.value)}/>
        <FInput label="Fin" type="date" value={f.dateFin} onChange={e=>u('dateFin',e.target.value)}/>
        <FInput label="Durée (j)" type="number" value={f.duree} onChange={e=>u('duree',e.target.value)}/>
      </div>
      <FInput label="Priorité" as="select" value={f.priorite} onChange={e=>u('priorite',e.target.value)} options={[{value:'haute',label:'🔴 Haute'},{value:'normale',label:'🟡 Normale'},{value:'basse',label:'🟢 Basse'}]}/>
      <FInput label="Description" as="textarea" value={f.description} onChange={e=>u('description',e.target.value)} placeholder="Détail des travaux…"/>
    </div>
    <div style={{padding:'14px 20px',borderTop:`1px solid ${C.border}`,display:'flex',gap:8,justifyContent:'flex-end'}}>
      <Btn onClick={onClose} variant="ghost">Annuler</Btn>
      <Btn onClick={save} variant="primary" loading={saving}>Créer la tâche</Btn>
    </div>
  </Modal>;
}

/* ── Mobile View ──────────────────────────────────────────────── */
function MobileView({artisans,taches,chantiers,onClose}){
  const [sel,setSel]=useState(null);const [selT,setSelT]=useState(null);const [nc,setNc]=useState('');const [localSt,setLocalSt]=useState({});
  const ar=sel?artisans.find(a=>a.id===sel):null;
  const arT=ar?taches.filter(t=>t.artisanId===ar.id).sort((a,b)=>{const o={en_cours:0,en_attente:1,refuse:2,planifie:3,valide:4};return(o[a.statut]||5)-(o[b.statut]||5);}):[];
  const tache=selT?taches.find(t=>t.id===selT):null;
  const getSt=t=>localSt[t.id]||t.statut;
  const updSt=async(t,s)=>{setLocalSt(p=>({...p,[t.id]:s}));await DB.updateTache(t.id,{...t,statut:s},undefined);};
  const addCom=async()=>{if(!nc.trim()||!tache)return;await DB.addCommentaire(tache.id,nc);setNc('');};
  return <div style={{position:'fixed',inset:0,background:C.bg,zIndex:3000,overflowY:'auto'}}>
    <div style={{maxWidth:390,margin:'0 auto',fontFamily:F}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'14px 16px',display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:10}}>
        {(sel||selT)?<button onClick={()=>{if(selT)setSelT(null);else setSel(null);}} style={{background:'none',border:'none',color:C.secondary,fontSize:22,cursor:'pointer',padding:0,lineHeight:1}}>←</button>:<div style={{width:10}}/>}
        <div style={{flex:1,textAlign:'center'}}>{selT&&tache?<div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tache.titre}</div>:sel&&ar?<div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H}}>{ar.nom}</div>:<div style={{fontSize:15,fontWeight:800,color:C.text,fontFamily:H}}>🏗 ChantierPro</div>}</div>
        <button onClick={onClose} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 10px',color:C.secondary,fontSize:12,cursor:'pointer',fontFamily:F}}>Admin</button>
      </div>
      {!sel&&<div style={{padding:16}}>{artisans.map(a=>{const at=taches.filter(t=>t.artisanId===a.id&&['en_cours','planifie','en_attente'].includes(t.statut)).length;return <div key={a.id} onClick={()=>setSel(a.id)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10,display:'flex',alignItems:'center',gap:14,cursor:'pointer'}}><Av code={a.avatar} color={a.color} size={46}/><div style={{flex:1}}><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:H}}>{a.nom}</div><div style={{fontSize:13,color:C.secondary}}>{a.metier}</div></div>{at>0&&<div style={{background:C.accent,color:'#000',borderRadius:99,width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,fontFamily:H}}>{at}</div>}</div>;})}
      </div>}
      {sel&&!selT&&<div style={{padding:16}}>{arT.map(t=>{const ch=chantiers.find(c=>c.id===t.chantierId);const st=STATUTS[getSt(t)];return <div key={t.id} onClick={()=>setSelT(t.id)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10,cursor:'pointer'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}><div style={{flex:1,marginRight:10}}><div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:H,lineHeight:1.3}}>{t.titre}</div><div style={{fontSize:12,color:C.secondary,marginTop:4}}>{ch?.nom?.split('–')[0]?.trim()}</div></div><Badge label={st.label} color={st.color} bg={st.bg}/></div>
        <div style={{fontSize:12,color:C.muted}}>📅 {fmtDate(t.dateDebut)} → {fmtDate(t.dateFin)} · ⏱ {t.duree}j</div>
        {getSt(t)==='planifie'&&<button onClick={e=>{e.stopPropagation();updSt(t,'en_cours');}} style={{marginTop:12,width:'100%',padding:10,background:C.blue,color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:F}}>▶ Démarrer</button>}
        {getSt(t)==='en_cours'&&<button onClick={e=>{e.stopPropagation();updSt(t,'en_attente');}} style={{marginTop:12,width:'100%',padding:10,background:C.green,color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:F}}>✓ Terminé — demander validation</button>}
      </div>);}
      {arT.length===0&&<div style={{textAlign:'center',padding:40,color:C.muted,fontSize:14}}>Aucune tâche active 🎉</div>}
      </div>}
      {selT&&tache&&(()=>{const ch=chantiers.find(c=>c.id===tache.chantierId);const st=STATUTS[getSt(tache)];return <div style={{padding:16}}>
        <div style={{background:st.bg,border:`1px solid ${st.color}44`,borderRadius:12,padding:'12px 16px',marginBottom:16,textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:st.color,fontFamily:H}}>{st.label}</div></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>{[['Chantier',ch?.nom?.split('–')[0]?.trim()||'—'],['Section',tache.section],['Dates',`${fmtDate(tache.dateDebut)} → ${fmtDate(tache.dateFin)}`],['Durée',`${tache.duree}j`]].map(([l,v],i)=><div key={i} style={{background:C.surface,borderRadius:10,padding:'10px 12px'}}><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:1,fontFamily:H}}>{l}</div><div style={{fontSize:12,color:C.text,marginTop:3,fontWeight:600}}>{v}</div></div>)}</div>
        {tache.description&&<div style={{background:C.surface,borderRadius:10,padding:'12px 14px',fontSize:13,color:C.secondary,marginBottom:14}}>{tache.description}</div>}
        <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:18}}>
          {getSt(tache)==='planifie'&&<button onClick={()=>updSt(tache,'en_cours')} style={{padding:14,background:C.blue,color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:H}}>▶ Démarrer</button>}
          {getSt(tache)==='en_cours'&&<button onClick={()=>updSt(tache,'en_attente')} style={{padding:14,background:C.green,color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:H}}>✓ Terminé — demander validation</button>}
          {getSt(tache)==='refuse'&&<button onClick={()=>updSt(tache,'en_cours')} style={{padding:14,background:C.accent,color:'#000',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:H}}>↩ Reprendre</button>}
        </div>
        <div>
          <div style={{fontSize:10,color:C.secondary,textTransform:'uppercase',letterSpacing:1,fontFamily:H,marginBottom:8}}>Messages</div>
          {tache.commentaires.map((c,i)=><div key={i} style={{background:C.surface,borderRadius:10,padding:'10px 12px',marginBottom:6,fontSize:13,color:C.text}}>{c}</div>)}
          <div style={{display:'flex',gap:8,marginTop:8}}>
            <input value={nc} onChange={e=>setNc(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCom()} placeholder="Votre message…" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 14px',color:C.text,fontSize:14,fontFamily:F,outline:'none'}}/>
            <button onClick={addCom} style={{background:C.accent,border:'none',borderRadius:10,padding:'0 16px',color:'#000',fontSize:18,cursor:'pointer'}}>↑</button>
          </div>
        </div>
      </div>;})()}
    </div>
  </div>;
}

/* ── Chantier Detail ──────────────────────────────────────────── */
function ChantierDetail({chantier:initCh,artisans,allBons,onBack,onRefreshAll,onNewBon}){
  const [chantier,setChantier]=useState(initCh);
  const [raw,setRaw]=useState(null);
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('taches');
  const [selT,setSelT]=useState(null);
  const [showAddT,setShowAddT]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [showEdit,setShowEdit]=useState(false);

  const load=useCallback(async()=>{setLoading(true);const data=await DB.getChantierDetail(chantier.id);setRaw(data);setLoading(false);},[chantier.id]);
  useEffect(()=>{load();},[load]);

  const taches=raw?normalizeTaches(raw,chantier.id):[];
  const sections=raw?.sections||[];
  const chBons=allBons.filter(b=>b.chantier_id===chantier.id);
  const pendingVal=taches.filter(t=>t.statut==='en_attente').length;
  const pendingAch=taches.flatMap(t=>t.achats).filter(a=>a.statut==='a_acheter').length;

  const onDatesChanged=(tempDates)=>{
    if(!raw) return;
    const newTaches=raw.taches.map(t=>{const td=tempDates[t.id];if(!td)return t;return{...t,date_debut:td.dateDebut,date_butoir:td.dateFin};});
    setRaw(p=>({...p,taches:newTaches}));
  };

  return <div style={{display:'flex',flexDirection:'column',gap:16,animation:'fadeIn .2s'}}>
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <Btn onClick={onBack} variant="ghost" small>← Retour</Btn>
      <div style={{flex:1}}>
        <p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2,margin:0}}>Chantier</p>
        <h1 style={{fontSize:20,fontWeight:800,color:C.text,fontFamily:H,margin:'2px 0 0'}}>{chantier.nom}</h1>
      </div>
      <Btn small variant="subtle" onClick={()=>setShowEdit(true)}>✏️ Modifier</Btn>
      <Badge label={`${chantier.avancement||0}%`} color={C.accent}/>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
      {[{l:'Client',v:chantier.client||'—'},{l:'Adresse',v:chantier.adresse||'—',s:true},{l:'Dates',v:`${fmtDate(chantier.date_debut)} → ${fmtDate(chantier.date_fin)}`},{l:'Budget',v:fmtMoney(chantier.budget),a:true}].map((m,i)=>(
        <Card key={i} style={{padding:12}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>{m.l}</div><div style={{fontSize:m.s?11:13,fontWeight:600,color:m.a?C.accent:C.text,fontFamily:F}}>{m.v}</div></Card>
      ))}
    </div>

    <div>
      <Prog value={chantier.avancement||0}/>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}><span style={{fontSize:11,color:C.secondary,fontFamily:F}}>Avancement</span><span style={{fontSize:11,fontWeight:700,color:C.accent,fontFamily:H}}>{chantier.avancement||0}%</span></div>
    </div>

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:'flex',gap:2}}>
        {[['taches','☑ Tâches'],['planning','📅 Planning'],['achats','📦'+(pendingAch>0?' ('+pendingAch+')':'')],['bons','📋'+(chBons.length>0?' ('+chBons.length+')':'')]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:'8px 14px',fontSize:13,fontWeight:600,fontFamily:F,background:'none',border:'none',cursor:'pointer',borderBottom:tab===id?`2px solid ${C.accent}`:'2px solid transparent',color:tab===id?C.accent:C.secondary,marginBottom:-1}}>{label}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:7,paddingBottom:8}}>
        {tab==='taches'&&<><Btn small variant="subtle" onClick={()=>setShowImport(true)}>📄 Importer devis</Btn><Btn small variant="primary" onClick={()=>setShowAddT(true)}>＋ Tâche</Btn></>}
        {tab==='bons'&&<Btn small variant="primary" onClick={()=>onNewBon(chantier.id,null)}>＋ Bon de commande</Btn>}
      </div>
    </div>

    {loading&&<div style={{padding:40,textAlign:'center'}}><Spinner/></div>}

    {!loading&&tab==='taches'&&<div style={{display:'flex',flexDirection:'column',gap:14}}>
      {pendingVal>0&&<div style={{background:`${C.accent}10`,border:`1px solid ${C.accent}33`,borderRadius:10,padding:'10px 14px',fontSize:12,color:C.accent,fontFamily:F}}>⏳ {pendingVal} tâche{pendingVal>1?'s':''} en attente de validation</div>}
      {[...new Set(taches.map(t=>t.section))].map(sec=>(
        <div key={sec}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><div style={{width:3,height:15,background:C.accent,borderRadius:2}}/><h3 style={{fontSize:11,fontWeight:700,color:C.text,fontFamily:H,textTransform:'uppercase',letterSpacing:1,margin:0}}>{sec}</h3></div>
          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {taches.filter(t=>t.section===sec).map(t=>{const ar=artisans.find(a=>a.id===t.artisanId);const st=STATUTS[t.statut];return <Card key={t.id} onClick={()=>setSelT(t)} hover style={{padding:'11px 14px'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                {ar?<Av code={ar.avatar} color={ar.color} size={28}/>:<div style={{width:28,height:28,borderRadius:'50%',background:C.border,flexShrink:0}}/>}
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{t.titre}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>{ar?.nom||'Non assigné'} · {fmtDate(t.dateDebut)}→{fmtDate(t.dateFin)} · {t.duree}j</div></div>
                <div style={{display:'flex',alignItems:'center',gap:5}}>{t.achats.length>0&&<Badge label={`📦${t.achats.length}`} color={C.secondary}/>}{t.commentaires.length>0&&<Badge label={`💬${t.commentaires.length}`} color={C.secondary}/>}<Badge label={st.label} color={st.color} bg={st.bg}/></div>
              </div>
            </Card>;})}
          </div>
        </div>
      ))}
      {taches.length===0&&<div style={{textAlign:'center',padding:'36px 20px',color:C.muted,fontFamily:F}}><div style={{fontSize:34,marginBottom:10}}>📋</div><div style={{fontSize:14,marginBottom:12}}>Aucune tâche</div><div style={{display:'flex',gap:10,justifyContent:'center'}}><Btn onClick={()=>setShowImport(true)} variant="subtle">📄 Importer un devis</Btn><Btn onClick={()=>setShowAddT(true)} variant="primary">＋ Créer une tâche</Btn></div></div>}
    </div>}

    {!loading&&tab==='planning'&&<DraggableGantt taches={taches} artisans={artisans} chantierId={chantier.id} onDatesChanged={onDatesChanged}/>}

    {!loading&&tab==='achats'&&<div style={{display:'flex',flexDirection:'column',gap:7}}>
      {taches.flatMap(t=>t.achats.map(a=>({...a,tache:t}))).map(({tache,...a})=>{const ast=ACHAT_ST[a.statut];return <Card key={a.id} style={{padding:'11px 14px'}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:8,height:8,borderRadius:'50%',background:ast.color,flexShrink:0}}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{a.libelle}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>→ {tache.titre}</div></div><select value={a.statut} onChange={e=>{DB.updateAchatStatut(a.id,e.target.value);load();}} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'5px 9px',color:ast.color,fontSize:12,fontFamily:F,cursor:'pointer',outline:'none'}}>{Object.entries(ACHAT_ST).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div></Card>;})}
      {taches.flatMap(t=>t.achats).length===0&&<div style={{color:C.muted,fontFamily:F,padding:16,fontSize:13}}>Aucun achat renseigné.</div>}
    </div>}

    {!loading&&tab==='bons'&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
      {chBons.length===0&&<div style={{color:C.muted,fontFamily:F,padding:16,fontSize:13}}>Aucun bon de commande.</div>}
      {chBons.map(b=>{const ar=artisans.find(a=>a.id===b.intervenant_id);return <Card key={b.id} style={{padding:'12px 16px'}}><div style={{display:'flex',alignItems:'center',gap:12}}>{ar&&<Av code={ar.avatar} color={ar.color} size={32}/>}<div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:H}}>{b.num}</div><div style={{fontSize:11,color:C.secondary,fontFamily:F,marginTop:2}}>{ar?.nom}{b.date_butoir?` · butoir ${fmtDate(b.date_butoir)}`:''}</div></div><Badge label={new Date(b.created_at).toLocaleDateString('fr-FR')} color={C.secondary}/></div></Card>;})}
    </div>}

    {selT&&<TacheModal tache={selT} artisans={artisans} onClose={()=>setSelT(null)} onSaved={()=>{load();setSelT(null);}}/>}
    {showAddT&&<AddTacheModal chantierId={chantier.id} artisans={artisans} existingSections={sections} onSaved={()=>{load();setShowAddT(false);}} onClose={()=>setShowAddT(false)}/>}
    {showImport&&<ImportDevisModal chantierId={chantier.id} chantierNom={chantier.nom.split('–')[0].trim()} artisans={artisans} existingSections={sections} onSaved={()=>{load();setShowImport(false);}} onClose={()=>setShowImport(false)}/>}
    {showEdit&&<EditChantierModal chantier={chantier} onSaved={async()=>{const ch=await DB.listChantiers();setChantier(ch.find(c=>c.id===chantier.id)||chantier);onRefreshAll();setShowEdit(false);}} onClose={()=>setShowEdit(false)}/>}
  </div>;
}

/* ── Dashboard ────────────────────────────────────────────────── */

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}}>
        {kpis.map((k,i)=><Card key={i} onClick={k.fn} hover style={{display:'flex',alignItems:'center',gap:14,padding:16}}><div style={{fontSize:26}}>{k.icon}</div><div><div style={{fontSize:26,fontWeight:800,color:k.color,fontFamily:H,lineHeight:1}}>{k.v}</div><div style={{fontSize:12,color:C.secondary,marginTop:3,fontFamily:F}}>{k.l}</div></div></Card>)}

        <div><h2 style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:H,marginBottom:10}}>Tâches actives</h2>{recent.map(t=>{const ch=chantiers.find(c=>c.id===t.chantierId);const st=STATUTS[t.statut];return <Card key={t.id} style={{marginBottom:7,padding:12}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:12,fontWeight:600,color:C.text,fontFamily:F}}>{t.titre}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>{ch?.nom?.split('–')[0]?.trim()}</div></div><Badge label={st.label} color={st.color} bg={st.bg}/></div></Card>;})}
        {recent.length===0&&<div style={{color:C.muted,fontSize:13,fontFamily:F,padding:'20px 0'}}>Aucune tâche active</div>}</div>

    </>}

function NewChantierForm({onSaved,onCancel}){
  const [f,setF]=useState({nom:'',adresse:'',client:'',dateDebut:'',dateFin:'',budget:''});const [saving,setSaving]=useState(false);const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const save=async()=>{if(!f.nom.trim())return;setSaving(true);try{await DB.createChantier(f);onSaved();}catch(e){alert('Erreur: '+e.message);}setSaving(false);};
  return <div style={{display:'flex',flexDirection:'column',gap:20,animation:'fadeIn .2s'}}>
    <div style={{display:'flex',alignItems:'center',gap:12}}><Btn onClick={onCancel} variant="ghost" small>← Retour</Btn><h1 style={{fontSize:22,fontWeight:800,color:C.text,fontFamily:H,margin:0}}>Nouveau chantier</h1></div>
    <Card style={{maxWidth:560,display:'flex',flexDirection:'column',gap:14}}>
      <FInput label="Nom du chantier" value={f.nom} onChange={e=>u('nom',e.target.value)} placeholder="Villa Martin – Rénovation complète"/>

      <FInput label="Client" value={f.client} onChange={e=>u('client',e.target.value)} placeholder="Nom du client"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FInput label="Début" type="date" value={f.dateDebut} onChange={e=>u('dateDebut',e.target.value)}/>
        <FInput label="Fin prévue" type="date" value={f.dateFin} onChange={e=>u('dateFin',e.target.value)}/>
      </div>
      <FInput label="Budget (€)" type="number" value={f.budget} onChange={e=>u('budget',e.target.value)} placeholder="50000"/>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',paddingTop:6,borderTop:`1px solid ${C.border}`}}><Btn onClick={onCancel} variant="ghost">Annuler</Btn><Btn onClick={save} variant="primary" loading={saving}>Créer</Btn></div>
    </Card>
  </div>;
}

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2,margin:0}}>Équipe</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:'4px 0 0'}}>Artisans</h1></div><Btn variant="primary" onClick={()=>setShowAdd(true)}>＋ Ajouter un artisan</Btn></div>
    {loading?<div style={{padding:40,textAlign:'center'}}><Spinner/></div>:<>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:12}}>
        {stats.map(a=><Card key={a.id} onClick={()=>setSel(sel===a.id?null:a.id)} hover style={{border:`1px solid ${sel===a.id?a.color+'55':C.border}`,background:sel===a.id?`${a.color}0a`:C.card}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}><Av code={a.avatar} color={a.color} size={38}/><div><div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H}}>{a.nom}</div><div style={{fontSize:12,color:C.secondary,fontFamily:F}}>{a.metier}</div></div></div><div style={{display:'flex',gap:7,flexWrap:'wrap'}}><Badge label={`${a.total} tâches`} color={C.secondary}/>{a.ec>0&&<Badge label={`${a.ec} en cours`} color={C.blue} bg="rgba(59,130,246,.1)"/>}{a.ok>0&&<Badge label={`${a.ok} validées`} color={C.green} bg="rgba(16,185,129,.1)"/>}</div><div style={{fontSize:11,color:C.muted,marginTop:7,fontFamily:F}}>📞 {a.tel||'—'}</div></Card>)}
        {artisans.length===0&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:'50px 20px',color:C.muted,fontFamily:F}}><div style={{fontSize:36,marginBottom:12}}>👷</div><Btn onClick={()=>setShowAdd(true)} variant="primary">＋ Ajouter</Btn></div>}
      </div>
      {ar&&<Card style={{border:`1px solid ${ar.color}33`}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}><Av code={ar.avatar} color={ar.color} size={44}/><div style={{flex:1}}><h2 style={{fontSize:17,fontWeight:800,color:C.text,fontFamily:H,margin:0}}>{ar.nom}</h2><div style={{fontSize:13,color:C.secondary,fontFamily:F}}>{ar.metier}{ar.entreprise?` · ${ar.entreprise}`:''}{ar.tel?` · ${ar.tel}`:''}</div></div><Btn small variant="subtle" onClick={()=>onNewBon(null,ar.id)}>📋 Bon de commande</Btn></div>
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          {allTaches.filter(t=>t.artisanId===ar.id).map(t=>{const ch=chantiers.find(c=>c.id===t.chantierId);const st=STATUTS[t.statut];return <div key={t.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:C.surface,borderRadius:10}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{t.titre}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>{ch?.nom?.split('–')[0]?.trim()} · {fmtDate(t.dateDebut)}→{fmtDate(t.dateFin)}</div></div><Badge label={st.label} color={st.color} bg={st.bg}/></div>;})}
          {allTaches.filter(t=>t.artisanId===ar.id).length===0&&<div style={{color:C.muted,fontSize:12,fontFamily:F,padding:8}}>Aucune tâche.</div>}
        </div>
      </Card>}
    </>}
    {showAdd&&<AddArtisanModal onSaved={()=>{onRefresh();setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
  </div>;
}

function AchatsGlobal({allTaches,chantiers,loading,onRefresh}){
  const [fst,setFst]=useState('all');
  const all=allTaches.flatMap(t=>t.achats.map(a=>({...a,tache:t,ch:chantiers.find(c=>c.id===t.chantierId)})));
  const filtered=all.filter(a=>fst==='all'||a.statut===fst);
  const counts={}; Object.keys(ACHAT_ST).forEach(k=>{counts[k]=all.filter(a=>a.statut===k).length;});
  return <div style={{display:'flex',flexDirection:'column',gap:18,animation:'fadeIn .2s'}}>
    <div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2,margin:0}}>Approvisionnement</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:'4px 0 0'}}>Gestion des achats</h1></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>{Object.entries(ACHAT_ST).map(([k,v])=><Card key={k} onClick={()=>setFst(fst===k?'all':k)} hover style={{padding:14,border:`1px solid ${fst===k?v.color+'55':C.border}`,cursor:'pointer'}}><div style={{fontSize:24,fontWeight:800,color:v.color,fontFamily:H}}>{counts[k]||0}</div><div style={{fontSize:12,color:C.secondary,marginTop:2,fontFamily:F}}>{v.label}</div></Card>)}</div>
    {loading?<div style={{padding:40,textAlign:'center'}}><Spinner/></div>:<div style={{display:'flex',flexDirection:'column',gap:7}}>
      {filtered.length===0&&<div style={{color:C.muted,fontFamily:F,padding:16,fontSize:13}}>Aucun achat.</div>}
      {filtered.map(({tache,ch,...a})=>{const ast=ACHAT_ST[a.statut];return <Card key={a.id} style={{padding:'11px 14px'}}><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:8,height:8,borderRadius:'50%',background:ast.color,flexShrink:0}}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{a.libelle}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>{ch?.nom?.split('–')[0]?.trim()} · {tache.titre}</div></div><select value={a.statut} onChange={e=>{DB.updateAchatStatut(a.id,e.target.value).then(onRefresh);}} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'5px 9px',color:ast.color,fontSize:12,fontFamily:F,cursor:'pointer',outline:'none'}}>{Object.entries(ACHAT_ST).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div></Card>;})}
    </div>}
  </div>;
}

/* ── Planning Global View ─────────────────────────────────────── */
function PlanningGlobalView({chantiers,artisans,allTaches,loading,loadAll}){
  const [grp,setGrp]=useState('chantier');
  const valid=allTaches.filter(t=>t.dateDebut&&t.dateFin);
  if(loading)return <div style={{padding:40,textAlign:'center'}}><Spinner/></div>;
  if(!valid.length)return(
    <div style={{display:'flex',flexDirection:'column',gap:18}}>
      <div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2,margin:0}}>Vue globale</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:'4px 0 0'}}>Planning</h1></div>
      <div style={{color:C.muted,fontFamily:F,padding:20}}>Aucune tâche avec dates. Ajoutez des dates dans les fiches tâches.</div>
    </div>
  );
  const groups=grp==='chantier'
    ?chantiers.map(c=>({label:c.nom.split('–')[0].trim(),items:valid.filter(t=>t.chantierId===c.id),id:c.id,color:C.blue}))
    :artisans.map(a=>({label:a.nom,items:valid.filter(t=>t.artisanId===a.id),id:a.id,color:a.color}));
  return(
    <div style={{display:'flex',flexDirection:'column',gap:18,animation:'fadeIn .2s'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end'}}>
        <div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2,margin:0}}>Vue globale</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:'4px 0 0'}}>Planning</h1></div>
        <div style={{display:'flex',gap:6}}>{[['chantier','Par chantier'],['artisan','Par artisan']].map(([v,l])=><Btn key={v} onClick={()=>setGrp(v)} variant={grp===v?'primary':'ghost'} small>{l}</Btn>)}</div>
      </div>
      {groups.filter(g=>g.items.length>0).map(g=>(
        <div key={g.id}>
          <div style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:H,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:g.color}}/>{g.label}
          </div>
          <DraggableGantt taches={g.items} artisans={artisans} chantierId={g.id} onDatesChanged={loadAll}/>
        </div>
      ))}
    </div>
  );
}

/* ══ ROOT APP ══════════════════════════════════════════════════ */
function App(){
  const [chantiers,setChantiers]=useState([]);
  const [artisans,setArtisans]=useState([]);
  const [bons,setBons]=useState([]);
  const [allTaches,setAllTaches]=useState([]);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('dashboard');
  const [selCh,setSelCh]=useState(null);
  const [newCh,setNewCh]=useState(false);
  const [showMobile,setShowMobile]=useState(false);
  const [showBon,setShowBon]=useState(false);
  const [bonCh,setBonCh]=useState(null);
  const [bonAr,setBonAr]=useState(null);
  const [showAPIKey,setShowAPIKey]=useState(false);
  const [toast,setToast]=useState(null);
  const [hasAPIKey,setHasAPIKey]=useState(!!getAPIKey());

  const notify=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const loadAll=useCallback(async()=>{
    if(!sb){setLoading(false);return;}
    setLoading(true);
    try{
      const [ch,ar,bn]=await Promise.all([DB.listChantiers(),DB.listIntervenants(),DB.listBons()]);
      setChantiers(ch);setArtisans(normalizeArtisans(ar));setBons(bn);
      const allRaw=await Promise.all(ch.map(c=>DB.getChantierDetail(c.id)));
      setAllTaches(allRaw.flatMap((raw,i)=>normalizeTaches(raw,ch[i].id)));
    }catch(e){notify('Erreur: '+e.message,'error');}
    setLoading(false);
  },[]);

  useEffect(()=>{loadAll();},[loadAll]);

  const goTo=(v,cid=null)=>{setView(v);if(cid)setSelCh(cid);setNewCh(false);};
  const openBon=(chId,arId)=>{setBonCh(chId);setBonAr(arId);setShowBon(true);};

  const nav=[{id:'dashboard',label:'Tableau de bord',icon:'⬛'},{id:'chantiers',label:'Chantiers',icon:'🏗'},{id:'planning',label:'Planning',icon:'📅'},{id:'taches',label:'Tâches',icon:'☑'},{id:'artisans',label:'Artisans',icon:'👷'},{id:'achats',label:'Achats',icon:'📦'},{id:'bons',label:'Bons de commande',icon:'📋'}];
  const badges={taches:allTaches.filter(t=>t.statut==='en_attente').length,achats:allTaches.flatMap(t=>t.achats).filter(a=>a.statut==='a_acheter').length,bons:bons.length};



  if(!sb && !loading) return (
    <div style={{height:'100vh',background:C.bg,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:F}}>
      <div style={{textAlign:'center',maxWidth:400,padding:32}}>
        <div style={{fontSize:48,marginBottom:16}}>🔌</div>
        <h2 style={{fontSize:20,fontWeight:800,color:C.text,fontFamily:H,marginBottom:8}}>Base de données non disponible</h2>
        <p style={{fontSize:14,color:C.secondary,lineHeight:1.6,marginBottom:20}}>
          L'aperçu Claude.ai bloque les connexions externes.<br/>
          L'application fonctionne normalement sur votre site <strong style={{color:C.accent}}>support-lch.com</strong>
        </p>
        <div style={{background:C.surface,borderRadius:10,padding:'12px 16px',fontSize:12,color:C.muted,textAlign:'left'}}>
          <div style={{marginBottom:4}}>✓ Uploadez <code style={{color:C.accent}}>chantier.html</code> sur GitHub</div>
          <div style={{marginBottom:4}}>✓ Netlify déploie automatiquement</div>
          <div>✓ Accès via support-lch.com/chantier.html</div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{display:'flex',height:'100vh',background:C.bg,fontFamily:F,overflow:'hidden'}}>
    {/* SIDEBAR */}
    <nav style={{width:215,background:C.surface,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',flexShrink:0}}>
      <div style={{padding:'20px 16px 14px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,borderRadius:9,background:C.accent,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>🏗</div>
        <div><div style={{fontSize:15,fontWeight:800,color:C.text,fontFamily:H,lineHeight:1}}>Chantier</div><div style={{fontSize:9,color:C.accent,fontFamily:H,textTransform:'uppercase',letterSpacing:2,marginTop:1}}>Pro</div></div>
      </div>
      <div style={{flex:1,padding:'10px 8px',display:'flex',flexDirection:'column',gap:1,overflowY:'auto'}}>
        {nav.map(n=>{const active=view===n.id;const badge=badges[n.id];return <button key={n.id} onClick={()=>goTo(n.id)} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 11px',borderRadius:10,background:active?`${C.accent}18`:'transparent',border:active?`1px solid ${C.accent}33`:'1px solid transparent',cursor:'pointer',textAlign:'left',width:'100%'}}>
          <span style={{fontSize:14,lineHeight:1}}>{n.icon}</span>
          <span style={{flex:1,fontSize:13,fontWeight:active?700:500,color:active?C.accent:C.secondary,fontFamily:F}}>{n.label}</span>
          {badge>0&&<Pill n={badge} color={n.id==='achats'?C.red:n.id==='bons'?C.green:C.accent}/>}
        </button>;})}
      </div>
      {/* Config IA */}
      <div style={{padding:'8px 10px',borderTop:`1px solid ${C.border}`}}>
        <button onClick={()=>setShowMobile(true)} style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:10,background:`${C.purple}18`,border:`1px solid ${C.purple}33`,cursor:'pointer',marginBottom:6}}>
          <span style={{fontSize:13}}>📱</span><span style={{fontSize:12,fontWeight:600,color:C.purple,fontFamily:F}}>Vue artisan mobile</span>
        </button>
        <button onClick={()=>setShowAPIKey(true)} style={{width:'100%',display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:10,background:hasAPIKey?`${C.green}10`:`${C.red}10`,border:`1px solid ${hasAPIKey?C.green+'44':C.red+'44'}`,cursor:'pointer'}}>
          <span style={{fontSize:13}}>⚙️</span>
          <span style={{fontSize:12,fontWeight:600,color:hasAPIKey?C.green:C.red,fontFamily:F}}>{hasAPIKey?'IA configurée':'Configurer IA'}</span>
        </button>
      </div>
      <div style={{padding:'10px 14px',borderTop:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:28,height:28,borderRadius:'50%',background:`${C.accent}22`,border:`1.5px solid ${C.accent}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:C.accent,fontFamily:H}}>LC</div>
        <div><div style={{fontSize:12,fontWeight:600,color:C.text,fontFamily:F}}>Louis</div><div style={{fontSize:10,color:C.muted,fontFamily:F}}>Administrateur</div></div>
      </div>
    </nav>

    {/* MAIN */}
    <main style={{flex:1,overflowY:'auto',padding:'26px 30px'}}>
      {view==='dashboard'&&<Dashboard chantiers={chantiers} allTaches={allTaches} loading={loading} onGoTo={goTo}/>}
      {view==='chantiers'&&!newCh&&!selCh&&<ChantiersList chantiers={chantiers} allTaches={allTaches} onSelect={id=>setSelCh(id)} onNew={()=>setNewCh(true)} loading={loading}/>}
      {view==='chantiers'&&newCh&&<NewChantierForm onSaved={()=>{loadAll();setNewCh(false);notify('Chantier créé ✓');}} onCancel={()=>setNewCh(false)}/>}
      {view==='chantiers'&&selCh&&!newCh&&(()=>{const ch=chantiers.find(c=>c.id===selCh);return ch?<ChantierDetail chantier={ch} artisans={artisans} allBons={bons} onBack={()=>setSelCh(null)} onRefreshAll={loadAll} onNewBon={openBon}/>:null;})()}
      {view==='planning'&&<PlanningGlobalView chantiers={chantiers} artisans={artisans} allTaches={allTaches} loading={loading} loadAll={loadAll}/>}
      {view==='taches'&&<ToutesLesTaches allTaches={allTaches} chantiers={chantiers} artisans={artisans} loading={loading} onRefresh={loadAll}/>}
      {view==='artisans'&&<ArtisanView artisans={artisans} allTaches={allTaches} chantiers={chantiers} loading={loading} onRefresh={loadAll} onNewBon={openBon}/>}
      {view==='achats'&&<AchatsGlobal allTaches={allTaches} chantiers={chantiers} loading={loading} onRefresh={loadAll}/>}
      {view==='bons'&&<div style={{display:'flex',flexDirection:'column',gap:18,animation:'fadeIn .2s'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2,margin:0}}>Commandes</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:'4px 0 0'}}>Bons de commande</h1></div><Btn variant="primary" onClick={()=>openBon(null,null)}>＋ Nouveau bon</Btn></div>
          {loading?<div style={{padding:40,textAlign:'center'}}><Spinner/></div>:bons.length===0?<div style={{textAlign:'center',padding:'50px 20px',color:C.muted,fontFamily:F}}><div style={{fontSize:36,marginBottom:12}}>📋</div><Btn onClick={()=>openBon(null,null)} variant="primary">Créer un bon de commande</Btn></div>:
          <div style={{display:'flex',flexDirection:'column',gap:8}}>{bons.map(b=>{const ar=artisans.find(a=>a.id===b.intervenant_id);const ch=chantiers.find(c=>c.id===b.chantier_id);return <Card key={b.id} style={{padding:'14px 16px'}}><div style={{display:'flex',alignItems:'center',gap:14}}>{ar&&<Av code={ar.avatar} color={ar.color} size={36}/>}<div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H}}>{b.num}</div><div style={{fontSize:12,color:C.secondary,fontFamily:F,marginTop:2}}>{ar?.nom} · {ch?.nom?.split('–')[0]?.trim()}</div><div style={{fontSize:11,color:C.muted,marginTop:2,fontFamily:F}}>{b.bons_taches?.length||0} tâche{(b.bons_taches?.length||0)>1?'s':''}{b.date_butoir?` · ${fmtDate(b.date_butoir)}`:''}</div></div><Badge label={new Date(b.created_at).toLocaleDateString('fr-FR')} color={C.secondary}/></div></Card>;})}</div>}
        </div>}
    </main>

    {showMobile&&<MobileView artisans={artisans} taches={allTaches} chantiers={chantiers} onClose={()=>setShowMobile(false)}/>}
    {showBon&&<BonCommandeModal chantiers={chantiers} artisans={artisans} allTaches={allTaches} prefillCh={bonCh} prefillAr={bonAr} onSaved={()=>{loadAll();setShowBon(false);notify('Bon créé ✓');}} onClose={()=>setShowBon(false)}/>}
    {showAPIKey&&<APIKeyModal onClose={()=>{setHasAPIKey(!!getAPIKey());setShowAPIKey(false);}}/>}
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
  </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
