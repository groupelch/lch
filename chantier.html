/* ── Gantt ── */
function Gantt({taches,artisans}) {
  if(!taches.length) return <div style={{color:C.muted,padding:20,fontFamily:F,fontSize:13}}>Aucune tâche planifiée.</div>;
  const allD=taches.flatMap(t=>[new Date(t.dateDebut),new Date(t.dateFin)].filter(d=>!isNaN(d)));
  if(!allD.length) return <div style={{color:C.muted,padding:20,fontFamily:F}}>Dates manquantes.</div>;
  const minD=new Date(Math.min(...allD)); minD.setDate(minD.getDate()-2);
  const maxD=new Date(Math.max(...allD)); maxD.setDate(maxD.getDate()+5);
  const total=Math.ceil((maxD-minD)/864e5)||1;
  const xp=d=>((new Date(d)-minD)/864e5/total)*100;
  const wp=(d1,d2)=>Math.max(((new Date(d2)-new Date(d1))/864e5/total)*100,1.5);
  const tks=[]; const d=new Date(minD); while(d<=maxD){tks.push(new Date(d));d.setDate(d.getDate()+7);}
  const bc={planifie:C.secondary,en_cours:C.blue,en_attente:C.accent,valide:C.green,refuse:C.red};
  return (
    <div style={{overflowX:"auto"}}>
      <Card style={{padding:0,overflow:"hidden",minWidth:560}}>
        <div style={{display:"grid",gridTemplateColumns:"185px 1fr",borderBottom:`1px solid ${C.border}`}}>
          <div style={{padding:"10px 14px",borderRight:`1px solid ${C.border}`,fontSize:10,color:C.muted,fontFamily:H,textTransform:"uppercase",letterSpacing:1}}>Tâche</div>
          <div style={{position:"relative",height:32}}>
            {tks.map((t,i)=><div key={i} style={{position:"absolute",left:`${xp(t)}%`,top:0,height:"100%",borderLeft:`1px dashed ${C.border}`,paddingLeft:3,display:"flex",alignItems:"center"}}><span style={{fontSize:9,color:C.muted,fontFamily:F,whiteSpace:"nowrap"}}>{t.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}</span></div>)}
            {(()=>{const p=xp(new Date());return(p>0&&p<100)&&<div style={{position:"absolute",left:`${p}%`,top:0,height:"100%",borderLeft:`2px solid ${C.red}`,zIndex:2}}><div style={{background:C.red,color:"#fff",fontSize:8,padding:"0 3px",borderRadius:"0 3px 3px 0",fontFamily:F,lineHeight:"14px",whiteSpace:"nowrap"}}>Auj.</div></div>;})()}
          </div>
        </div>
        {taches.map(t=>{
          const ar=artisans.find(a=>a.id===t.artisanId);
          const px=xp(t.dateDebut),pw=wp(t.dateDebut,t.dateFin);
          return (
            <div key={t.id} style={{display:"grid",gridTemplateColumns:"185px 1fr",borderBottom:`1px solid ${C.border}`}}>
              <div style={{padding:"6px 14px",borderRight:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6}}>
                {ar&&<Av code={ar.avatar} color={ar.color} size={20}/>}
                <span style={{fontSize:11,color:C.text,fontFamily:F,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.titre}</span>
              </div>
              <div style={{position:"relative",height:32}}>
                <div title={`${t.titre} — ${t.duree}j`} style={{position:"absolute",top:"22%",left:`${px}%`,width:`${pw}%`,height:"56%",background:bc[t.statut]||C.secondary,borderRadius:4,opacity:.82,display:"flex",alignItems:"center",paddingLeft:5}}>
                  <span style={{fontSize:9,color:"#fff",fontFamily:F,whiteSpace:"nowrap",overflow:"hidden"}}>{t.duree}j</span>
                </div>
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

/* ── Import Devis Modal ── */
function ImportDevisModal({chantierId,chantierNom,artisans,onImport,onClose}) {
  const [step,setStep]=useState("upload");
  const [lines,setLines]=useState([]);
  const [error,setError]=useState("");
  const fileRef=useRef();

  const extractWithAI = async (content) => {
    setStep("extracting"); setError("");
    const prompt=`Tu es un expert BTP. Analyse ce devis/bordereau de chantier "${chantierNom}" et extrais toutes les lignes de travaux.
Pour chaque ligne, renvoie un objet JSON avec : titre (string), section (parmi: ${SECTIONS.join(", ")}), description (string), duree (number jours), prixUnitaire (number|null), quantite (number|null), unite (string).
Réponds UNIQUEMENT avec un tableau JSON valide, sans backticks, sans texte.
Si le contenu est vide ou insuffisant, génère 5 exemples réalistes pour ce chantier.
Contenu : ${content.slice(0,3000)}`;
    try {
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:prompt}]})});
      const data=await res.json();
      const txt=data.content?.find(b=>b.type==="text")?.text||"[]";
      const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
      setLines(parsed.map((l,i)=>({_id:uid(),selected:true,titre:l.titre||"Tâche "+(i+1),section:SECTIONS.includes(l.section)?l.section:"Autre",description:l.description||"",duree:Number(l.duree)||1,prixUnitaire:l.prixUnitaire||null,quantite:l.quantite||null,unite:l.unite||"forfait",artisanId:artisans[0]?.id||"",dateDebut:"",dateFin:"",priorite:"normale"})));
      setStep("review");
    } catch(e){setError("Erreur : "+e.message);setStep("upload");}
  };

  const readFile=async(file)=>{
    let text="";
    if(file.name.match(/\.(csv|txt)$/i)) text=await file.text();
    else text=`Fichier : ${file.name} (${Math.round(file.size/1024)}ko) — Génère des exemples réalistes pour ce chantier.`;
    await extractWithAI(text);
  };

  const toggle=id=>setLines(l=>l.map(x=>x._id===id?{...x,selected:!x.selected}:x));
  const upd=(id,k,v)=>setLines(l=>l.map(x=>x._id===id?{...x,[k]:v}:x));

  return (
    <Modal title="Import devis / bordereau" subtitle={chantierNom} onClose={onClose} wide>
      {step==="upload"&&(
        <div style={{padding:28,display:"flex",flexDirection:"column",alignItems:"center",gap:18}}>
          <div style={{fontSize:48}}>📄</div>
          <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:H}}>Importer un devis ou bordereau</div><div style={{fontSize:13,color:C.secondary,fontFamily:F,marginTop:4}}>PDF, CSV, Excel ou texte brut</div></div>
          <div onClick={()=>fileRef.current.click()} style={{border:`2px dashed ${C.border}`,borderRadius:14,padding:"28px 40px",cursor:"pointer",textAlign:"center",width:"100%",background:C.surface}}>
            <div style={{fontSize:13,color:C.secondary,fontFamily:F}}>Cliquer pour sélectionner un fichier</div>
          </div>
          <input ref={fileRef} type="file" accept=".pdf,.xlsx,.csv,.txt,.xls" style={{display:"none"}} onChange={e=>e.target.files[0]&&readFile(e.target.files[0])}/>
          <div style={{display:"flex",alignItems:"center",gap:10,width:"100%"}}><div style={{flex:1,height:1,background:C.border}}/><span style={{fontSize:11,color:C.muted,fontFamily:F}}>ou</span><div style={{flex:1,height:1,background:C.border}}/></div>
          <Btn onClick={()=>extractWithAI("Génère des exemples réalistes pour ce chantier de rénovation.")} variant="subtle">✨ Démo — générer des exemples IA</Btn>
          <div style={{background:`${C.blue}10`,border:`1px solid ${C.blue}33`,borderRadius:10,padding:"12px 16px",width:"100%",fontSize:12,color:C.blue,fontFamily:F}}>💡 L'IA extrait automatiquement toutes les lignes et les transforme en tâches. Vous pourrez tout corriger avant l'import.</div>
          {error&&<div style={{color:C.red,fontSize:12,fontFamily:F}}>{error}</div>}
        </div>
      )}
      {step==="extracting"&&(
        <div style={{padding:60,display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
          <div style={{fontSize:40,display:"inline-block",animation:"spin 1.2s linear infinite"}}>⚙️</div>
          <div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:H}}>Analyse en cours…</div>
          <div style={{fontSize:13,color:C.secondary,fontFamily:F}}>L'IA extrait les lignes de votre devis</div>
        </div>
      )}
      {step==="review"&&(
        <>
          <div style={{padding:"12px 20px",background:`${C.green}10`,borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span style={{fontSize:13,color:C.green,fontFamily:F}}>✓ {lines.length} lignes extraites — {lines.filter(l=>l.selected).length} sélectionnées</span>
            <div style={{display:"flex",gap:8}}>
              <Btn small variant="subtle" onClick={()=>setLines(l=>l.map(x=>({...x,selected:true})))}>Tout cocher</Btn>
              <Btn small variant="subtle" onClick={()=>setLines(l=>l.map(x=>({...x,selected:false})))}>Tout décocher</Btn>
            </div>
          </div>
          <div style={{padding:14,display:"flex",flexDirection:"column",gap:9,overflowY:"auto",maxHeight:420}}>
            {lines.map(l=>(
              <div key={l._id} style={{background:l.selected?C.surface:C.bg,border:`1px solid ${l.selected?C.border:C.muted+"22"}`,borderRadius:11,padding:"11px 13px",opacity:l.selected?1:.5}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <input type="checkbox" checked={l.selected} onChange={()=>toggle(l._id)} style={{marginTop:3,accentColor:C.accent,cursor:"pointer",flexShrink:0,width:15,height:15}}/>
                  <div style={{flex:1,display:"grid",gridTemplateColumns:"2fr 1fr 1fr 80px",gap:8}}>
                    <div>
                      <input value={l.titre} onChange={e=>upd(l._id,"titre",e.target.value)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:7,padding:"4px 8px",color:C.text,fontSize:13,fontWeight:600,fontFamily:F,outline:"none",width:"100%"}}/>
                      <div style={{fontSize:11,color:C.muted,marginTop:3,paddingLeft:2,fontFamily:F}}>{l.description||"—"}</div>
                    </div>
                    <select value={l.section} onChange={e=>upd(l._id,"section",e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"4px 7px",color:C.text,fontSize:11,fontFamily:F,outline:"none"}}>
                      {SECTIONS.map(s=><option key={s} value={s}>{s}</option>)}
                    </select>
                    <select value={l.artisanId} onChange={e=>upd(l._id,"artisanId",e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"4px 7px",color:C.text,fontSize:11,fontFamily:F,outline:"none"}}>
                      {artisans.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}
                    </select>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <input type="number" value={l.duree} onChange={e=>upd(l._id,"duree",Number(e.target.value))} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:"4px 6px",color:C.accent,fontSize:12,fontFamily:F,outline:"none",width:44}}/>
                      <span style={{fontSize:11,color:C.muted,fontFamily:F}}>j</span>
                      {l.prixUnitaire&&<span style={{fontSize:10,color:C.green,fontFamily:F}}>{fmtMoney(l.prixUnitaire)}</span>}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <div style={{padding:"14px 20px",borderTop:`1px solid ${C.border}`,display:"flex",gap:8,justifyContent:"flex-end"}}>
            <Btn onClick={()=>setStep("upload")} variant="ghost">← Retour</Btn>
            <Btn onClick={()=>{const taches=lines.filter(l=>l.selected).map(l=>({id:"t"+uid(),chantierId,statut:"planifie",commentaires:[],achats:[],titre:l.titre,section:l.section,description:l.description,duree:l.duree,artisanId:l.artisanId,dateDebut:l.dateDebut,dateFin:l.dateFin,priorite:l.priorite}));onImport(taches);onClose();}} variant="primary" disabled={!lines.filter(l=>l.selected).length}>
              ＋ Importer {lines.filter(l=>l.selected).length} tâche{lines.filter(l=>l.selected).length>1?"s":""}
            </Btn>
          </div>
        </>
      )}
    </Modal>
  );
}

/* ── Mobile Artisan View ── */
function MobileView({artisans,taches,chantiers,onClose}) {

  const [localT,setLocalT]=useState(taches);
  const [nc,setNc]=useState("");
  const ar=sel?artisans.find(a=>a.id===sel):null;
  const arT=ar?localT.filter(t=>t.artisanId===ar.id).sort((a,b)=>{const o={en_cours:0,en_attente:1,refuse:2,planifie:3,valide:4};return(o[a.statut]||5)-(o[b.statut]||5);}):[];
  const tache=selT?localT.find(t=>t.id===selT):null;
  const updT=u=>setLocalT(p=>p.map(t=>t.id===u.id?u:t));

  return (
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:3000,overflowY:"auto"}}>
      <div style={{maxWidth:390,margin:"0 auto",fontFamily:F}}>
        {/* Header */}
        <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"14px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10}}>
          {(sel||selT)
            ? <button onClick={()=>{if(selT)setSelT(null);else setSel(null);}} style={{background:"none",border:"none",color:C.secondary,fontSize:22,cursor:"pointer",padding:0,lineHeight:1}}>←</button>
            : <div style={{width:10}}/>}
          <div style={{flex:1,textAlign:"center"}}>
            {selT&&tache?<div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tache.titre}</div>
            :sel&&ar?<div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H}}>{ar.nom}</div>
            :<div style={{fontSize:15,fontWeight:800,color:C.text,fontFamily:H}}>🏗 ChantierPro</div>}
          </div>
          <button onClick={onClose} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",color:C.secondary,fontSize:12,cursor:"pointer",fontFamily:F}}>Admin</button>
        </div>

        {/* Artisan list */}
        {!sel&&(
          <div style={{padding:16}}>
            <div style={{fontSize:11,color:C.secondary,fontFamily:H,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Sélectionner votre profil</div>
            {artisans.map(a=>{
              const at=localT.filter(t=>t.artisanId===a.id&&["en_cours","planifie","en_attente"].includes(t.statut)).length;
              return (
                <div key={a.id} onClick={()=>setSel(a.id)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10,display:"flex",alignItems:"center",gap:14,cursor:"pointer"}}>
                  <Av code={a.avatar} color={a.color} size={46}/>
                  <div style={{flex:1}}><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:H}}>{a.nom}</div><div style={{fontSize:13,color:C.secondary}}>{a.metier}</div></div>
                  {at>0&&<div style={{background:C.accent,color:"#000",borderRadius:99,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,fontFamily:H}}>{at}</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* Tache list */}
        {sel&&!selT&&(
          <div style={{padding:16}}>
            <div style={{fontSize:11,color:C.secondary,fontFamily:H,textTransform:"uppercase",letterSpacing:1,marginBottom:12}}>{arT.length} tâche{arT.length>1?"s":""} assignée{arT.length>1?"s":""}</div>
            {arT.map(t=>{
              const ch=chantiers.find(c=>c.id===t.chantierId);const st=STATUTS[t.statut];
              return (
                <div key={t.id} onClick={()=>setSelT(t.id)} style={{background:C.card,border:`1px solid ${t.statut==="en_attente"?C.accent+"44":C.border}`,borderRadius:14,padding:16,marginBottom:10,cursor:"pointer"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{flex:1,marginRight:10}}><div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:H,lineHeight:1.3}}>{t.titre}</div><div style={{fontSize:12,color:C.secondary,marginTop:4}}>{ch?.nom.split("–")[0].trim()} · {t.section}</div></div>
                    <Badge label={st.label} color={st.color} bg={st.bg}/>
                  </div>
                  <div style={{fontSize:12,color:C.muted}}>📅 {fmtDate(t.dateDebut)} → {fmtDate(t.dateFin)} · ⏱ {t.duree}j</div>
                  {t.statut==="planifie"&&<button onClick={e=>{e.stopPropagation();updT({...t,statut:"en_cours"});}} style={{marginTop:12,width:"100%",padding:"10px",background:C.blue,color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:F}}>▶ Démarrer</button>}
                  {t.statut==="en_cours"&&<button onClick={e=>{e.stopPropagation();updT({...t,statut:"en_attente"});}} style={{marginTop:12,width:"100%",padding:"10px",background:C.green,color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:F}}>✓ Travaux terminés — demander validation</button>}
                </div>
              );
            })}
            {arT.length===0&&<div style={{textAlign:"center",padding:40,color:C.muted,fontSize:14}}>Aucune tâche active 🎉</div>}
          </div>
        )}

        {/* Tache detail */}
        {selT&&tache&&(()=>{
          const ch=chantiers.find(c=>c.id===tache.chantierId);const st=STATUTS[tache.statut];
          return (
            <div style={{padding:16}}>
              <div style={{background:st.bg,border:`1px solid ${st.color}44`,borderRadius:12,padding:"12px 16px",marginBottom:16,textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:st.color,fontFamily:H}}>{st.label}</div></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                {[["Chantier",ch?.nom.split("–")[0].trim()||"—"],["Section",tache.section],["Dates",`${fmtDate(tache.dateDebut)} → ${fmtDate(tache.dateFin)}`],["Durée",`${tache.duree}j`]].map(([l,v],i)=>(
                  <div key={i} style={{background:C.surface,borderRadius:10,padding:"10px 12px"}}><div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,fontFamily:H}}>{l}</div><div style={{fontSize:12,color:C.text,marginTop:3,fontWeight:600}}>{v}</div></div>
                ))}
              </div>
              {tache.description&&<div style={{background:C.surface,borderRadius:10,padding:"12px 14px",fontSize:13,color:C.secondary,marginBottom:14}}>{tache.description}</div>}
              <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:18}}>
                {tache.statut==="planifie"&&<button onClick={()=>updT({...tache,statut:"en_cours"})} style={{padding:14,background:C.blue,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:H}}>▶ Démarrer</button>}
                {tache.statut==="en_cours"&&<button onClick={()=>updT({...tache,statut:"en_attente"})} style={{padding:14,background:C.green,color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:H}}>✓ Terminé — demander validation</button>}
                {tache.statut==="refuse"&&<button onClick={()=>updT({...tache,statut:"en_cours"})} style={{padding:14,background:C.accent,color:"#000",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:H}}>↩ Reprendre les travaux</button>}
              </div>
              {tache.achats.length>0&&(
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:10,color:C.secondary,textTransform:"uppercase",letterSpacing:1,fontFamily:H,marginBottom:8}}>Matériaux</div>
                  {tache.achats.map(a=>{const ast=ACHAT_ST[a.statut];return(<div key={a.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}><span style={{fontSize:13,color:C.text}}>{a.libelle}</span><Badge label={ast.label} color={ast.color}/></div>);})}
                </div>
              )}
              <div>
                <div style={{fontSize:10,color:C.secondary,textTransform:"uppercase",letterSpacing:1,fontFamily:H,marginBottom:8}}>Messages ({tache.commentaires.length})</div>
                {tache.commentaires.map((c,i)=><div key={i} style={{background:C.surface,borderRadius:10,padding:"10px 12px",marginBottom:6,fontSize:13,color:C.text}}>{c}</div>)}
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <input value={nc} onChange={e=>setNc(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&nc.trim()){const ts=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});updT({...tache,commentaires:[...tache.commentaires,`${nc} — ${ts}`]});setNc("");}}} placeholder="Votre message…" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",color:C.text,fontSize:14,fontFamily:F,outline:"none"}}/>
                  <button onClick={()=>{if(nc.trim()){const ts=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});updT({...tache,commentaires:[...tache.commentaires,`${nc} — ${ts}`]});setNc("");}}} style={{background:C.accent,border:"none",borderRadius:10,padding:"0 16px",color:"#000",fontSize:18,cursor:"pointer"}}>↑</button>
                </div>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

/* ── Chantier Detail ── */
function ChantierDetail({chantier,taches,artisans,bons,onBack,onUpdT,onAddT,onNewBon}) {
  const ct=taches.filter(t=>t.chantierId===chantier.id);
  const sections=[...new Set(ct.map(t=>t.section))];
  const [selT,setSelT]=useState(null);
  const [tab,setTab]=useState("taches");
  const [showAddT,setShowAddT]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const chBons=bons.filter(b=>b.chantierId===chantier.id);
  const pendingAchats=ct.flatMap(t=>t.achats).filter(a=>a.statut==="a_acheter").length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16,animation:"fadeIn .2s"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <Btn onClick={onBack} variant="ghost" small>← Retour</Btn>
        <div style={{flex:1}}><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:"uppercase",letterSpacing:2,margin:0}}>Chantier</p><h1 style={{fontSize:20,fontWeight:800,color:C.text,fontFamily:H,margin:"2px 0 0"}}>{chantier.nom}</h1></div>
        <Badge label={`${chantier.avancement}%`} color={C.accent}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {[{l:"Client",v:chantier.client},{l:"Adresse",v:chantier.adresse,s:true},{l:"Dates",v:`${fmtDate(chantier.dateDebut)} → ${fmtDate(chantier.dateFin)}`},{l:"Budget",v:fmtMoney(chantier.budget),a:true}].map((m,i)=>(
          <Card key={i} style={{padding:12}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{m.l}</div><div style={{fontSize:m.s?11:13,fontWeight:600,color:m.a?C.accent:C.text,fontFamily:F}}>{m.v}</div></Card>
        ))}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${C.border}`,paddingBottom:0}}>
        <div style={{display:"flex",gap:2}}>
          {[["taches","☑ Tâches"],["planning","📅 Planning"],["achats",`📦 Achats${pendingAchats>0?` (${pendingAchats})`:""}`],["bons",`📋 BdC${chBons.length>0?` (${chBons.length})`:""}`]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"8px 14px",fontSize:13,fontWeight:600,fontFamily:F,background:"none",border:"none",cursor:"pointer",borderBottom:tab===id?`2px solid ${C.accent}`:"2px solid transparent",color:tab===id?C.accent:C.secondary,marginBottom:-1}}>{label}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:7,paddingBottom:8}}>
          {tab==="taches"&&<><Btn small variant="subtle" onClick={()=>setShowImport(true)}>📄 Importer devis</Btn><Btn small variant="primary" onClick={()=>setShowAddT(true)}>＋ Tâche</Btn></>}
          {tab==="bons"&&<Btn small variant="primary" onClick={()=>onNewBon(chantier.id)}>＋ Bon de commande</Btn>}
        </div>
      </div>

      {tab==="taches"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {ct.filter(t=>t.statut==="en_attente").length>0&&<div style={{background:`${C.accent}10`,border:`1px solid ${C.accent}33`,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.accent,fontFamily:F}}>⏳ {ct.filter(t=>t.statut==="en_attente").length} tâche{ct.filter(t=>t.statut==="en_attente").length>1?"s":""} en attente de validation</div>}
          {sections.map(sec=>(
            <div key={sec}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><div style={{width:3,height:15,background:C.accent,borderRadius:2}}/><h3 style={{fontSize:11,fontWeight:700,color:C.text,fontFamily:H,textTransform:"uppercase",letterSpacing:1,margin:0}}>{sec}</h3><span style={{fontSize:11,color:C.muted,fontFamily:F}}>({ct.filter(t=>t.section===sec).length})</span></div>
              <div style={{display:"flex",flexDirection:"column",gap:7}}>
                {ct.filter(t=>t.section===sec).map(t=>{const ar=artisans.find(a=>a.id===t.artisanId);const st=STATUTS[t.statut];return(
                  <Card key={t.id} onClick={()=>setSelT(t)} hover style={{padding:"11px 14px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      {ar?<Av code={ar.avatar} color={ar.color} size={28}/>:<div style={{width:28,height:28,borderRadius:"50%",background:C.border,flexShrink:0}}/>}
                      <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{t.titre}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>{ar?.nom||"Non assigné"} · {fmtDate(t.dateDebut)}→{fmtDate(t.dateFin)} · {t.duree}j</div></div>
                      <div style={{display:"flex",alignItems:"center",gap:5}}>
                        {t.achats.length>0&&<Badge label={`📦${t.achats.length}`} color={C.secondary}/>}
                        {t.commentaires.length>0&&<Badge label={`💬${t.commentaires.length}`} color={C.secondary}/>}
                        <Badge label={st.label} color={st.color} bg={st.bg}/>
                      </div>
                    </div>
                  </Card>
                );})}
              </div>
            </div>
          ))}
          {ct.length===0&&<div style={{textAlign:"center",padding:"36px 20px",color:C.muted,fontFamily:F}}><div style={{fontSize:34,marginBottom:10}}>📋</div><div style={{fontSize:14,marginBottom:12}}>Aucune tâche sur ce chantier</div><div style={{display:"flex",gap:10,justifyContent:"center"}}><Btn onClick={()=>setShowImport(true)} variant="subtle">📄 Importer un devis</Btn><Btn onClick={()=>setShowAddT(true)} variant="primary">＋ Créer une tâche</Btn></div></div>}
        </div>
      )}
      {tab==="planning"&&<Gantt taches={ct} artisans={artisans}/>}
      {tab==="achats"&&(
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {ct.flatMap(t=>t.achats.map(a=>({...a,tache:t}))).length===0&&<div style={{color:C.muted,fontFamily:F,padding:16,fontSize:13}}>Aucun besoin d'achat renseigné.</div>}
          {ct.flatMap(t=>t.achats.map(a=>({...a,tache:t}))).map(({tache,...a})=>{const ast=ACHAT_ST[a.statut];return(
            <Card key={a.id} style={{padding:"11px 14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:ast.color,flexShrink:0}}/>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{a.libelle}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>→ {tache.titre}</div></div>
                <select value={a.statut} onChange={e=>onUpdT({...tache,achats:tache.achats.map(ac=>ac.id===a.id?{...ac,statut:e.target.value}:ac)})} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 9px",color:ast.color,fontSize:12,fontFamily:F,cursor:"pointer",outline:"none"}}>
                  {Object.entries(ACHAT_ST).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                </select>
              </div>
            </Card>
          );})}
        </div>
      )}
      {tab==="bons"&&(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {chBons.length===0&&<div style={{color:C.muted,fontFamily:F,padding:16,fontSize:13}}>Aucun bon de commande émis.</div>}
          {chBons.map(b=>{const ar=artisans.find(a=>a.id===b.artisanId);return(
            <Card key={b.id} style={{padding:"12px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {ar&&<Av code={ar.avatar} color={ar.color} size={32}/>}
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:H}}>{b.num}</div><div style={{fontSize:11,color:C.secondary,fontFamily:F,marginTop:2}}>{ar?.nom} · {b.taches?.length||0} tâche{(b.taches?.length||0)>1?"s":""}{b.dateButoir?` · butoir ${fmtDate(b.dateButoir)}`:""}</div></div>
                <Badge label={new Date(b.createdAt).toLocaleDateString("fr-FR")} color={C.secondary}/>
              </div>
            </Card>
          );})}
        </div>
      )}
      {selT&&<TacheModal tache={selT} artisans={artisans} onClose={()=>setSelT(null)} onUpdate={u=>{onUpdT(u);setSelT(null);}}/>}
      {showAddT&&<AddTacheModal chantierId={chantier.id} artisans={artisans} onSave={t=>{onAddT(t);setShowAddT(false);}} onClose={()=>setShowAddT(false)}/>}
      {showImport&&<ImportDevisModal chantierId={chantier.id} chantierNom={chantier.nom.split("–")[0].trim()} artisans={artisans} onImport={ts=>ts.forEach(t=>onAddT(t))} onClose={()=>setShowImport(false)}/>}
    </div>
  );
}

              <Prog value={c.avancement}/>
              <div style={{fontSize:11,color:C.muted,marginTop:5,fontFamily:F}}>{fmtDate(c.dateFin)} · {c.client}</div>

        <div>

        </div>
      </div>
    </div>

function NewChantierForm({onSave,onCancel}) {
  const [f,setF]=useState({nom:"",adresse:"",client:"",dateDebut:"",dateFin:"",budget:""});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));

function PlanningGlobal({taches,chantiers,artisans}) {
  const [grp,setGrp]=useState("chantier");
  if(!taches.length) return <div style={{color:C.muted,padding:20,fontFamily:F}}>Aucune tâche planifiée.</div>;
  const allD=taches.flatMap(t=>[new Date(t.dateDebut),new Date(t.dateFin)].filter(d=>!isNaN(d)));
  if(!allD.length) return null;
  const minD=new Date(Math.min(...allD)); minD.setDate(minD.getDate()-2);
  const maxD=new Date(Math.max(...allD)); maxD.setDate(maxD.getDate()+5);
  const total=Math.ceil((maxD-minD)/864e5)||1;
  const xp=d=>((new Date(d)-minD)/864e5/total)*100;
  const wp=(d1,d2)=>Math.max(((new Date(d2)-new Date(d1))/864e5/total)*100,1.5);
  const wks=[]; const wd=new Date(minD); while(wd<=maxD){wks.push(new Date(wd));wd.setDate(wd.getDate()+7);}
  const bc={planifie:C.secondary,en_cours:C.blue,en_attente:C.accent,valide:C.green,refuse:C.red};
  const groups=grp==="chantier"?chantiers.map(c=>({label:c.nom.split("–")[0].trim(),items:taches.filter(t=>t.chantierId===c.id),color:C.blue})):artisans.map(a=>({label:a.nom,items:taches.filter(t=>t.artisanId===a.id),color:a.color}));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18,animation:"fadeIn .2s"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:"uppercase",letterSpacing:2,margin:0}}>Vue globale</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:"4px 0 0"}}>Planning</h1></div>
        <div style={{display:"flex",gap:6}}>{[["chantier","Par chantier"],["artisan","Par artisan"]].map(([v,l])=><Btn key={v} onClick={()=>setGrp(v)} variant={grp===v?"primary":"ghost"} small>{l}</Btn>)}</div>
      </div>
      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"175px 1fr",borderBottom:`1px solid ${C.border}`}}>
          <div style={{padding:"10px 14px",borderRight:`1px solid ${C.border}`,fontSize:10,color:C.muted,fontFamily:H,textTransform:"uppercase",letterSpacing:1}}>Groupe</div>
          <div style={{position:"relative",height:30}}>
            {wks.map((w,i)=><div key={i} style={{position:"absolute",left:`${xp(w)}%`,top:0,height:"100%",borderLeft:`1px dashed ${C.border}`,paddingLeft:3,display:"flex",alignItems:"center"}}><span style={{fontSize:9,color:C.muted,fontFamily:F,whiteSpace:"nowrap"}}>{w.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"})}</span></div>)}
            {(()=>{const p=xp(new Date());return(p>0&&p<100)&&<div style={{position:"absolute",left:`${p}%`,top:0,height:"100%",borderLeft:`2px solid ${C.red}`,zIndex:2}}><div style={{background:C.red,color:"#fff",fontSize:8,padding:"0 3px",borderRadius:"0 3px 3px 0",fontFamily:F,lineHeight:"14px",whiteSpace:"nowrap"}}>Auj.</div></div>;})()}
          </div>
        </div>
        {groups.filter(g=>g.items.length).map((gg,gi)=>(
          <div key={gi}>
            <div style={{display:"grid",gridTemplateColumns:"175px 1fr",background:C.surface,borderBottom:`1px solid ${C.border}`}}><div style={{padding:"6px 14px",borderRight:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:7}}><div style={{width:8,height:8,borderRadius:"50%",background:gg.color}}/><span style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:H}}>{gg.label}</span></div><div style={{height:26}}/></div>
            {gg.items.map(t=>{const ar=artisans.find(a=>a.id===t.artisanId);const px=xp(t.dateDebut),pw=wp(t.dateDebut,t.dateFin);return(
              <div key={t.id} style={{display:"grid",gridTemplateColumns:"175px 1fr",borderBottom:`1px solid ${C.border}`}}>
                <div style={{padding:"5px 14px",borderRight:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6}}>{ar&&<Av code={ar.avatar} color={ar.color} size={18}/>}<span style={{fontSize:11,color:C.secondary,fontFamily:F,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.titre}</span></div>
                <div style={{position:"relative",height:28}}><div title={`${t.titre} — ${t.duree}j`} style={{position:"absolute",top:"20%",left:`${px}%`,width:`${pw}%`,height:"60%",background:bc[t.statut]||C.secondary,borderRadius:4,opacity:.8,paddingLeft:5,display:"flex",alignItems:"center"}}><span style={{fontSize:9,color:"#fff",fontFamily:F,whiteSpace:"nowrap",overflow:"hidden"}}>{t.section}</span></div></div>
              </div>
            );})}
          </div>
        ))}
      </Card>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{Object.entries(STATUTS).map(([k,v])=><div key={k} style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:10,height:10,borderRadius:2,background:bc[k]}}/><span style={{fontSize:11,color:C.secondary,fontFamily:F}}>{v.label}</span></div>)}</div>
    </div>
  );
}

function AchatsGlobal({taches,chantiers,onUpdT}) {
  const [fst,setFst]=useState("all");
  const all=taches.flatMap(t=>t.achats.map(a=>({...a,tache:t,ch:chantiers.find(c=>c.id===t.chantierId)})));
  const filtered=all.filter(a=>fst==="all"||a.statut===fst);
  const counts={}; Object.keys(ACHAT_ST).forEach(k=>{counts[k]=all.filter(a=>a.statut===k).length;});
  return (
    <div style={{display:"flex",flexDirection:"column",gap:18,animation:"fadeIn .2s"}}>
      <div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:"uppercase",letterSpacing:2,margin:0}}>Approvisionnement</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:"4px 0 0"}}>Gestion des achats</h1></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {Object.entries(ACHAT_ST).map(([k,v])=>(
          <Card key={k} onClick={()=>setFst(fst===k?"all":k)} hover style={{padding:14,border:`1px solid ${fst===k?v.color+"55":C.border}`,cursor:"pointer"}}>
            <div style={{fontSize:24,fontWeight:800,color:v.color,fontFamily:H}}>{counts[k]||0}</div>
            <div style={{fontSize:12,color:C.secondary,marginTop:2,fontFamily:F}}>{v.label}</div>
          </Card>
        ))}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {filtered.length===0&&<div style={{color:C.muted,fontFamily:F,padding:16,fontSize:13}}>Aucun achat dans cette catégorie.</div>}
        {filtered.map(({tache,ch,...a})=>{const ast=ACHAT_ST[a.statut];return(
          <Card key={a.id} style={{padding:"11px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:ast.color,flexShrink:0}}/>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{a.libelle}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>{ch?.nom.split("–")[0].trim()} · {tache.titre}</div></div>
              <select value={a.statut} onChange={e=>onUpdT({...tache,achats:tache.achats.map(ac=>ac.id===a.id?{...ac,statut:e.target.value}:ac)})} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"5px 9px",color:ast.color,fontSize:12,fontFamily:F,cursor:"pointer",outline:"none"}}>
                {Object.entries(ACHAT_ST).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
              </select>
            </div>
          </Card>
        );})}
      </div>
    </div>
  );
}

        {view==="chantiers"&&!newCh&&!selCh&&<ChantiersList chantiers={chantiers} taches={taches} onSelect={id=>setSelCh(id)} onNew={()=>setNewCh(true)}/>}
        {view==="chantiers"&&newCh&&<NewChantierForm onSave={c=>{setChantiers(p=>[...p,c]);setNewCh(false);}} onCancel={()=>setNewCh(false)}/>}
        {view==="chantiers"&&selCh&&!newCh&&(()=>{const ch=chantiers.find(c=>c.id===selCh);return ch?<ChantierDetail chantier={ch} taches={taches} artisans={artisans} bons={bons} onBack={()=>setSelCh(null)} onUpdT={updT} onAddT={addT} onNewBon={chId=>openBon(chId||ch.id,null)}/>:null;})()}
        {view==="planning"&&<PlanningGlobal taches={taches} chantiers={chantiers} artisans={artisans}/>}
        {view==="taches"&&<ToutesLesTaches taches={taches} chantiers={chantiers} artisans={artisans} onUpdT={updT} onAddT={addT}/>}
        {view==="artisans"&&<ArtisanView artisans={artisans} taches={taches} chantiers={chantiers} onAddArtisan={addA} onNewBon={openBon}/>}
        {view==="achats"&&<AchatsGlobal taches={taches} chantiers={chantiers} onUpdT={updT}/>}
        {view==="bons"&&(
          <div style={{display:"flex",flexDirection:"column",gap:18,animation:"fadeIn .2s"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><p style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:"uppercase",letterSpacing:2,margin:0}}>Commandes</p><h1 style={{fontSize:24,fontWeight:800,color:C.text,fontFamily:H,margin:"4px 0 0"}}>Bons de commande</h1></div>
              <Btn variant="primary" onClick={()=>openBon(null,null)}>＋ Nouveau bon</Btn>
            </div>
            {bons.length===0&&<div style={{textAlign:"center",padding:"50px 20px",color:C.muted,fontFamily:F}}><div style={{fontSize:36,marginBottom:12}}>📋</div><div style={{fontSize:14,marginBottom:12}}>Aucun bon de commande</div><Btn onClick={()=>openBon(null,null)} variant="primary">Créer un bon de commande</Btn></div>}
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {bons.map(b=>{const ar=artisans.find(a=>a.id===b.artisanId);const ch=chantiers.find(c=>c.id===b.chantierId);return(
                <Card key={b.id} style={{padding:"14px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:14}}>
                    {ar&&<Av code={ar.avatar} color={ar.color} size={36}/>}
                    <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H}}>{b.num}</div><div style={{fontSize:12,color:C.secondary,fontFamily:F,marginTop:2}}>{ar?.nom} ({ar?.metier}) · {ch?.nom.split("–")[0].trim()}</div><div style={{fontSize:11,color:C.muted,marginTop:2,fontFamily:F}}>{b.taches?.length||0} tâche{(b.taches?.length||0)>1?"s":""}{b.dateButoir?` · Butoir : ${fmtDate(b.dateButoir)}`:""}</div></div>
                    <Badge label={new Date(b.createdAt).toLocaleDateString("fr-FR")} color={C.secondary}/>
                  </div>
                </Card>
              );})}
            </div>
          </div>
        )}
      </main>

      {showMobile&&<MobileView artisans={artisans} taches={taches} chantiers={chantiers} onClose={()=>setShowMobile(false)}/>}
      {showBon&&<BonCommandeModal chantiers={chantiers} artisans={artisans} taches={taches} prefillCh={bonCh} prefillAr={bonAr} onSave={b=>{addBon(b);setShowBon(false);goTo("bons");}} onClose={()=>setShowBon(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
