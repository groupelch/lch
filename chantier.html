const fmtDate = d => d ? new Date(d+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}) : '—';

const addDays = (dateStr, days) => { if(!dateStr) return ''; const d=new Date(dateStr+'T12:00:00'); d.setDate(d.getDate()+days); return d.toISOString().split('T')[0]; };
const daysBetween = (d1,d2) => Math.round((new Date(d2+'T12:00:00')-new Date(d1+'T12:00:00'))/864e5);

const LS = {

/* ── DB layer ─────────────────────────────────────────────────── */
const DB = {
  async listChantiers(){ const {data,error}=await sb.from('chantiers').select('*').order('created_at',{ascending:false}); if(error)throw error; return data||[]; },
  async createChantier(d){ const {data,error}=await sb.from('chantiers').insert({id:uid(),nom:d.nom,adresse:d.adresse||'',client:d.client||'',date_debut:d.dateDebut||null,date_fin:d.dateFin||null,budget:Number(d.budget)||0,statut:'planifie',avancement:0}).select().single(); if(error)throw error; return data; },
  async updateChantier(id,d){ const {error}=await sb.from('chantiers').update({nom:d.nom,adresse:d.adresse,client:d.client,date_debut:d.dateDebut||null,date_fin:d.dateFin||null,budget:Number(d.budget)||0,avancement:Number(d.avancement)||0,statut:d.statut}).eq('id',id); if(error)throw error; },

  async getChantierDetail(chantierId){
    const {data:sections}=await sb.from('sections').select('*').eq('chantier_id',chantierId).order('position');
    if(!sections?.length) return {sections:[],taches:[],assignations:[],achats:[],etats:[],commentaires:[]};
    const sIds=sections.map(s=>s.id);
    const {data:taches}=await sb.from('taches').select('*').in('section_id',sIds).order('position');
    if(!taches?.length) return {sections,taches:[],assignations:[],achats:[],etats:[],commentaires:[]};
    const tIds=taches.map(t=>t.id);
    const [asgn,acht,etat,comm]=await Promise.all([sb.from('assignations').select('*').in('tache_id',tIds),sb.from('achats').select('*').in('tache_id',tIds),sb.from('etats').select('*').in('tache_id',tIds),sb.from('commentaires').select('*').in('tache_id',tIds).order('created_at')]);
    return {sections,taches:taches||[],assignations:asgn.data||[],achats:acht.data||[],etats:etat.data||[],commentaires:comm.data||[]};
  },

  async listIntervenants(){ const {data}=await sb.from('intervenants').select('*'); return data||[]; },
  async createIntervenant(d){ const {data,error}=await sb.from('intervenants').insert({id:uid(),label:d.nom,initiales:initials(d.nom),couleur:d.color,bg:`${d.color}22`,metier:d.metier||'',tel:d.tel||'',entreprise:d.entreprise||''}).select().single(); if(error)throw error; return data; },
  async updateIntervenant(id,d){ const {error}=await sb.from('intervenants').update({label:d.nom,initiales:initials(d.nom),couleur:d.color,metier:d.metier||'',tel:d.tel||'',entreprise:d.entreprise||''}).eq('id',id); if(error)throw error; },
  async deleteIntervenant(id){ await sb.from('assignations').delete().eq('intervenant_id',id); await sb.from('intervenants').delete().eq('id',id); },

  /* Sections */
  async getOrCreateSection(chantierId,label,existing){ const found=existing.find(s=>s.label.toLowerCase()===label.toLowerCase()); if(found)return found; const {data,error}=await sb.from('sections').insert({id:uid(),chantier_id:chantierId,label,couleur:'#f59e0b',position:existing.length}).select().single(); if(error)throw error; return data; },
  async createSection(chantierId,label,couleur,position){ const {data,error}=await sb.from('sections').insert({id:uid(),chantier_id:chantierId,label,couleur:couleur||'#f59e0b',position:position||0}).select().single(); if(error)throw error; return data; },
  async updateSection(id,patch){ const {error}=await sb.from('sections').update(patch).eq('id',id); if(error)throw error; },
  async deleteSection(id){ const {data:ts}=await sb.from('taches').select('id').eq('section_id',id); const tIds=(ts||[]).map(t=>t.id); if(tIds.length){ await sb.from('assignations').delete().in('tache_id',tIds); await sb.from('achats').delete().in('tache_id',tIds); await sb.from('etats').delete().in('tache_id',tIds); await sb.from('commentaires').delete().in('tache_id',tIds); await sb.from('taches').delete().in('id',tIds);} await sb.from('sections').delete().eq('id',id); },
  async reorderSections(orderedIds){ await Promise.all(orderedIds.map((id,i)=>sb.from('sections').update({position:i}).eq('id',id))); },

  async createTache(sectionId,d,artisanId){ const id=uid(); const {error}=await sb.from('taches').insert({id,section_id:sectionId,texte:d.titre,description:d.description||'',duree:Number(d.duree)||1,date_debut:d.dateDebut||null,date_butoir:d.dateFin||null,priorite:d.priorite||'normale',statut:'planifie',position:0}); if(error)throw error; await sb.from('etats').insert({tache_id:id,done:false}); if(artisanId)await sb.from('assignations').insert({tache_id:id,intervenant_id:artisanId}); return id; },

  async updateTacheDates(id,dateDebut,dateFin){ await sb.from('taches').update({date_debut:dateDebut||null,date_butoir:dateFin||null}).eq('id',id); },

  async addCommentaire(tacheId,texte){ const {data,error}=await sb.from('commentaires').insert({id:uid(),tache_id:tacheId,texte,auteur:'Louis'}).select().single(); if(error)throw error; return data; },

  async deleteBon(id){ await sb.from('bons_taches').delete().eq('bon_id',id); await sb.from('bons_commande').delete().eq('id',id); LS.del('bc_lines_'+id); LS.del('bc_cfg_'+id); },

/* ── Normalize ────────────────────────────────────────────────── */
function normalizeTaches(raw,chantierId){
  const {sections,taches,assignations,achats,etats,commentaires}=raw;
  return taches.map(t=>{
    const sec=sections.find(s=>s.id===t.section_id);
    const asgn=assignations.find(a=>a.tache_id===t.id);
    const etat=etats.find(e=>e.tache_id===t.id);
    const prix=getTachePrix(t.id);
    return {id:t.id,chantierId,sectionId:t.section_id,section:sec?.label||'Autre',sectionCouleur:sec?.couleur||'#f59e0b',position:t.position||0,titre:t.texte,description:t.description||'',artisanId:asgn?.intervenant_id||null,duree:t.duree||1,dateDebut:t.date_debut||'',dateFin:t.date_butoir||'',priorite:t.priorite||'normale',statut:t.statut||(etat?.done?'valide':'planifie'),prixRevient:prix.revient||0,prixVendu:prix.vendu||0,commentaires:commentaires.filter(c=>c.tache_id===t.id).map(c=>`${c.texte} — ${c.auteur||'Louis'}, ${fmtDate(c.created_at)}`),achats:achats.filter(a=>a.tache_id===t.id).map(a=>{const x=getAchatExtra(a.id);return {id:a.id,libelle:a.libelle,statut:a.statut,prix:x.prix||0,qte:x.qte||1,fournisseur:x.fournisseur||''};})};
  });
}
function normalizeArtisans(list){ return list.map(i=>({id:i.id,nom:i.label,metier:i.metier||'',tel:i.tel||'',entreprise:i.entreprise||'',avatar:i.initiales,color:i.couleur})); }

/* ── Theme (dark + light) ─────────────────────────────────────── */
const DARK ={bg:'#080a0f',surface:'#10131a',card:'#161b27',border:'#1e2540',accent:'#f59e0b',green:'#10b981',red:'#f43f5e',blue:'#3b82f6',purple:'#8b5cf6',text:'#e8ecf4',muted:'#3d4a60',secondary:'#7e8fa8'};
const LIGHT={bg:'#f4f5f8',surface:'#ffffff',card:'#ffffff',border:'#e5e8ee',accent:'#d97706',green:'#059669',red:'#dc2626',blue:'#2563eb',purple:'#7c3aed',text:'#1a1d26',muted:'#a5adbd',secondary:'#5a6478'};

let C={...DARK};
const applyTheme=(pref)=>{const resolved=resolveTheme(pref);Object.assign(C,resolved==='light'?LIGHT:DARK);document.body.setAttribute('data-theme',resolved);return resolved;};
applyTheme(getThemePref());
const H="'Syne',sans-serif", F="'DM Sans',sans-serif";

/* ── Atoms ────────────────────────────────────────────────────── */
const Av=({code,color,size=32})=><div style={{width:size,height:size,borderRadius:'50%',background:`${color}22`,border:`1.5px solid ${color}55`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.3,fontWeight:700,color,fontFamily:H,flexShrink:0}}>{code}</div>;

const Pill=({n,color=C.accent})=><span style={{minWidth:20,height:20,padding:'0 6px',borderRadius:99,background:color,color:'#000',fontSize:10,fontWeight:800,display:'inline-flex',alignItems:'center',justifyContent:'center',fontFamily:H}}>{n}</span>;
const Prog=({value,color=C.accent})=><div style={{width:'100%',height:4,borderRadius:99,background:C.border}}><div style={{width:`${Math.min(value||0,100)}%`,height:'100%',background:color,borderRadius:99,transition:'width .4s'}}/></div>;
const Spinner=()=><div style={{width:20,height:20,border:`2px solid ${C.border}`,borderTopColor:C.accent,borderRadius:'50%',animation:'spin 1s linear infinite',display:'inline-block'}}/>;
const Card=({children,style:sx={},onClick,hover})=>{const [hov,setHov]=useState(false);return <div onClick={onClick} onMouseEnter={()=>hover&&setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:C.card,border:`1px solid ${hov?C.accent+'55':C.border}`,borderRadius:14,padding:18,cursor:onClick?'pointer':'default',transition:'border-color .15s',...sx}}>{children}</div>;};
const Btn=({children,onClick,variant='ghost',small,style:sx={},disabled,loading:ld,active})=>{const v={primary:{background:C.accent,color:'#0a0500',border:'none'},ghost:{background:'transparent',color:C.secondary,border:`1px solid ${C.border}`},danger:{background:`${C.red}15`,color:C.red,border:`1px solid ${C.red}33`},success:{background:`${C.green}15`,color:C.green,border:`1px solid ${C.green}33`},subtle:{background:C.surface,color:C.secondary,border:`1px solid ${C.border}`},purple:{background:`${C.purple}18`,color:C.purple,border:`1px solid ${C.purple}33`},active:{background:`${C.accent}18`,color:C.accent,border:`1px solid ${C.accent}44`}};const vk=active?'active':variant;return <button onClick={onClick} disabled={disabled||ld} style={{display:'inline-flex',alignItems:'center',gap:6,padding:small?'5px 12px':'8px 18px',borderRadius:8,fontSize:small?12:13,fontWeight:600,cursor:(disabled||ld)?'not-allowed':'pointer',fontFamily:F,opacity:(disabled||ld)?.55:1,...(v[vk]||v.ghost),...sx}}>{ld?<Spinner/>:children}</button>;};
const FInput=({label,value,onChange,type='text',placeholder,as,options,rows=3})=>{const base={background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,fontFamily:F,outline:'none',width:'100%',boxSizing:'border-box'};return <div style={{display:'flex',flexDirection:'column',gap:5}}>{label&&<label style={{fontSize:10,fontWeight:600,color:C.secondary,textTransform:'uppercase',letterSpacing:1,fontFamily:H}}>{label}</label>}{as==='select'?<select value={value} onChange={onChange} style={base}>{options?.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>:as==='textarea'?<textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} style={{...base,resize:'vertical'}}/>:<input type={type} value={value} onChange={onChange} placeholder={placeholder} style={base}/>}</div>;};
const Toast=({msg,type='success'})=><div style={{position:'fixed',bottom:24,right:24,background:type==='error'?C.red:C.green,color:'#fff',padding:'10px 18px',borderRadius:10,fontSize:13,fontFamily:F,fontWeight:600,zIndex:9999,animation:'fadeIn .2s'}}>{msg}</div>;
const Modal=({children,onClose,title,subtitle,wide})=><div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.82)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16,animation:'fadeIn .15s'}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}><div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,width:'100%',maxWidth:wide?860:560,maxHeight:'92vh',overflowY:'auto',display:'flex',flexDirection:'column'}}><div style={{padding:'18px 20px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:12,flexShrink:0}}><div style={{flex:1}}>{subtitle&&<div style={{fontSize:10,color:C.secondary,fontFamily:H,textTransform:'uppercase',letterSpacing:2}}>{subtitle}</div>}<div style={{fontSize:16,fontWeight:800,color:C.text,fontFamily:H}}>{title}</div></div><button onClick={onClose} style={{background:'none',border:'none',color:C.secondary,fontSize:24,cursor:'pointer',lineHeight:1,padding:'0 4px'}}>×</button></div>{children}</div></div>;

        <div style={{flex:1}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1}}>Écart</div><div style={{fontSize:16,fontWeight:700,color:total>chantier.budget?C.red:C.blue,fontFamily:H,marginTop:3}}>{fmtMoney(total-(chantier.budget||0))}</div></div>
      </div>

            <input value={d.commentaire||''} onChange={e=>upd(d.id,'commentaire',e.target.value)} placeholder="Commentaire" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:'6px 8px',color:C.muted,fontSize:11,fontFamily:F,outline:'none'}}/>

/* ── Address search (Nominatim) + Mini-map (Leaflet) ─────────── */
function AddressSearch({value,onChange,onGeo,initialGeo}){
  const [q,setQ]=useState(value||'');
  const [results,setResults]=useState([]);
  const [open,setOpen]=useState(false);
  const [busy,setBusy]=useState(false);
  const tmoRef=useRef();
  useEffect(()=>{setQ(value||'');},[value]);
  const search=(text)=>{
    clearTimeout(tmoRef.current);
    if(!text||text.length<3){setResults([]);return;}
    tmoRef.current=setTimeout(async()=>{
      setBusy(true);
      try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=6&q=${encodeURIComponent(text)}`,{headers:{'Accept-Language':'fr'}});const d=await r.json();setResults(d||[]);setOpen(true);}catch(e){setResults([]);}
      setBusy(false);
    },400);
  };
  const pick=(r)=>{const adr=r.display_name;onChange(adr);onGeo({lat:parseFloat(r.lat),lon:parseFloat(r.lon),displayName:adr});setQ(adr);setOpen(false);setResults([]);};
  return <div style={{position:'relative'}}>
    <label style={{fontSize:10,fontWeight:600,color:C.secondary,textTransform:'uppercase',letterSpacing:1,fontFamily:H,display:'block',marginBottom:5}}>Adresse {busy&&<Spinner/>}</label>
    <input value={q} onChange={e=>{setQ(e.target.value);onChange(e.target.value);search(e.target.value);}} onFocus={()=>q.length>=3&&setOpen(true)} placeholder="Tapez 3 lettres pour rechercher…" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,fontFamily:F,outline:'none',width:'100%',boxSizing:'border-box'}}/>
    {open&&results.length>0&&<div style={{position:'absolute',top:'100%',left:0,right:0,background:C.card,border:`1px solid ${C.border}`,borderRadius:8,marginTop:4,maxHeight:240,overflowY:'auto',zIndex:50,boxShadow:'0 8px 24px rgba(0,0,0,.4)'}}>
      {results.map((r,i)=><div key={i} onClick={()=>pick(r)} style={{padding:'8px 12px',cursor:'pointer',fontSize:12,color:C.text,fontFamily:F,borderBottom:i<results.length-1?`1px solid ${C.border}`:'none'}} onMouseEnter={e=>e.currentTarget.style.background=C.surface} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>📍 {r.display_name}</div>)}
    </div>}
  </div>;
}

function MiniMap({geo,height=180}){
  const ref=useRef();
  const mapRef=useRef();
  useEffect(()=>{
    if(!geo||!geo.lat||!ref.current||typeof L==='undefined')return;
    if(mapRef.current){mapRef.current.remove();mapRef.current=null;}
    const m=L.map(ref.current,{zoomControl:true,scrollWheelZoom:false}).setView([geo.lat,geo.lon],15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(m);
    L.marker([geo.lat,geo.lon]).addTo(m).bindPopup(geo.displayName||'Chantier').openPopup();
    mapRef.current=m;
    return()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null;}};
  },[geo?.lat,geo?.lon]);
  if(!geo||!geo.lat) return <div style={{height,background:C.surface,borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:C.muted,fontSize:11,fontFamily:F}}>Aucune adresse géolocalisée</div>;
  return <div ref={ref} style={{height,borderRadius:8,overflow:'hidden',border:`1px solid ${C.border}`}}/>;
}

      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>

          <label style={{fontSize:10,fontWeight:600,color:C.secondary,textTransform:'uppercase',letterSpacing:1,fontFamily:H}}>Avancement ({f.avancement}%)</label>

      </div>
    </div>
    <div style={{padding:'14px 20px',borderTop:`1px solid ${C.border}`,display:'flex',gap:8,justifyContent:'flex-end'}}>
      <Btn onClick={onClose} variant="ghost">Annuler</Btn>
      <Btn onClick={save} variant="primary" loading={saving}>Sauvegarder</Btn>
    </div>
  </Modal>;
}

/* ════════════════════════════════════════════════════════════════
   DRAGGABLE GANTT (existant + conservé)
════════════════════════════════════════════════════════════════ */
function DraggableGantt({taches, artisans, chantierId, onDatesChanged}){
  const LABEL_W = 240;
  const ROW_H = 44;
  const containerRef = useRef();
  const [drag, setDrag] = useState(null);
  const [tempDates, setTempDates] = useState({});
  const [links, setLinks] = useState(()=>getLinks(chantierId));
  const [linkMode, setLinkMode] = useState(false);
  const [linkFirst, setLinkFirst] = useState(null);
  const [savingIds, setSavingIds] = useState(new Set());

  const validRaw = taches.map(completeDates).filter(Boolean);
  const [order,setOrder]=useState(()=>getGanttOrder(chantierId));
  // Trie selon ordre personnalisé si dispo, sinon ordre naturel
  const valid=useMemo(()=>{const ix={};order.forEach((id,i)=>{ix[id]=i;});return [...validRaw].sort((a,b)=>{const ai=ix[a.id]??999;const bi=ix[b.id]??999;if(ai!==bi)return ai-bi;return 0;});},[validRaw.map(t=>t.id).join(),order]);
  const [vDrag,setVDrag]=useState(null);
  const [vOver,setVOver]=useState(null);
  const onRowDragStart=(e,id)=>{e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',id);}catch{}setVDrag(id);};
  const onRowDragOver=(e,id)=>{e.preventDefault();setVOver(id);};
  const onRowDrop=(e,id)=>{e.preventDefault();if(!vDrag||vDrag===id){setVDrag(null);setVOver(null);return;}const ids=valid.map(t=>t.id);const from=ids.indexOf(vDrag);const to=ids.indexOf(id);if(from<0||to<0)return;const reord=[...ids];const [m]=reord.splice(from,1);reord.splice(to,0,m);setOrder(reord);setGanttOrder(chantierId,reord);setVDrag(null);setVOver(null);};

  const {minD, maxD, totalDays, ticks} = useMemo(()=>{
    if(!valid.length) return {minD:null,maxD:null,totalDays:0,ticks:[]};
    const allD = valid.flatMap(t=>[new Date(t.dateDebut+'T12:00:00'),new Date(t.dateFin+'T12:00:00')]);
    const mn = new Date(Math.min(...allD)); mn.setDate(mn.getDate()-3);
    const mx = new Date(Math.max(...allD)); mx.setDate(mx.getDate()+7);
    const td = Math.ceil((mx-mn)/864e5)||1;
    const tks=[]; const d=new Date(mn); while(d<=mx){tks.push(new Date(d));d.setDate(d.getDate()+7);}
    return {minD:mn, maxD:mx, totalDays:td, ticks:tks};
  },[valid.map(t=>t.id+t.dateDebut+t.dateFin).join()]);

  const getPPD = useCallback(()=>{
    if(!containerRef.current||!totalDays) return 0;
    const w = containerRef.current.getBoundingClientRect().width - LABEL_W;
    return w / totalDays;
  },[totalDays]);

  const xpct = (d) => { if(!minD||!d) return 0; return ((new Date(d+'T12:00:00')-minD)/864e5/totalDays)*100; };
  const wpct = (d1,d2) => { if(!d1||!d2) return 0; return Math.max(((new Date(d2+'T12:00:00')-new Date(d1+'T12:00:00'))/864e5/totalDays)*100,0.8); };

  useEffect(()=>{
    if(!drag) return;
    const onMove=(e)=>{
      const ppd=getPPD(); if(!ppd) return;
      const deltaX=e.clientX-drag.startX;
      const deltaDays=Math.round(deltaX/ppd);
      const nd={};
      const applyDelta=(tid,origDebut,origFin)=>{
        if(drag.mode==='move'){ nd[tid]={dateDebut:addDays(origDebut,deltaDays),dateFin:addDays(origFin,deltaDays)}; }
        else { const newFin=addDays(origFin,deltaDays); if(new Date(newFin+'T12:00:00')>new Date(origDebut+'T12:00:00')){ nd[tid]={dateDebut:origDebut,dateFin:newFin}; } }
      };
      applyDelta(drag.tacheId, drag.origDebut, drag.origFin);
      if(drag.mode==='move'){ (drag.linkedIds||[]).forEach(lid=>{ const lt=taches.find(t=>t.id===lid); if(lt) applyDelta(lid,lt.dateDebut,lt.dateFin); }); }
      setTempDates(nd);
    };
    const onUp=async()=>{
      if(Object.keys(tempDates).length){
        const ids=Object.keys(tempDates);
        setSavingIds(new Set(ids));
        await Promise.all(ids.map(id=>{ const td=tempDates[id]; return DB.updateTacheDates(id,td.dateDebut,td.dateFin); }));
        onDatesChanged(tempDates);
        setSavingIds(new Set());
      }
      setDrag(null); setTempDates({});
    };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{ window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
  },[drag,tempDates,getPPD,taches]);

  const onBarDown=(e,t,mode)=>{
    if(linkMode) return;
    e.preventDefault(); e.stopPropagation();
    const allLinked=new Set();
    const collect=(id)=>{ (links[id]||[]).forEach(lid=>{if(!allLinked.has(lid)){allLinked.add(lid);collect(lid);}}); };
    collect(t.id);
    setDrag({tacheId:t.id,mode,startX:e.clientX,origDebut:t.dateDebut,origFin:t.dateFin,linkedIds:[...allLinked]});
  };

  const onBarClick=(e,t)=>{
    if(!linkMode) return;
    e.stopPropagation();
    if(!linkFirst){ setLinkFirst(t.id); return; }
    if(linkFirst===t.id){ setLinkFirst(null); return; }
    const newLinks={...links};
    const a=linkFirst, b=t.id;
    if(!newLinks[a]) newLinks[a]=[];
    if(!newLinks[b]) newLinks[b]=[];
    const alreadyLinked=newLinks[a].includes(b);
    if(alreadyLinked){ newLinks[a]=newLinks[a].filter(x=>x!==b); newLinks[b]=newLinks[b].filter(x=>x!==a); }
    else { newLinks[a]=[...newLinks[a],b]; newLinks[b]=[...newLinks[b],a]; }
    setLinks(newLinks); saveLinks(chantierId,newLinks); setLinkFirst(null);
  };

  const getT=(t)=>{ const td=tempDates[t.id]; return {dateDebut:td?.dateDebut||t.dateDebut, dateFin:td?.dateFin||t.dateFin}; };
  const bc={planifie:C.secondary,en_cours:C.blue,en_attente:C.accent,valide:C.green,refuse:C.red};

  if(!valid.length) return <div style={{padding:24,color:C.muted,fontFamily:F,fontSize:13,textAlign:'center'}}>Aucune tâche avec dates planifiées.</div>;

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <Btn small variant={linkMode?'active':'subtle'} onClick={()=>{setLinkMode(!linkMode);setLinkFirst(null);}}>🔗 {linkMode?'Mode liaison actif — cliquer 2 barres':'Lier des tâches'}</Btn>
        {linkMode&&linkFirst&&<span style={{fontSize:12,color:C.accent,fontFamily:F}}>1ère tâche sélectionnée → cliquez une 2ème</span>}
        {Object.keys(links).length>0&&<Btn small variant="danger" onClick={()=>{const empty={};setLinks(empty);saveLinks(chantierId,empty);}}>✕ Effacer les liaisons</Btn>}
        <span style={{fontSize:11,color:C.muted,fontFamily:F,marginLeft:'auto'}}>Glisser une barre pour déplacer · Bord droit pour redimensionner</span>
      </div>
      <div ref={containerRef} style={{overflowX:'auto',borderRadius:14,border:`1px solid ${C.border}`,background:C.card}}>
        <div style={{display:'grid',gridTemplateColumns:`${LABEL_W}px 1fr`,borderBottom:`1px solid ${C.border}`,position:'sticky',top:0,background:C.card,zIndex:5}}>
          <div style={{padding:'10px 14px',borderRight:`1px solid ${C.border}`,fontSize:10,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1}}>Tâche / Artisan</div>
          <div style={{position:'relative',height:34,minWidth:600}}>
            {ticks.map((t,i)=>{const pct=xpct(t.toISOString().split('T')[0]);return <div key={i} style={{position:'absolute',left:`${pct}%`,top:0,height:'100%',borderLeft:`1px dashed ${C.border}`,paddingLeft:3,display:'flex',alignItems:'center'}}><span style={{fontSize:9,color:C.muted,fontFamily:F,whiteSpace:'nowrap'}}>{t.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'})}</span></div>;})}
            {(()=>{const p=xpct(new Date().toISOString().split('T')[0]);return(p>0&&p<100)&&<div style={{position:'absolute',left:`${p}%`,top:0,height:'100%',borderLeft:`2px solid ${C.red}`,zIndex:2,pointerEvents:'none'}}><div style={{background:C.red,color:'#fff',fontSize:8,padding:'0 3px',borderRadius:'0 3px 3px 0',fontFamily:F,lineHeight:'14px',whiteSpace:'nowrap'}}>Auj.</div></div>;})()}
          </div>
        </div>
        {valid.map(t=>{
          const ar=artisans.find(a=>a.id===t.artisanId);
          const {dateDebut,dateFin}=getT(t);
          const px=xpct(dateDebut), pw=wpct(dateDebut,dateFin);
          const color=bc[t.statut]||C.secondary;
          const isDragging=drag?.tacheId===t.id||drag?.linkedIds?.includes(t.id);
          const isSaving=savingIds.has(t.id);
          const isLinked=Object.keys(links).some(k=>k===t.id&&links[k].length>0);
          const isLinkSelected=linkFirst===t.id;
          return (
            <div key={t.id} style={{display:'grid',gridTemplateColumns:`${LABEL_W}px 1fr`,borderBottom:`1px solid ${C.border}`}}>
              <div draggable onDragStart={e=>onRowDragStart(e,t.id)} onDragOver={e=>onRowDragOver(e,t.id)} onDrop={e=>onRowDrop(e,t.id)} onDragEnd={()=>{setVDrag(null);setVOver(null);}} style={{padding:'6px 12px',borderRight:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:7,background:vOver===t.id?`${C.accent}15`:isLinkSelected?`${C.accent}10`:'transparent',opacity:vDrag===t.id?.4:1,cursor:'grab'}}>
                <span style={{fontSize:10,color:C.muted,flexShrink:0}}>⋮⋮</span>
                {ar?<Av code={ar.avatar} color={ar.color} size={22}/>:<div style={{width:22,height:22,borderRadius:'50%',background:C.border,flexShrink:0}}/>}
                <div style={{overflow:'hidden',flex:1}}>
                  <div style={{fontSize:11,color:C.text,fontFamily:F,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:600}}>{t.titre}</div>
                  <div style={{fontSize:9,color:ar?.color||C.muted,fontFamily:F,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:600}}>{ar?.nom||'Non assigné'}</div>
                  <div style={{fontSize:9,color:C.muted,fontFamily:F}}>{t.section} · {dateDebut?fmtDate(dateDebut):''}{dateFin?' → '+fmtDate(dateFin):''}</div>
                </div>
                {isLinked&&<span style={{fontSize:9,color:C.accent,flexShrink:0}}>🔗</span>}
              </div>
              <div style={{position:'relative',height:ROW_H,minWidth:600,cursor:linkMode?'pointer':'default'}} onClick={e=>linkMode&&onBarClick(e,t)}>
                {ticks.map((tk,i)=>{const pp=xpct(tk.toISOString().split('T')[0]);return <div key={i} style={{position:'absolute',left:`${pp}%`,top:0,bottom:0,borderLeft:`1px dashed ${C.border}`,pointerEvents:'none'}}/>;} )}
                {dateDebut&&dateFin&&<div className="gantt-bar" onMouseDown={e=>onBarDown(e,t,'move')} style={{position:'absolute',top:'18%',left:`${px}%`,width:`${pw}%`,height:'64%',background:color,borderRadius:5,opacity:isDragging?0.7:0.85,zIndex:isDragging?10:1,boxShadow:isDragging?`0 4px 16px ${color}66`:'none',border:isLinkSelected?`2px solid ${C.accent}`:'none',display:'flex',alignItems:'center',paddingLeft:6,minWidth:8}}>
                  <span style={{fontSize:9,color:'#fff',fontFamily:F,whiteSpace:'nowrap',overflow:'hidden',pointerEvents:'none'}}>{isSaving?'…':t.duree+'j'}</span>
                  <div className="resize-handle" onMouseDown={e=>{e.stopPropagation();onBarDown(e,t,'resize');}}/>
                </div>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
        {Object.entries(STATUTS).map(([k,v])=><div key={k} style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:10,height:10,borderRadius:2,background:bc[k]}}/><span style={{fontSize:11,color:C.secondary,fontFamily:F}}>{v.label}</span></div>)}
        <div style={{display:'flex',alignItems:'center',gap:5,marginLeft:'auto'}}><span style={{fontSize:10,color:C.muted,fontFamily:F}}>🔗 = tâches liées (bougent ensemble)</span></div>
      </div>
    </div>
  );
}
/* ════════════════════════════════════════════════════════════════
   AGENDA CALENDRIER (NEW — alternative au Gantt)
   Vue jour/semaine/mois avec drag pour replanifier et redimensionner
════════════════════════════════════════════════════════════════ */
function AgendaCalendar({taches, artisans, chantierId, onDatesChanged}){
  const [mode,setMode]=useState('semaine'); // jour / semaine / mois
  const [anchor,setAnchor]=useState(()=>new Date());
  const [drag,setDrag]=useState(null);
  const [tempDates,setTempDates]=useState({});
  const [links,setLinks]=useState(()=>getLinks(chantierId));
  const [linkMode,setLinkMode]=useState(false);
  const [linkFirst,setLinkFirst]=useState(null);
  const gridRef=useRef();

  const valid=taches.map(completeDates).filter(Boolean);
  const {startD,days,colCount}=useMemo(()=>{
    const a=new Date(anchor); a.setHours(12,0,0,0);
    if(mode==='jour'){return {startD:a,days:[a],colCount:1};}
    if(mode==='semaine'){const s=new Date(a);const dow=(s.getDay()+6)%7;s.setDate(s.getDate()-dow);const ds=[...Array(7)].map((_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});return {startD:s,days:ds,colCount:7};}
    // mois
    const s=new Date(a.getFullYear(),a.getMonth(),1,12);const dow=(s.getDay()+6)%7;s.setDate(s.getDate()-dow);const ds=[...Array(42)].map((_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});return {startD:s,days:ds,colCount:7};
  },[anchor,mode]);

  const sameDay=(a,b)=>a.toISOString().split('T')[0]===b.toISOString().split('T')[0];
  const tachesForDay=(d)=>valid.filter(t=>{const ds=new Date(t.dateDebut+'T12:00:00'),de=new Date(t.dateFin+'T12:00:00');return d>=ds&&d<=de;});

  const getCellW=()=>{if(!gridRef.current)return 0;return gridRef.current.getBoundingClientRect().width/colCount;};

  useEffect(()=>{
    if(!drag) return;
    const onMove=(e)=>{
      const cw=getCellW();if(!cw)return;
      const dx=e.clientX-drag.startX;
      const deltaDays=Math.round(dx/cw);
      const nd={};
      const applyDelta=(tid,od,of)=>{if(drag.mode==='move'){nd[tid]={dateDebut:addDays(od,deltaDays),dateFin:addDays(of,deltaDays)};}else{const nf=addDays(of,deltaDays);if(new Date(nf+'T12:00:00')>new Date(od+'T12:00:00'))nd[tid]={dateDebut:od,dateFin:nf};}};
      applyDelta(drag.tacheId,drag.origDebut,drag.origFin);
      if(drag.mode==='move')(drag.linkedIds||[]).forEach(lid=>{const lt=taches.find(t=>t.id===lid);if(lt)applyDelta(lid,lt.dateDebut,lt.dateFin);});
      setTempDates(nd);
    };
    const onUp=async()=>{
      if(Object.keys(tempDates).length){
        const ids=Object.keys(tempDates);
        await Promise.all(ids.map(id=>{const td=tempDates[id];return DB.updateTacheDates(id,td.dateDebut,td.dateFin);}));
        onDatesChanged(tempDates);
      }
      setDrag(null);setTempDates({});
    };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
  },[drag,tempDates,taches,colCount]);

  const onEvMouseDown=(e,t,m)=>{
    if(linkMode){e.stopPropagation();if(!linkFirst){setLinkFirst(t.id);return;}if(linkFirst===t.id){setLinkFirst(null);return;}const nL={...links};const a=linkFirst,b=t.id;if(!nL[a])nL[a]=[];if(!nL[b])nL[b]=[];if(nL[a].includes(b)){nL[a]=nL[a].filter(x=>x!==b);nL[b]=nL[b].filter(x=>x!==a);}else{nL[a]=[...nL[a],b];nL[b]=[...nL[b],a];}setLinks(nL);saveLinks(chantierId,nL);setLinkFirst(null);return;}
    e.preventDefault();e.stopPropagation();
    const ll=new Set();const coll=(id)=>{(links[id]||[]).forEach(x=>{if(!ll.has(x)){ll.add(x);coll(x);}});};coll(t.id);
    setDrag({tacheId:t.id,mode:m,startX:e.clientX,origDebut:t.dateDebut,origFin:t.dateFin,linkedIds:[...ll]});
  };

  const getT=(t)=>{const td=tempDates[t.id];return {dateDebut:td?.dateDebut||t.dateDebut,dateFin:td?.dateFin||t.dateFin};};
  const bc={planifie:C.secondary,en_cours:C.blue,en_attente:C.accent,valide:C.green,refuse:C.red};
  const shift=(n)=>{const a=new Date(anchor);if(mode==='jour')a.setDate(a.getDate()+n);else if(mode==='semaine')a.setDate(a.getDate()+n*7);else a.setMonth(a.getMonth()+n);setAnchor(a);};

  return <div style={{display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <Btn small variant="subtle" onClick={()=>shift(-1)}>←</Btn>
      <Btn small variant="subtle" onClick={()=>setAnchor(new Date())}>Aujourd'hui</Btn>
      <Btn small variant="subtle" onClick={()=>shift(1)}>→</Btn>
      <div style={{marginLeft:6,fontSize:13,fontWeight:700,color:C.text,fontFamily:H}}>{anchor.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
      <div style={{marginLeft:'auto',display:'flex',gap:4}}>
        {[['jour','Jour'],['semaine','Semaine'],['mois','Mois']].map(([v,l])=><Btn key={v} small variant={mode===v?'primary':'ghost'} onClick={()=>setMode(v)}>{l}</Btn>)}
      </div>
      <Btn small variant={linkMode?'active':'subtle'} onClick={()=>{setLinkMode(!linkMode);setLinkFirst(null);}}>🔗 {linkMode?'Liaison':'Lier'}</Btn>
    </div>
    {mode==='jour'&&(()=>{const d=days[0];const ts=tachesForDay(d);return <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}}>
      <div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H,marginBottom:10}}>{d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</div>
      {ts.length===0&&<div style={{color:C.muted,fontFamily:F,fontSize:12,padding:10}}>Aucune tâche ce jour.</div>}
      <div style={{display:'flex',flexDirection:'column',gap:6}}>{ts.map(t=>{const ar=artisans.find(a=>a.id===t.artisanId);return <div key={t.id} onMouseDown={e=>onEvMouseDown(e,t,'move')} className="agenda-ev" style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:bc[t.statut],borderRadius:10,color:'#fff'}}>{ar&&<Av code={ar.avatar} color={ar.color} size={24}/>}<div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,fontFamily:F}}>{t.titre}</div><div style={{fontSize:11,opacity:.85,fontFamily:F}}>{t.section} · {t.duree}j · {fmtDate(t.dateDebut)}→{fmtDate(t.dateFin)}</div></div>{links[t.id]?.length>0&&<span>🔗</span>}</div>;})}</div>
    </div>;})()}
    {mode!=='jour'&&<div ref={gridRef} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${colCount},1fr)`,borderBottom:`1px solid ${C.border}`,background:C.surface}}>
        {['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].map((d,i)=><div key={i} style={{padding:'8px 10px',fontSize:10,fontWeight:700,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1,textAlign:'center',borderRight:i<6?`1px solid ${C.border}`:'none'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${colCount},1fr)`,gridAutoRows:mode==='semaine'?'140px':'92px'}}>
        {days.map((d,i)=>{const ts=tachesForDay(d);const isToday=sameDay(d,new Date());const isOtherMonth=mode==='mois'&&d.getMonth()!==anchor.getMonth();return <div key={i} style={{borderRight:(i%colCount<colCount-1)?`1px solid ${C.border}`:'none',borderTop:i>=colCount?`1px solid ${C.border}`:'none',padding:6,overflow:'hidden',background:isToday?`${C.accent}08`:'transparent',opacity:isOtherMonth?.4:1}}>
          <div style={{fontSize:11,fontWeight:isToday?800:600,color:isToday?C.accent:C.secondary,fontFamily:H,marginBottom:4}}>{d.getDate()}</div>
          <div style={{display:'flex',flexDirection:'column',gap:3}}>
            {ts.slice(0,mode==='semaine'?6:3).map(t=>{const ar=artisans.find(a=>a.id===t.artisanId);const {dateDebut}=getT(t);const isStart=sameDay(d,new Date(dateDebut+'T12:00:00'));return <div key={t.id} onMouseDown={e=>onEvMouseDown(e,t,'move')} className="agenda-ev" style={{fontSize:10,padding:'3px 6px',background:bc[t.statut],color:'#fff',borderRadius:4,fontFamily:F,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',border:linkFirst===t.id?`2px solid ${C.accent}`:'none'}}>{isStart?'▶ ':''}{ar?ar.avatar+' ':''}{t.titre}</div>;})}
            {ts.length>(mode==='semaine'?6:3)&&<div style={{fontSize:9,color:C.muted,fontFamily:F}}>+{ts.length-(mode==='semaine'?6:3)}</div>}
          </div>
        </div>;})}
      </div>
    </div>}
    <div style={{fontSize:10,color:C.muted,fontFamily:F}}>Glisser une tâche pour la replanifier. Activez 🔗 puis cliquez deux tâches pour les lier (elles se déplaceront ensemble).</div>
  </div>;
}
/* ════════════════════════════════════════════════════════════════
   DRAGGABLE TASK LIST (NEW — drag & drop tâches + sections éditables)
════════════════════════════════════════════════════════════════ */
function DraggableTaskList({chantierId,sections,taches,artisans,onRefresh,onSelectTache}){
  const [localSections,setLocalSections]=useState(sections);
  const [localTaches,setLocalTaches]=useState(taches);
  const [dragT,setDragT]=useState(null); // {id}
  const [dragS,setDragS]=useState(null); // {id}
  const [overT,setOverT]=useState(null); // {sectionId, position}
  const [overS,setOverS]=useState(null);
  const [editSec,setEditSec]=useState(null); // sectionId being edited
  const [editLabel,setEditLabel]=useState('');
  const [newSecOpen,setNewSecOpen]=useState(false);
  const [newSecLabel,setNewSecLabel]=useState('');
  const [newSecColor,setNewSecColor]=useState(SECT_COLORS[0]);
  const [saving,setSaving]=useState(false);

  useEffect(()=>{setLocalSections(sections);setLocalTaches(taches);},[sections,taches]);

  const onTacheDragStart=(e,t)=>{setDragT({id:t.id});e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain',t.id);}catch{}};
  const onTacheDragEnd=()=>{setDragT(null);setOverT(null);};
  const onTacheDragOver=(e,sectionId,position)=>{e.preventDefault();e.dataTransfer.dropEffect='move';setOverT({sectionId,position});};
  const onTacheDrop=async(e,sectionId,position)=>{
    e.preventDefault();
    const tid=dragT?.id;if(!tid)return;
    const t=localTaches.find(x=>x.id===tid);if(!t)return;
    // Reorder locally
    let nt=localTaches.filter(x=>x.id!==tid);
    const target={...t,sectionId,position};
    // Insert at position among target section
    const secTs=nt.filter(x=>x.sectionId===sectionId).sort((a,b)=>a.position-b.position);
    const other=nt.filter(x=>x.sectionId!==sectionId);
    secTs.splice(position,0,target);
    const reord=secTs.map((x,i)=>({...x,position:i,sectionId,section:localSections.find(s=>s.id===sectionId)?.label||x.section}));
    setLocalTaches([...other,...reord]);
    setSaving(true);
    try{await Promise.all(reord.map(x=>DB.moveTache(x.id,sectionId,x.position)));onRefresh();}
    catch(err){alert('Erreur: '+err.message);}
    setSaving(false);setDragT(null);setOverT(null);
  };

  const onSecDragStart=(e,s)=>{setDragS({id:s.id});e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain','sec:'+s.id);}catch{}};
  const onSecDragEnd=()=>{setDragS(null);setOverS(null);};
  const onSecDragOver=(e,sid)=>{e.preventDefault();setOverS(sid);};
  const onSecDrop=async(e,targetId)=>{e.preventDefault();const sid=dragS?.id;if(!sid||sid===targetId)return;
    const cur=[...localSections].sort((a,b)=>a.position-b.position);
    const from=cur.findIndex(s=>s.id===sid);
    const to=cur.findIndex(s=>s.id===targetId);
    if(from<0||to<0)return;
    const [m]=cur.splice(from,1);cur.splice(to,0,m);
    const reord=cur.map((s,i)=>({...s,position:i}));
    setLocalSections(reord);
    try{await DB.reorderSections(reord.map(s=>s.id));onRefresh();}catch(err){alert('Erreur: '+err.message);}
    setDragS(null);setOverS(null);
  };

  const saveSecEdit=async(s)=>{if(!editLabel.trim()){setEditSec(null);return;}await DB.updateSection(s.id,{label:editLabel.trim()});setEditSec(null);onRefresh();};
  const changeSecColor=async(s,col)=>{await DB.updateSection(s.id,{couleur:col});onRefresh();};
  const deleteSec=async(s)=>{const nbT=localTaches.filter(t=>t.sectionId===s.id).length;if(!confirm(`Supprimer la section "${s.label}" ?${nbT>0?` Cela supprimera aussi ${nbT} tâche${nbT>1?'s':''}.`:''}`))return;await DB.deleteSection(s.id);onRefresh();};
  const createSec=async()=>{if(!newSecLabel.trim())return;setSaving(true);try{await DB.createSection(chantierId,newSecLabel.trim(),newSecColor,localSections.length);setNewSecLabel('');setNewSecOpen(false);onRefresh();}catch(e){alert('Erreur: '+e.message);}setSaving(false);};

  const sortedSecs=[...localSections].sort((a,b)=>a.position-b.position);
  const tachesBySec=(sid)=>localTaches.filter(t=>t.sectionId===sid).sort((a,b)=>a.position-b.position);

  return <div style={{display:'flex',flexDirection:'column',gap:14}}>
    <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
      <span style={{fontSize:11,color:C.muted,fontFamily:F}}>Glissez les tâches entre sections · Glissez les sections pour les réordonner · Cliquez sur une section pour la renommer</span>
      {saving&&<span style={{fontSize:11,color:C.accent,fontFamily:F}}><Spinner/> enregistrement…</span>}
      <Btn small variant="primary" onClick={()=>setNewSecOpen(true)} style={{marginLeft:'auto'}}>＋ Section</Btn>
    </div>
    {newSecOpen&&<Card style={{display:'flex',gap:8,alignItems:'center',padding:12}}>
      <input autoFocus value={newSecLabel} onChange={e=>setNewSecLabel(e.target.value)} onKeyDown={e=>e.key==='Enter'&&createSec()} placeholder="Nom de la section (ex: Cuisine, Salle de bain…)" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px',color:C.text,fontSize:13,fontFamily:F,outline:'none'}}/>
      <div style={{display:'flex',gap:4}}>{SECT_COLORS.map(c=><div key={c} onClick={()=>setNewSecColor(c)} style={{width:22,height:22,borderRadius:6,background:c,cursor:'pointer',border:newSecColor===c?`2px solid ${C.text}`:'2px solid transparent'}}/>)}</div>
      <Btn small variant="primary" onClick={createSec} loading={saving}>Créer</Btn>
      <Btn small variant="ghost" onClick={()=>{setNewSecOpen(false);setNewSecLabel('');}}>Annuler</Btn>
    </Card>}
    {sortedSecs.map(s=>{
      const sTaches=tachesBySec(s.id);
      const isEditing=editSec===s.id;
      return <div key={s.id} className={dragS?.id===s.id?'sec-dragging':''}
        onDragOver={e=>onSecDragOver(e,s.id)}
        onDrop={e=>onSecDrop(e,s.id)}
        style={{background:overS===s.id?`${s.couleur}0a`:'transparent',borderRadius:10,padding:6}}>
        <div draggable={!isEditing} onDragStart={e=>onSecDragStart(e,s)} onDragEnd={onSecDragEnd}
          style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,cursor:isEditing?'default':'grab',padding:'6px 4px'}}>
          <span style={{fontSize:10,color:C.muted}}>⋮⋮</span>
          <div style={{width:4,height:18,background:s.couleur,borderRadius:2}}/>
          {isEditing
            ? <>
                <input autoFocus value={editLabel} onChange={e=>setEditLabel(e.target.value)} onKeyDown={e=>e.key==='Enter'?saveSecEdit(s):e.key==='Escape'&&setEditSec(null)} style={{background:C.surface,border:`1px solid ${C.accent}55`,borderRadius:6,padding:'4px 8px',color:C.text,fontSize:13,fontWeight:700,fontFamily:H,outline:'none',flex:1,maxWidth:280}}/>
                <div style={{display:'flex',gap:4}}>{SECT_COLORS.map(c=><div key={c} onClick={()=>changeSecColor(s,c)} style={{width:18,height:18,borderRadius:4,background:c,cursor:'pointer',border:s.couleur===c?`2px solid ${C.text}`:'1px solid '+C.border}}/>)}</div>
                <Btn small variant="primary" onClick={()=>saveSecEdit(s)}>✓</Btn>
                <Btn small variant="ghost" onClick={()=>setEditSec(null)}>×</Btn>
              </>
            : <>
                <h3 onClick={()=>{setEditSec(s.id);setEditLabel(s.label);}} style={{fontSize:12,fontWeight:700,color:C.text,fontFamily:H,textTransform:'uppercase',letterSpacing:1,margin:0,cursor:'pointer'}}>{s.label}</h3>
                <span style={{fontSize:10,color:C.muted,fontFamily:F}}>({sTaches.length})</span>
                <Btn small variant="ghost" style={{marginLeft:'auto'}} onClick={()=>{setEditSec(s.id);setEditLabel(s.label);}}>✏️</Btn>
                <Btn small variant="danger" onClick={()=>deleteSec(s)}>🗑</Btn>
              </>}
        </div>
        <div className={`tk-drop ${overT?.sectionId===s.id?'over':''}`}
          onDragOver={e=>onTacheDragOver(e,s.id,sTaches.length)}
          onDrop={e=>onTacheDrop(e,s.id,sTaches.length)}
          style={{display:'flex',flexDirection:'column',gap:6,minHeight:sTaches.length?'auto':36,borderRadius:10,padding:4}}>
          {sTaches.map((t,idx)=>{const ar=artisans.find(a=>a.id===t.artisanId);const st=STATUTS[t.statut];return <div key={t.id}
            draggable
            onDragStart={e=>onTacheDragStart(e,t)}
            onDragEnd={onTacheDragEnd}
            onDragOver={e=>{e.stopPropagation();onTacheDragOver(e,s.id,idx);}}
            onDrop={e=>{e.stopPropagation();onTacheDrop(e,s.id,idx);}}
            onClick={()=>onSelectTache(t)}
            className="tk-drag"
            style={{display:'flex',alignItems:'center',gap:10,background:C.card,border:`1px solid ${overT?.sectionId===s.id&&overT?.position===idx?C.accent+'88':C.border}`,borderRadius:10,padding:'10px 12px',opacity:dragT?.id===t.id?.4:1}}>
            <span style={{fontSize:10,color:C.muted}}>⋮⋮</span>
            {ar?<Av code={ar.avatar} color={ar.color} size={26}/>:<div style={{width:26,height:26,borderRadius:'50%',background:C.border,flexShrink:0}}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.titre}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>{ar?.nom||'Non assigné'} · {fmtDate(t.dateDebut)}→{fmtDate(t.dateFin)} · {t.duree}j</div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:5}}>
              {t.achats.length>0&&<Badge label={`📦${t.achats.length}`} color={C.secondary}/>}
              {t.commentaires.length>0&&<Badge label={`💬${t.commentaires.length}`} color={C.secondary}/>}
              <Badge label={st.label} color={st.color} bg={st.bg}/>
            </div>
          </div>;})}
          {sTaches.length===0&&<div style={{padding:12,textAlign:'center',color:C.muted,fontFamily:F,fontSize:11,border:`1px dashed ${C.border}`,borderRadius:8}}>Déposez une tâche ici</div>}
        </div>
      </div>;
    })}
    {sortedSecs.length===0&&<div style={{color:C.muted,textAlign:'center',padding:24,fontFamily:F,fontSize:13}}>Aucune section — créez-en une pour commencer.</div>}
  </div>;
}
/* ── Import Devis Modal (conservé) ───────────────────────────── */
function ImportDevisModal({chantierId,chantierNom,artisans,existingSections,onSaved,onClose}){
  const [step,setStep]=useState(()=>getAPIKey()?'upload':'nokey');
  const [lines,setLines]=useState([]);
  const [error,setError]=useState('');
  const [saving,setSaving]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const fileRef=useRef();
  const extractWithAI=async(content)=>{
    const apiKey=getAPIKey();if(!apiKey){setError('Clé API manquante');setStep('nokey');return;}
    setStep('extracting');setError('');
    const prompt=`Tu es un expert BTP. Analyse ce devis pour le chantier "${chantierNom}". Extrais les lignes : titre, section (${SECTIONS.join(', ')}), description, duree (jours), prixUnitaire, quantite, unite. Réponds UNIQUEMENT avec un tableau JSON. Contenu : ${content.slice(0,3500)}`;
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content:prompt}]})});
      const data=await res.json();if(data.error){setError('API: '+data.error.message);setStep('upload');return;}
      const txt=data.content?.find(b=>b.type==='text')?.text||'[]';
      const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
      setLines(parsed.map((l,i)=>({_id:uid(),selected:true,titre:l.titre||'Tâche '+(i+1),section:SECTIONS.includes(l.section)?l.section:'Autre',description:l.description||'',duree:Number(l.duree)||1,prixUnitaire:l.prixUnitaire||null,artisanId:artisans[0]?.id||'',dateDebut:'',dateFin:'',priorite:'normale'})));
      setStep('review');
    }catch(e){setError('Erreur: '+e.message);setStep('upload');}
  };
  const readFile=async(file)=>{
    const apiKey=getAPIKey();if(!apiKey){setError('Clé API manquante');setStep('nokey');return;}
    setStep('extracting');setError('');
    try{
      const isPDF=file.name.match(/\.pdf$/i);let messages;
      if(isPDF){const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});messages=[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:`Extrais les lignes de travaux de ce bordereau "${chantierNom}". Pour chaque ligne: titre, section (${SECTIONS.join(', ')}), description, duree (jours), prixUnitaire, quantite, unite. JSON uniquement.`}]}];}
      else {const text=await file.text();messages=[{role:'user',content:`Extrais les lignes de travaux. Sections: ${SECTIONS.join(', ')}. JSON uniquement. ${text.slice(0,4000)}`}];}
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:3000,messages})});
      const data=await res.json();if(data.error){setError('API: '+data.error.message);setStep('upload');return;}
      const txt=data.content?.find(b=>b.type==='text')?.text||'[]';
      const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
      setLines(parsed.map((l,i)=>({_id:uid(),selected:true,titre:l.titre||'Tâche '+(i+1),section:SECTIONS.includes(l.section)?l.section:'Autre',description:l.description||'',duree:Number(l.duree)||1,prixUnitaire:l.prixUnitaire||null,artisanId:artisans[0]?.id||'',dateDebut:'',dateFin:'',priorite:'normale'})));
      setStep('review');
    }catch(e){setError('Erreur: '+e.message);setStep('upload');}
  };
  const onDrop=e=>{e.preventDefault();setDragOver(false);const file=e.dataTransfer.files[0];if(file)readFile(file);};
  const toggle=id=>setLines(l=>l.map(x=>x._id===id?{...x,selected:!x.selected}:x));
  const upd=(id,k,v)=>setLines(l=>l.map(x=>x._id===id?{...x,[k]:v}:x));
  const importLines=async()=>{
    setSaving(true);
    try{for(const l of lines.filter(x=>x.selected)){const sec=await DB.getOrCreateSection(chantierId,l.section,existingSections);const tid=await DB.createTache(sec.id,{titre:l.titre,description:l.description,duree:l.duree,dateDebut:l.dateDebut,dateFin:l.dateFin,priorite:l.priorite},l.artisanId||null);if(l.prixUnitaire){setTachePrix(tid,{revient:Number(l.prixUnitaire)||0,vendu:0});}}onSaved();onClose();}
    catch(e){alert('Erreur: '+e.message);}
    setSaving(false);
  };
  return <Modal title="Import devis / bordereau" subtitle={chantierNom} onClose={onClose} wide>
    {step==='nokey'&&<div style={{padding:28,textAlign:'center'}}><div style={{fontSize:48}}>🔑</div><div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:H,margin:'12px 0'}}>Clé API requise</div><div style={{fontSize:13,color:C.secondary,fontFamily:F,marginBottom:14}}>Configurez-la dans Paramètres ⚙️ → Intelligence IA</div><Btn onClick={()=>setStep('upload')} variant="primary">J'ai configuré ma clé →</Btn></div>}
    {step==='upload'&&<div style={{padding:28,display:'flex',flexDirection:'column',alignItems:'center',gap:16}}>
      <div style={{fontSize:48}}>📄</div>
      <div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:H}}>Glissez votre devis</div>
      <div className={`drop-zone${dragOver?' drag-over':''}`} onClick={()=>fileRef.current.click()} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={onDrop} style={{border:`2px dashed ${dragOver?C.accent:C.border}`,borderRadius:14,padding:'36px 40px',cursor:'pointer',textAlign:'center',width:'100%',background:dragOver?`${C.accent}08`:C.surface}}>
        <div style={{fontSize:32}}>⬇</div><div style={{fontSize:14,color:dragOver?C.accent:C.secondary,fontFamily:H,marginTop:6}}>Glisser ou cliquer</div>
      </div>
      <input ref={fileRef} type="file" accept=".pdf,.xlsx,.csv,.txt,.xls" style={{display:'none'}} onChange={e=>e.target.files[0]&&readFile(e.target.files[0])}/>
      <Btn onClick={()=>extractWithAI('Génère des exemples réalistes BTP.')} variant="subtle">✨ Exemples IA</Btn>
      {error&&<div style={{color:C.red,fontSize:12,fontFamily:F}}>{error}</div>}
    </div>}
    {step==='extracting'&&<div style={{padding:60,textAlign:'center'}}><div style={{fontSize:40,animation:'spin 1.2s linear infinite',display:'inline-block'}}>⚙️</div><div style={{fontSize:14,color:C.text,fontFamily:H,marginTop:12}}>Analyse en cours…</div></div>}
    {step==='review'&&<>
      <div style={{padding:'12px 20px',background:`${C.green}10`,borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontSize:13,color:C.green,fontFamily:F}}>✓ {lines.length} lignes — {lines.filter(l=>l.selected).length} sélectionnées</span><div style={{display:'flex',gap:8}}><Btn small variant="subtle" onClick={()=>setLines(l=>l.map(x=>({...x,selected:true})))}>Tout cocher</Btn><Btn small variant="subtle" onClick={()=>setLines(l=>l.map(x=>({...x,selected:false})))}>Tout décocher</Btn></div></div>
      <div style={{padding:14,overflowY:'auto',maxHeight:380,display:'flex',flexDirection:'column',gap:8}}>
        {lines.map(l=><div key={l._id} style={{background:l.selected?C.surface:C.bg,border:`1px solid ${l.selected?C.border:C.muted+'22'}`,borderRadius:11,padding:10,opacity:l.selected?1:.5}}>
          <div style={{display:'flex',gap:10}}>
            <input type="checkbox" checked={l.selected} onChange={()=>toggle(l._id)} style={{marginTop:4,accentColor:C.accent}}/>
            <div style={{flex:1,display:'grid',gridTemplateColumns:'2fr 1fr 1fr 90px',gap:8}}>
              <input value={l.titre} onChange={e=>upd(l._id,'titre',e.target.value)} style={{background:'transparent',border:`1px solid ${C.border}`,borderRadius:7,padding:'4px 8px',color:C.text,fontSize:13,fontFamily:F,outline:'none'}}/>
              <select value={l.section} onChange={e=>upd(l._id,'section',e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:'4px 7px',color:C.text,fontSize:11,fontFamily:F}}>{SECTIONS.map(s=><option key={s} value={s}>{s}</option>)}</select>
              <select value={l.artisanId} onChange={e=>upd(l._id,'artisanId',e.target.value)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:'4px 7px',color:C.text,fontSize:11,fontFamily:F}}><option value=''>—</option>{artisans.map(a=><option key={a.id} value={a.id}>{a.nom}</option>)}</select>
              <div style={{display:'flex',alignItems:'center',gap:4}}><input type="number" value={l.duree} onChange={e=>upd(l._id,'duree',Number(e.target.value))} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:7,padding:'4px 6px',color:C.accent,fontSize:12,fontFamily:F,width:44}}/><span style={{fontSize:11,color:C.muted}}>j</span></div>
            </div>
          </div>
        </div>)}
      </div>
      <div style={{padding:'14px 20px',borderTop:`1px solid ${C.border}`,display:'flex',gap:8,justifyContent:'flex-end'}}><Btn onClick={()=>setStep('upload')} variant="ghost">← Retour</Btn><Btn onClick={importLines} variant="primary" loading={saving} disabled={!lines.filter(l=>l.selected).length}>＋ Importer {lines.filter(l=>l.selected).length}</Btn></div>
    </>}
  </Modal>;
}

/* ── Tache Modal (enrichi : achats add/edit + prix R/V) ──────── */
function TacheModal({tache,artisans,onClose,onSaved}){
  const [t,setT]=useState({...tache});
  const [achats,setAchats]=useState(tache.achats||[]);
  const [prix,setP]=useState(getTachePrix(tache.id));
  const [nc,setNc]=useState('');
  const [saving,setSaving]=useState(false);
  const [newAch,setNewAch]=useState({libelle:'',qte:1,prix:0,fournisseur:''});
  const role=getRole();
  const canSeeVendu=role==='admin';
  const ar=artisans.find(a=>a.id===t.artisanId);
  const save=async()=>{setSaving(true);try{const tt={...t};const dur=Number(tt.duree)||1;if(tt.dateDebut&&!tt.dateFin)tt.dateFin=addDays(tt.dateDebut,Math.max(0,dur-1));else if(tt.dateFin&&!tt.dateDebut)tt.dateDebut=addDays(tt.dateFin,-Math.max(0,dur-1));if(tt.dateDebut&&tt.dateFin){tt.duree=Math.max(1,daysBetween(tt.dateDebut,tt.dateFin)+1);}await DB.updateTache(tt.id,tt,tt.artisanId);setTachePrix(tt.id,prix);onSaved();onClose();}catch(e){alert('Erreur: '+e.message);}setSaving(false);};
  const addComment=async()=>{if(!nc.trim())return;const c=await DB.addCommentaire(t.id,nc);setT(p=>({...p,commentaires:[...p.commentaires,`${nc} — Louis, ${fmtDate(c.created_at)}`]}));setNc('');};
  const addAchat=async()=>{if(!newAch.libelle.trim())return;const a=await DB.createAchat(t.id,newAch.libelle,{prix:Number(newAch.prix)||0,qte:Number(newAch.qte)||1,fournisseur:newAch.fournisseur});setAchats(p=>[...p,{id:a.id,libelle:a.libelle,statut:'a_acheter',prix:Number(newAch.prix)||0,qte:Number(newAch.qte)||1,fournisseur:newAch.fournisseur}]);setNewAch({libelle:'',qte:1,prix:0,fournisseur:''});};
  const updAchat=(id,k,v)=>{setAchats(p=>p.map(a=>a.id===id?{...a,[k]:v}:a));const a=achats.find(x=>x.id===id);if(!a)return;if(k==='libelle')DB.updateAchat(id,v);else if(k==='statut')DB.updateAchatStatut(id,v);else setAchatExtra(id,{prix:k==='prix'?Number(v)||0:a.prix,qte:k==='qte'?Number(v)||1:a.qte,fournisseur:k==='fournisseur'?v:a.fournisseur});};
  const delAch=async(id)=>{if(!confirm('Supprimer cet achat ?'))return;await DB.deleteAchat(id);setAchats(p=>p.filter(a=>a.id!==id));};

/* ── Add Tache Modal ──────────────────────────────────────────── */
function AddTacheModal({chantierId,artisans,existingSections,onSaved,onClose}){
  const [f,setF]=useState({titre:'',section:existingSections[0]?.label||SECTIONS[0],newSection:'',artisanId:artisans[0]?.id||'',dateDebut:'',dateFin:'',duree:'1',priorite:'normale',description:'',prixRevient:0,prixVendu:0});
  const [saving,setSaving]=useState(false);
  const role=getRole();const canSeeVendu=role==='admin';
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const isNew=f.section==='__new__';
  const sectionLabel=isNew?f.newSection:f.section;
  const save=async()=>{
    if(!f.titre.trim()||!sectionLabel.trim())return;
    setSaving(true);
    const ff={...f};const dur=Number(ff.duree)||1;
    if(ff.dateDebut&&!ff.dateFin)ff.dateFin=addDays(ff.dateDebut,Math.max(0,dur-1));
    else if(ff.dateFin&&!ff.dateDebut)ff.dateDebut=addDays(ff.dateFin,-Math.max(0,dur-1));
    if(ff.dateDebut&&ff.dateFin)ff.duree=Math.max(1,daysBetween(ff.dateDebut,ff.dateFin)+1);
    try{const sec=await DB.getOrCreateSection(chantierId,sectionLabel,existingSections);const tid=await DB.createTache(sec.id,ff,ff.artisanId||null);if(Number(ff.prixRevient)||Number(ff.prixVendu))setTachePrix(tid,{revient:Number(ff.prixRevient)||0,vendu:Number(ff.prixVendu)||0});onSaved();onClose();}
    catch(e){alert('Erreur: '+e.message);}
    setSaving(false);
  };
  const sectionOpts=[...existingSections.map(s=>({value:s.label,label:s.label})),...SECTIONS.filter(s=>!existingSections.find(es=>es.label===s)).map(s=>({value:s,label:s})),{value:'__new__',label:'＋ Nouvelle section…'}];
  return <Modal title="Nouvelle tâche" subtitle="Tâches" onClose={onClose}>
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
      <FInput label="Titre de la tâche" value={f.titre} onChange={e=>u('titre',e.target.value)} placeholder="ex: Pose carrelage 40m²"/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <FInput label="Section" as="select" value={f.section} onChange={e=>u('section',e.target.value)} options={sectionOpts}/>
        {isNew&&<FInput label="Nom nouvelle section" value={f.newSection} onChange={e=>u('newSection',e.target.value)} placeholder="ex: Cuisine"/>}
        <FInput label="Artisan" as="select" value={f.artisanId} onChange={e=>u('artisanId',e.target.value)} options={[{value:'',label:'— Non assigné —'},...artisans.map(a=>({value:a.id,label:`${a.nom} (${a.metier})`}))]}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
        <FInput label="Début" type="date" value={f.dateDebut} onChange={e=>u('dateDebut',e.target.value)}/>
        <FInput label="Fin" type="date" value={f.dateFin} onChange={e=>u('dateFin',e.target.value)}/>
        <FInput label="Durée (j)" type="number" value={f.duree} onChange={e=>u('duree',e.target.value)}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:canSeeVendu?'1fr 1fr':'1fr',gap:12}}>
        <FInput label="Prix de revient (€)" type="number" value={f.prixRevient} onChange={e=>u('prixRevient',e.target.value)}/>
        {canSeeVendu&&<FInput label="🔒 Prix vendu (€)" type="number" value={f.prixVendu} onChange={e=>u('prixVendu',e.target.value)}/>}
      </div>
      <FInput label="Priorité" as="select" value={f.priorite} onChange={e=>u('priorite',e.target.value)} options={[{value:'haute',label:'🔴 Haute'},{value:'normale',label:'🟡 Normale'},{value:'basse',label:'🟢 Basse'}]}/>
      <FInput label="Description" as="textarea" value={f.description} onChange={e=>u('description',e.target.value)} placeholder="Détail des travaux…"/>
    </div>
    <div style={{padding:'14px 20px',borderTop:`1px solid ${C.border}`,display:'flex',gap:8,justifyContent:'flex-end'}}><Btn onClick={onClose} variant="ghost">Annuler</Btn><Btn onClick={save} variant="primary" loading={saving}>Créer la tâche</Btn></div>
  </Modal>;
}

/* ── Add Artisan Modal ────────────────────────────────────────── */
function AddArtisanModal({onSaved,onClose,editing}){

  const u=(k,v)=>setF(p=>({...p,[k]:v}));

      {f.nom&&<div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:C.surface,borderRadius:10}}><Av code={initials(f.nom)} color={AV_COLORS[f.colorIdx]} size={38}/><div><div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H}}>{f.nom}</div><div style={{fontSize:12,color:C.secondary,fontFamily:F}}>{f.metier}</div></div></div>}

  </Modal>;

/* ── Mobile View (conservé) ──────────────────────────────────── */
function MobileView({artisans,taches,chantiers,onClose,lockedArtisanId}){
  const [sel,setSel]=useState(lockedArtisanId||null);const [selT,setSelT]=useState(null);const [nc,setNc]=useState('');const [localSt,setLocalSt]=useState({});
  const ar=sel?artisans.find(a=>a.id===sel):null;
  const arT=ar?taches.filter(t=>t.artisanId===ar.id).sort((a,b)=>{const o={en_cours:0,en_attente:1,refuse:2,planifie:3,valide:4};return(o[a.statut]||5)-(o[b.statut]||5);}):[];
  const tache=selT?taches.find(t=>t.id===selT):null;
  const getSt=t=>localSt[t.id]||t.statut;
  const updSt=async(t,s)=>{setLocalSt(p=>({...p,[t.id]:s}));await DB.updateTache(t.id,{...t,statut:s},undefined);};
  const addCom=async()=>{if(!nc.trim()||!tache)return;await DB.addCommentaire(tache.id,nc);setNc('');};
  return <div style={{position:'fixed',inset:0,background:C.bg,zIndex:3000,overflowY:'auto'}}>
    <div style={{maxWidth:390,margin:'0 auto',fontFamily:F}}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:'14px 16px',display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:10}}>
        {(selT||(sel&&!lockedArtisanId))?<button onClick={()=>{if(selT)setSelT(null);else if(!lockedArtisanId)setSel(null);}} style={{background:'none',border:'none',color:C.secondary,fontSize:22,cursor:'pointer'}}>←</button>:<div style={{width:10}}/>}
        <div style={{flex:1,textAlign:'center'}}>{selT&&tache?<div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{tache.titre}</div>:sel&&ar?<div style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:H}}>{ar.nom}</div>:<div style={{fontSize:15,fontWeight:800,color:C.text,fontFamily:H}}>🏗 ChantierPro</div>}</div>
        <button onClick={onClose} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 10px',color:C.secondary,fontSize:12,cursor:'pointer'}}>Admin</button>
      </div>
      {!sel&&<div style={{padding:16}}>{artisans.map(a=>{const at=taches.filter(t=>t.artisanId===a.id&&['en_cours','planifie','en_attente'].includes(t.statut)).length;return <div key={a.id} onClick={()=>setSel(a.id)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10,display:'flex',alignItems:'center',gap:14,cursor:'pointer'}}><Av code={a.avatar} color={a.color} size={46}/><div style={{flex:1}}><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:H}}>{a.nom}</div><div style={{fontSize:13,color:C.secondary}}>{a.metier}</div></div>{at>0&&<div style={{background:C.accent,color:'#000',borderRadius:99,width:28,height:28,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,fontFamily:H}}>{at}</div>}</div>;})}</div>}
      {sel&&!selT&&<div style={{padding:16}}>{arT.map(t=>{const ch=chantiers.find(c=>c.id===t.chantierId);const st=STATUTS[getSt(t)];return <div key={t.id} onClick={()=>setSelT(t.id)} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16,marginBottom:10,cursor:'pointer'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}><div style={{flex:1,marginRight:10}}><div style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:H}}>{t.titre}</div><div style={{fontSize:12,color:C.secondary,marginTop:4}}>{ch?.nom?.split('–')[0]?.trim()}</div></div><Badge label={st.label} color={st.color} bg={st.bg}/></div><div style={{fontSize:12,color:C.muted}}>📅 {fmtDate(t.dateDebut)} → {fmtDate(t.dateFin)} · ⏱ {t.duree}j</div>{getSt(t)==='planifie'&&<button onClick={e=>{e.stopPropagation();updSt(t,'en_cours');}} style={{marginTop:12,width:'100%',padding:10,background:C.blue,color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer'}}>▶ Démarrer</button>}{getSt(t)==='en_cours'&&<button onClick={e=>{e.stopPropagation();updSt(t,'en_attente');}} style={{marginTop:12,width:'100%',padding:10,background:C.green,color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer'}}>✓ Terminé</button>}</div>;})}{arT.length===0&&<div style={{textAlign:'center',padding:40,color:C.muted,fontSize:14}}>Aucune tâche 🎉</div>}</div>}
      {selT&&tache&&(()=>{const ch=chantiers.find(c=>c.id===tache.chantierId);const st=STATUTS[getSt(tache)];return <div style={{padding:16}}><div style={{background:st.bg,border:`1px solid ${st.color}44`,borderRadius:12,padding:'12px 16px',marginBottom:16,textAlign:'center'}}><div style={{fontSize:16,fontWeight:700,color:st.color,fontFamily:H}}>{st.label}</div></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>{[['Chantier',ch?.nom?.split('–')[0]?.trim()||'—'],['Section',tache.section],['Dates',`${fmtDate(tache.dateDebut)} → ${fmtDate(tache.dateFin)}`],['Durée',`${tache.duree}j`]].map(([l,v],i)=><div key={i} style={{background:C.surface,borderRadius:10,padding:'10px 12px'}}><div style={{fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:1,fontFamily:H}}>{l}</div><div style={{fontSize:12,color:C.text,marginTop:3,fontWeight:600}}>{v}</div></div>)}</div>{tache.description&&<div style={{background:C.surface,borderRadius:10,padding:'12px 14px',fontSize:13,color:C.secondary,marginBottom:14}}>{tache.description}</div>}<div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:18}}>{getSt(tache)==='planifie'&&<button onClick={()=>updSt(tache,'en_cours')} style={{padding:14,background:C.blue,color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:H}}>▶ Démarrer</button>}{getSt(tache)==='en_cours'&&<button onClick={()=>updSt(tache,'en_attente')} style={{padding:14,background:C.green,color:'#fff',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:H}}>✓ Terminé</button>}{getSt(tache)==='refuse'&&<button onClick={()=>updSt(tache,'en_cours')} style={{padding:14,background:C.accent,color:'#000',border:'none',borderRadius:12,fontSize:15,fontWeight:700,cursor:'pointer',fontFamily:H}}>↩ Reprendre</button>}</div><div><div style={{fontSize:10,color:C.secondary,textTransform:'uppercase',letterSpacing:1,fontFamily:H,marginBottom:8}}>Messages</div>{tache.commentaires.map((c,i)=><div key={i} style={{background:C.surface,borderRadius:10,padding:'10px 12px',marginBottom:6,fontSize:13,color:C.text}}>{c}</div>)}<div style={{display:'flex',gap:8,marginTop:8}}><input value={nc} onChange={e=>setNc(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCom()} placeholder="Votre message…" style={{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:'10px 14px',color:C.text,fontSize:14,fontFamily:F,outline:'none'}}/><button onClick={addCom} style={{background:C.accent,border:'none',borderRadius:10,padding:'0 16px',color:'#000',fontSize:18,cursor:'pointer'}}>↑</button></div></div></div>;})()}
    </div>
  </div>;
}

/* ── Chantier Detail (enrichi : Gantt/Agenda toggle + DraggableTaskList + Achats par chantier) ── */
function ChantierDetail({chantier:initCh,artisans,allBons,onBack,onRefreshAll,onNewBon}){

  const [showDevis,setShowDevis]=useState(false);

  const totalDevis=devis.reduce((s,d)=>s+(Number(d.montantHT)||0),0);

  const load=useCallback(async()=>{setLoading(true);const data=await DB.getChantierDetail(chantier.id);setRaw(data);setLoading(false);},[chantier.id]);
  useEffect(()=>{load();},[load]);

  const taches=raw?normalizeTaches(raw,chantier.id):[];
  const sections=raw?.sections||[];
  const chBons=allBons.filter(b=>b.chantier_id===chantier.id);
  const pendingVal=taches.filter(t=>t.statut==='en_attente').length;
  const pendingAch=taches.flatMap(t=>t.achats).filter(a=>a.statut==='a_acheter').length+libres.filter(a=>a.statut==='a_acheter').length;

    if(!raw) return;

      <Badge label={`${chantier.avancement||0}%`} color={C.accent}/>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
      <Card style={{padding:12}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>Client</div><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{chantier.client||'—'}</div></Card>

      <Card style={{padding:12}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>Dates</div><div style={{fontSize:13,fontWeight:600,color:C.text,fontFamily:F}}>{fmtDate(chantier.date_debut)} → {fmtDate(chantier.date_fin)}</div></Card>
      <Card onClick={()=>setShowDevis(true)} hover style={{padding:12,cursor:'pointer'}}><div style={{fontSize:9,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>Budget {totalDevis>0&&`· ${getDevis(chantier.id).length} devis signé${getDevis(chantier.id).length>1?'s':''}`}</div><div style={{fontSize:13,fontWeight:600,color:C.accent,fontFamily:F}}>{fmtMoney(chantier.budget)}</div>{totalDevis>0&&<div style={{fontSize:10,color:C.green,fontFamily:F,marginTop:2}}>Signé HT : {fmtMoney(totalDevis)}</div>}</Card>

/* ── Dashboard (avec planning semaine) ───────────────────────── */
function DashboardWeekPlanning({chantiers,artisans,allTaches,loadAll}){
  const [anchor,setAnchor]=useState(()=>new Date());
  const valid=allTaches.map(completeDates).filter(Boolean);
  const startD=useMemo(()=>{const a=new Date(anchor);a.setHours(12,0,0,0);const dow=(a.getDay()+6)%7;a.setDate(a.getDate()-dow);return a;},[anchor]);
  const days=useMemo(()=>[...Array(7)].map((_,i)=>{const d=new Date(startD);d.setDate(startD.getDate()+i);return d;}),[startD]);
  const sameDay=(a,b)=>a.toISOString().split('T')[0]===b.toISOString().split('T')[0];
  const tachesForDay=(d)=>valid.filter(t=>{const ds=new Date(t.dateDebut+'T12:00:00'),de=new Date(t.dateFin+'T12:00:00');return d>=ds&&d<=de;});
  const bc={planifie:C.secondary,en_cours:C.blue,en_attente:C.accent,valide:C.green,refuse:C.red};
  const shift=(n)=>{const a=new Date(anchor);a.setDate(a.getDate()+n*7);setAnchor(a);};
  const endD=new Date(days[6]);
  return <div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <h2 style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:H,margin:0}}>📅 Planning de la semaine — tous chantiers</h2>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <Btn small variant="subtle" onClick={()=>shift(-1)}>←</Btn>
        <div style={{fontSize:12,color:C.secondary,fontFamily:F,padding:'0 8px'}}>{startD.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – {endD.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'})}</div>
        <Btn small variant="subtle" onClick={()=>setAnchor(new Date())}>Aujourd'hui</Btn>
        <Btn small variant="subtle" onClick={()=>shift(1)}>→</Btn>
      </div>
    </div>
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        {days.map((d,i)=>{const isToday=sameDay(d,new Date());return <div key={i} style={{padding:'8px 10px',textAlign:'center',borderRight:i<6?`1px solid ${C.border}`:'none',background:isToday?`${C.accent}10`:'transparent'}}><div style={{fontSize:10,fontWeight:700,color:C.muted,fontFamily:H,textTransform:'uppercase',letterSpacing:1}}>{['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'][i]}</div><div style={{fontSize:16,fontWeight:800,color:isToday?C.accent:C.text,fontFamily:H,marginTop:2}}>{d.getDate()}</div></div>;})}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',minHeight:160}}>
        {days.map((d,i)=>{const ts=tachesForDay(d);const isToday=sameDay(d,new Date());return <div key={i} style={{padding:6,borderRight:i<6?`1px solid ${C.border}`:'none',background:isToday?`${C.accent}05`:'transparent',display:'flex',flexDirection:'column',gap:3}}>
          {ts.length===0&&<div style={{color:C.muted,fontSize:10,fontFamily:F,textAlign:'center',padding:'10px 0',opacity:.6}}>—</div>}
          {ts.slice(0,6).map(t=>{const ch=chantiers.find(c=>c.id===t.chantierId);const ar=artisans.find(a=>a.id===t.artisanId);const isStart=sameDay(d,new Date(t.dateDebut+'T12:00:00'));return <div key={t.id} title={`${t.titre} — ${ch?.nom||''}${ar?' · '+ar.nom:''}`} style={{fontSize:10,padding:'3px 6px',background:bc[t.statut],color:'#fff',borderRadius:4,fontFamily:F,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',cursor:'default'}}>{isStart?'▶ ':''}{ar?ar.avatar+' ':''}{t.titre}</div>;})}
          {ts.length>6&&<div style={{fontSize:9,color:C.muted,fontFamily:F,textAlign:'center'}}>+{ts.length-6}</div>}
        </div>;})}
      </div>
    </div>
    {valid.length===0&&<div style={{fontSize:11,color:C.muted,fontFamily:F,marginTop:8,textAlign:'center'}}>Ajoutez des dates à vos tâches pour les voir apparaître ici.</div>}
  </div>;
}

        <div><h2 style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:H,marginBottom:10}}>Tâches actives</h2>{recent.map(t=>{const ch=chantiers.find(c=>c.id===t.chantierId);const st=STATUTS[t.statut];return <Card key={t.id} style={{marginBottom:7,padding:12}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><div style={{fontSize:12,fontWeight:600,color:C.text,fontFamily:F}}>{t.titre}</div><div style={{fontSize:11,color:C.muted,marginTop:1,fontFamily:F}}>{ch?.nom?.split('–')[0]?.trim()}</div></div><Badge label={st.label} color={st.color} bg={st.bg}/></div></Card>;})}{recent.length===0&&<div style={{color:C.muted,fontSize:13,fontFamily:F,padding:'20px 0'}}>Aucune tâche active</div>}</div>
      </div>
    </>}
  </div>;

function NewChantierForm({onSaved,onCancel}){
