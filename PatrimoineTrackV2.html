<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PatrimoineTrack — Gestion Patrimoniale Immobilière</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg0:#060912;--bg1:#0D1117;--bg2:#161B22;--bg3:#21262D;
  --border:rgba(255,255,255,0.07);
  --t1:#F0F6FC;--t2:#8B949E;--t3:#484F58;
  --gold:#E8A020;--gold-d:rgba(232,160,32,0.14);
  --green:#3FB950;--green-d:rgba(63,185,80,0.12);
  --red:#F85149;--red-d:rgba(248,81,73,0.12);
  --blue:#58A6FF;--blue-d:rgba(88,166,255,0.12);
  --purple:#BC8CFF;--purple-d:rgba(188,140,255,0.12);
  --sw:230px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;display:flex;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
input[type=number]{-moz-appearance:textfield}input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

.sb{width:var(--sw);min-height:100vh;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
.sb-logo{padding:18px 20px 16px;border-bottom:1px solid var(--border)}
.logo-txt{font-size:15px;font-weight:700;letter-spacing:-.4px;display:flex;align-items:center;gap:7px}
.logo-dot{width:9px;height:9px;background:var(--gold);border-radius:50%;display:inline-block;flex-shrink:0}
.logo-sub{font-size:10px;color:var(--t3);margin-top:3px;padding-left:16px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px 4px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;color:var(--t2);transition:all .15s;margin:2px 0;font-size:13px;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--t1)}
.nav-item.active{background:var(--gold-d);color:var(--gold);font-weight:500}
.nav-icon{width:18px;text-align:center;font-size:13px;flex-shrink:0}
.sb-stats{padding:14px 16px;border-top:1px solid var(--border)}
.ss{padding:6px 0}.ss-l{font-size:10px;color:var(--t2)}.ss-v{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}

.main{margin-left:var(--sw);flex:1;padding:28px 28px 60px;min-height:100vh}
.ph{margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px}
.pt{font-size:22px;font-weight:700;letter-spacing:-.5px}
.ps{font-size:12px;color:var(--t2);margin-top:3px}
.ph-actions{display:flex;gap:8px;flex-wrap:wrap}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.kpi-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:7px}
.kpi-v{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.kpi-s{font-size:12px;margin-top:5px;color:var(--t2)}
.kpi-s.pos{color:var(--green)}.kpi-s.neg{color:var(--red)}

.charts-g{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.ct{font-size:13px;font-weight:600;margin-bottom:14px}

.tbl-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px}
.tbl-hdr{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.tbl-title{font-size:13px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
th:first-child,td:first-child{padding-left:20px}
th:last-child,td:last-child{padding-right:20px}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.num{font-variant-numeric:tabular-nums;text-align:right}

.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:var(--green-d);color:var(--green)}
.br{background:var(--red-d);color:var(--red)}
.bb{background:var(--blue-d);color:var(--blue)}
.bgold{background:var(--gold-d);color:var(--gold)}
.bgray{background:var(--bg3);color:var(--t2)}
.bpurple{background:var(--purple-d);color:var(--purple)}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--gold);color:#000}.btn-p:hover{background:#d9930e}
.btn-s{background:var(--bg3);color:var(--t1);border:1px solid var(--border)}.btn-s:hover{background:rgba(255,255,255,.08)}
.btn-g{background:transparent;color:var(--t2);padding:5px 10px;border:none}.btn-g:hover{color:var(--t1);background:var(--bg3)}
.btn-d{background:var(--red-d);color:var(--red);border:1px solid rgba(248,81,73,.2)}.btn-d:hover{background:rgba(248,81,73,.2)}
.btn-pu{background:var(--purple-d);color:var(--purple);border:1px solid rgba(188,140,255,.2)}.btn-pu:hover{background:rgba(188,140,255,.25)}

.fc{max-width:800px}
.fsec{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:14px}
.fst{font-size:13px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.fst::before{content:'';width:3px;height:15px;background:var(--gold);border-radius:2px;flex-shrink:0}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fgrp{display:flex;flex-direction:column;gap:5px}
.fgrp.full{grid-column:1/-1}
.fl{font-size:11px;color:var(--t2);font-weight:500}
.fi,.fsel,.fta{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--t1);font-size:13px;outline:none;transition:border-color .15s;font-family:inherit;width:100%}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--gold)}
.fsel option{background:var(--bg3)}
.fta{resize:vertical;min-height:80px}
.ipfx{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ipfx span{padding:7px 10px;color:var(--t2);font-size:12px;border-right:1px solid var(--border);background:rgba(255,255,255,.03);white-space:nowrap}
.ipfx input{flex:1;background:transparent;border:none;padding:7px 12px;color:var(--t1);font-size:13px;outline:none;font-family:inherit;width:0;min-width:0}

.row-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.row-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.row-item input,.row-item select{background:transparent;border:none;outline:none;color:var(--t1);font-size:13px;font-family:inherit}
.arb{display:flex;align-items:center;gap:6px;background:none;border:1px dashed var(--t3);border-radius:8px;padding:7px 12px;color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s;width:100%;font-family:inherit}
.arb:hover{border-color:var(--gold);color:var(--gold)}
.rmb{background:none;border:none;cursor:pointer;color:var(--t3);font-size:18px;line-height:1;padding:0 2px;transition:color .15s;flex-shrink:0}
.rmb:hover{color:var(--red)}

.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.pc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;cursor:pointer;transition:all .2s;position:relative}
.pc:hover{border-color:rgba(255,255,255,.14);transform:translateY(-2px)}
.pc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.pc-name{font-size:14px;font-weight:600}
.pc-addr{font-size:11px;color:var(--t2);margin-top:2px}
.pc-metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.pml{font-size:10px;color:var(--t2)}.pmv{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}
.pc-actions{display:flex;gap:7px;margin-top:14px}

/* ENTITY CARDS */
.eg{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.ec{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;position:relative}
.ec:hover{border-color:rgba(255,255,255,.14);transform:translateY(-2px)}
.ec.person-card{border-left:3px solid var(--purple)}
.ec.company-card{border-left:3px solid var(--blue)}
.ec-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.ec-avatar.av-p{background:var(--purple-d);color:var(--purple)}
.ec-avatar.av-c{background:var(--blue-d);color:var(--blue)}
.ec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.ec-name{font-size:15px;font-weight:600}
.ec-sub{font-size:11px;color:var(--t2);margin-top:2px}
.ec-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.em{background:var(--bg3);border-radius:8px;padding:9px 10px}
.eml{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.3px}
.emv{font-size:15px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
.ec-companies{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}

/* ENTITY DETAIL PANEL */
.dov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:200;display:flex;justify-content:flex-end}
.dpanel{width:640px;height:100vh;background:var(--bg1);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.dhdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--bg1);z-index:10}
.dtitle{font-size:17px;font-weight:700}
.daddr{font-size:11px;color:var(--t2);margin-top:2px}
.dbody{padding:22px;flex:1}
.mrow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.mrow4{grid-template-columns:repeat(4,1fr)}
.mbox{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px}
.mbox-l{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px}
.mbox-v{font-size:19px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
.dsec{margin-bottom:18px}
.dsec-t{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.dr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.dr-l{color:var(--t2)}.dr-v{font-weight:500;font-variant-numeric:tabular-nums}
.cfr{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:var(--bg3);border-radius:7px;margin-bottom:3px;font-size:13px}
.cft{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:8px;margin-top:7px;font-weight:700;font-size:14px}
.cftp{background:var(--green-d);color:var(--green)}.cftn{background:var(--red-d);color:var(--red)}

/* TREE */
.tree-root{margin-bottom:18px}
.tree-person{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--purple-d);border:1px solid rgba(188,140,255,.2);border-radius:10px;margin-bottom:8px}
.tree-company{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 10px 32px;background:var(--blue-d);border:1px solid rgba(88,166,255,.15);border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:13px}
.tree-company:hover{border-color:rgba(88,166,255,.4)}
.tree-prop{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 8px 52px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;margin-bottom:3px;cursor:pointer;font-size:12px}
.tree-prop:hover{border-color:rgba(255,255,255,.15)}

/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:18px;padding:4px;background:var(--bg3);border-radius:10px}
.tab{flex:1;padding:6px 10px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;text-align:center;color:var(--t2);border:none;background:transparent;transition:all .15s;font-family:inherit}
.tab.active{background:var(--bg2);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* FILTER BAR */
.fbr{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.fbtn{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--t2);transition:all .15s;font-family:inherit}
.fbtn:hover,.fbtn.active{background:var(--gold-d);color:var(--gold);border-color:rgba(232,160,32,.3)}
.fbtn.active-p{background:var(--purple-d);color:var(--purple);border-color:rgba(188,140,255,.3)}
.fbtn.active-b{background:var(--blue-d);color:var(--blue);border-color:rgba(88,166,255,.3)}
.fsel-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);margin-left:auto}
.fsel-wrap select{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:4px 9px;color:var(--t1);font-size:12px;font-family:inherit;outline:none}

/* MODAL */
.mov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:14px;padding:24px;width:460px;max-width:90vw}
.modal-t{font-size:17px;font-weight:700;margin-bottom:10px}
.modal-d{font-size:13px;color:var(--t2);margin-bottom:22px}
.modal-a{display:flex;gap:10px;justify-content:flex-end}

.toast{position:fixed;bottom:22px;right:22px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-size:13px;z-index:400;display:flex;align-items:center;gap:8px;animation:su .3s ease}
.toast.s{border-color:rgba(63,185,80,.3);color:var(--green)}.toast.e{border-color:rgba(248,81,73,.3);color:var(--red)}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

.div{height:1px;background:var(--border);margin:18px 0}
.es{text-align:center;padding:60px 20px;color:var(--t2)}
.es-i{font-size:36px;margin-bottom:14px;opacity:.25}
.es-t{font-size:17px;font-weight:600;color:var(--t1);margin-bottom:7px}
.es-d{font-size:13px;margin-bottom:22px}
.info-box{margin-bottom:14px;padding:11px 14px;background:var(--gold-d);border:1px solid rgba(232,160,32,.2);border-radius:8px;font-size:12px;color:var(--gold)}
.sum-box{padding:10px 12px;background:var(--bg3);border-radius:8px;font-size:13px;font-weight:700;text-align:right;margin-top:10px;color:var(--t2)}
.tag-line{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);margin-top:5px;flex-wrap:wrap}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
/* DOCUMENTS */
.doc-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.doc-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:8px}
.doc-icon{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--blue-d);color:var(--blue)}
.doc-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-meta{font-size:10px;color:var(--t2);margin-top:2px}
.doc-upload{display:flex;align-items:center;gap:6px;background:none;border:1px dashed var(--t3);border-radius:8px;padding:9px 14px;color:var(--t2);font-size:12px;cursor:pointer;transition:all .15s;width:100%;font-family:inherit}
.doc-upload:hover{border-color:var(--blue);color:var(--blue)}
/* MB */
.mb-badge{background:rgba(188,140,255,.18);color:var(--purple);border:1px solid rgba(188,140,255,.25);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.mb-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;gap:0;border-bottom:1px solid var(--border)}
.mb-row>div{padding:10px 14px;font-size:13px;font-variant-numeric:tabular-nums}
.mb-hdr>div{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;padding:8px 14px}
.mb-tot{background:var(--bg3);font-weight:700}
</style>
</head>

function n(v){return parseFloat(v)||0}
function calc(p){
  const ti=p.acquisitionPrice+p.notaryFees+p.agencyFees;
  const tw=(p.works||[]).reduce((a,w)=>a+n(w.amount),0);
  const total=ti+tw;
  const mr=n(p.monthlyRent),occ=n(p.occupancyRate)/100;
  const emr=mr*occ,ar=emr*12;
  const lm=n(p.loanMonthlyPayment);
  const im=n(p.insuranceMonthly)+n(p.insurancePNO)+n(p.insuranceGLI)+n(p.insuranceMultirisque);
  let ac=0;
  ac+=n(p.chargeCopro)*12;ac+=n(p.chargeTF);ac+=n(p.chargeTEOM);ac+=n(p.chargeGestion)*12;
  (p.charges||[]).forEach(c=>ac+=(c.frequency==='mensuel'?n(c.amount)*12:n(c.amount)));
  const mc=ac/12;
  const gy=total>0?(ar/total)*100:0;
  const ny=total>0?((ar-ac)/total)*100:0;
  const mcf=emr-lm-im-mc;
  let cg=null,cgp=null;
  if(p.saleDate&&p.salePrice){const ns=n(p.salePrice)-n(p.saleFees);cg=ns-total;cgp=(cg/total)*100}
  let mg=null,mgp=null;
  if(p.marketValue){mg=n(p.marketValue)-total;mgp=(mg/total)*100}
  let loanRemMonths=null,loanEndDate=null,crd=null,loanPct=0;
  const loanStart=p.loanStartDate,loanEnd=p.loanEndDate;
  if(loanStart&&loanEnd){
    const start=new Date(loanStart),end=new Date(loanEnd),now=new Date();
    loanEndDate=end;
    const diffMs=end-now;loanRemMonths=Math.max(0,Math.round(diffMs/(1000*60*60*24*30.44)));
    const totalMs=end-start,elapsedMs=now-start;
    loanPct=Math.min(100,Math.max(0,Math.round(elapsedMs/totalMs*100)));
    const travauxAdd=p.loanTravauxActive?n(p.loanTravauxMontant):0;
    const P=n(p.loanAmount)+travauxAdd;
    if(p.amortTable&&p.amortTable.length>0){
      const todayStr=now.toISOString().slice(0,7);
      const sorted=[...p.amortTable].sort((a,b)=>a.date.localeCompare(b.date));
      const row=sorted.find(r=>r.date>=todayStr)||sorted[sorted.length-1];
      crd=row?n(row.crd):null;
    } else if(lm>0&&P>0){
      const r=n(p.loanRate)/(100*12);
      const monthsElapsed=Math.max(0,Math.round(elapsedMs/(1000*60*60*24*30.44)));
      if(r>0)crd=Math.max(0,P*Math.pow(1+r,monthsElapsed)-lm*((Math.pow(1+r,monthsElapsed)-1)/r));
      else crd=Math.max(0,P-lm*monthsElapsed);
    }
  }
  const apport=n(p.loanApport);
  const travauxAdd=p.loanTravauxActive?n(p.loanTravauxMontant):0;
  return{totalAcq:ti,totalWorks:tw,total,emr,ar,lm,im,mc,ac,gy,ny,mcf,acf:mcf*12,cg,cgp,mg,mgp,loanRemMonths,loanEndDate,crd,loanPct,apport,travauxAdd};
}

// TRI (Taux de Rendement Interne) sur apport personnel
// Flux: -apport à l'acquisition, puis cash flow mensuel, puis (valeur marché - CRD) à la fin
function calcTRI(p, c){
  const apport=c.apport||n(p.loanApport);
  if(apport<=0)return null;
  // Construire les flux annuels
  const now=new Date();
  const acqDate=p.acquisitionDate?new Date(p.acquisitionDate):null;
  if(!acqDate)return null;
  const yearsHeld=(now-acqDate)/(1000*60*60*24*365.25);
  if(yearsHeld<0.5)return null;
  // Flux: investissement initial = -apport
  // Flux annuels = cash flow net annuel
  // Flux final = patrimoine net restant (valeur marché - CRD)
  const cfAnnuel=c.acf; // cash flow annuel net
  const finalVal=(n(p.marketValue||0))-(c.crd||n(p.loanAmount));
  const n_years=Math.max(1,Math.round(yearsHeld));
  // Newton-Raphson sur TRI
  const flows=[-apport,...Array(n_years-1).fill(cfAnnuel),cfAnnuel+finalVal];
  function npv(r){return flows.reduce((s,f,i)=>s+f/Math.pow(1+r,i),0);}
  let r=0.08,prev=0;
  for(let i=0;i<200;i++){
    const fn=npv(r);const dr=0.0001;const dfdr=(npv(r+dr)-fn)/dr;
    if(Math.abs(dfdr)<1e-10)break;
    prev=r;r=r-fn/dfdr;
    if(r<-0.99)r=-0.99;if(r>50)r=50;
    if(Math.abs(r-prev)<1e-7)break;
  }
  return isFinite(r)&&r>-1?r*100:null;
}

function setDocFilter(targetId,filter){S[`docFilter_${targetId}`]=filter;render();}

function uploadDoc(targetId,targetType,input){
  const files=Array.from(input.files);if(!files.length)return;
  let added=0,errors=0;
  const MAX=8*1024*1024;
  const processNext=(i)=>{
    if(i>=files.length){
      try{save();}catch(e){toast('Stockage plein — supprime des docs','e');return;}
      toast(added>1?`${added} documents ajoutés ✓`:`"${files[0].name}" ajouté ✓`,'s');render();return;
    }
    const file=files[i];
    if(file.size>MAX){errors++;toast(`"${file.name}" trop lourd (max 8 Mo)`,'e');processNext(i+1);return;}
    const r=new FileReader();
    r.onload=e=>{
      const doc={id:uid(),name:file.name,type:autoDetectDocType(file.name),date:new Date().toISOString().slice(0,10),notes:'',data:e.target.result,mimeType:file.type,size:file.size};
      if(targetType==='prop'){const p=S.props.find(x=>x.id===targetId);if(p){if(!p.docs)p.docs=[];p.docs.push(doc);}}
      else if(targetType==='company'){const c=S.companies.find(x=>x.id===targetId);if(c){if(!c.docs)c.docs=[];c.docs.push(doc);}}
      added++;processNext(i+1);
    };
    r.readAsDataURL(file);
  };
  processNext(0);input.value='';
}

function downloadDoc(tid,ttype,docId){
  const docs=getDocs(tid,ttype);const d=docs.find(x=>x.id===docId);if(!d)return;
  const a=document.createElement('a');a.href=d.data;a.download=d.name;a.click();
}

function previewDoc(tid,ttype,docId){
  const docs=getDocs(tid,ttype);const d=docs.find(x=>x.id===docId);if(!d)return;
  const w=window.open();if(w){w.document.write(`<html><body style="margin:0;background:#000"><img src="${d.data}" style="max-width:100%;max-height:100vh;display:block;margin:auto"></body></html>`);w.document.close();}
}

function deleteDoc(tid,ttype,docId){
  if(ttype==='prop'){const p=S.props.find(x=>x.id===tid);if(p)p.docs=(p.docs||[]).filter(d=>d.id!==docId);}
  else if(ttype==='company'){const c=S.companies.find(x=>x.id===tid);if(c)c.docs=(c.docs||[]).filter(d=>d.id!==docId);}
  save();toast('Document supprimé','s');render();
}

function setDocType(tid,ttype,docId,type){
  const docs=getDocs(tid,ttype);const d=docs.find(x=>x.id===docId);
  if(d){d.type=type;save();}
}

function setDocField(tid,ttype,docId,field,val){
  const docs=getDocs(tid,ttype);const d=docs.find(x=>x.id===docId);
  if(d){d[field]=val;save();}
}

// ─── MARCHAND DE BIENS ───────────────────────────────────
function calcMBPortage(p){
  if(!p.mbPortageMonths||p.mbPortageMonths<=0)return 0;
  const c=calc(p);return(c.im+c.mc)*n(p.mbPortageMonths);
}

function vMarchandBiens(){
  const mbProps=S.props.filter(p=>p.isMB);
  const enCours=mbProps.filter(p=>p.status!=='vendu');
  const vendus=mbProps.filter(p=>p.status==='vendu');

  if(mbProps.length===0)return`<div class="ph"><div><div class="pt">Marchand de biens</div><div class="ps">Vue dédiée aux opérations d'achat-revente</div></div><button class="btn btn-p" onclick="nav('add')">+ Nouvelle opération</button></div>
    <div class="es"><div class="es-i">🏗</div><div class="es-t">Aucune opération marchand de biens</div><div class="es-d">Activez le mode "Marchand de biens" dans l'onglet Identification d'un bien</div><button class="btn btn-p" onclick="nav('add')">+ Ajouter un bien</button></div>`;

  const mbRow=p=>{
    const c=calc(p);
    const fraisPortage=calcMBPortage(p);
    const target=n(p.mbTargetSalePrice)||n(p.salePrice)||0;
    const margeN=target>0?target-c.total-fraisPortage:null;
    const margePct=margeN!=null&&c.total>0?(margeN/c.total)*100:null;
    const isVendu=p.status==='vendu';
    const margeFin=isVendu&&p.salePrice?(n(p.salePrice)-c.total-fraisPortage):margeN;
    const pctFin=margeFin!=null&&c.total>0?(margeFin/c.total)*100:null;
    const el=getEntityLabel(p.entityId);
    // Durée portage
    let duree='—';
    if(p.acquisitionDate){const acq=new Date(p.acquisitionDate);const end=p.saleDate?new Date(p.saleDate):new Date();const m=Math.round((end-acq)/(1000*60*60*24*30.44));duree=m+'m';}
    return`<div class="mb-row">
      <div><div style="font-weight:600;font-size:13px;cursor:pointer" onclick="openD('${p.id}','prop')">${p.name}</div><div style="font-size:10px;color:var(--t2)">${p.address.split(',')[0]} · <span style="color:${el.color}">${el.name}</span></div><div style="margin-top:4px;display:flex;gap:5px">${sb(p.status)}<span class="mb-badge">MB</span></div></div>
      <div><div>${fc2(c.total)}</div><div style="font-size:10px;color:var(--t2)">portage : ${fc2(fraisPortage)}</div></div>
      <div style="font-weight:600">${target>0?fc2(target):'<span style="color:var(--t3)">—</span>'}</div>
      <div style="color:${margeFin!=null&&margeFin>=0?'var(--green)':'var(--red)'};font-weight:700">${margeFin!=null?fc2(margeFin,true):'—'}</div>
      <div style="color:${pctFin!=null&&pctFin>=15?'var(--green)':pctFin!=null&&pctFin>=8?'var(--gold)':'var(--red)'};font-weight:700">${pctFin!=null?pct(pctFin):'—'}</div>
      <div style="color:var(--t2)">${duree}</div>
    </div>`;
  };

  const totInvesti=enCours.reduce((a,p)=>a+calc(p).total,0);
  const totPortage=enCours.reduce((a,p)=>a+calcMBPortage(p),0);
  const totMargePrevi=enCours.reduce((a,p)=>{const c=calc(p);return a+n(p.mbTargetSalePrice)-c.total-calcMBPortage(p);},0);
  const totCA=vendus.reduce((a,p)=>a+n(p.salePrice),0);
  const totMargeR=vendus.reduce((a,p)=>{const c=calc(p);return a+n(p.salePrice)-c.total-calcMBPortage(p);},0);

  return`<div class="ph">
    <div><div class="pt">Marchand de biens</div><div class="ps">${enCours.length} opération(s) en cours · ${vendus.length} réalisée(s)</div></div>
    <div class="ph-actions"><button class="btn btn-p" onclick="nav('add')">+ Nouvelle opération</button></div>
  </div>
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-l">Capital engagé</div><div class="kpi-v">${fc2(totInvesti+totPortage)}</div><div class="kpi-s">dont portage : ${fc2(totPortage)}</div></div>
    <div class="kpi"><div class="kpi-l">Marge prévisionnelle</div><div class="kpi-v" style="color:${totMargePrevi>=0?'var(--green)':'var(--red)'}">${fc2(totMargePrevi,true)}</div><div class="kpi-s">Sur ${enCours.length} opération(s) en cours</div></div>
    <div class="kpi"><div class="kpi-l">CA réalisé</div><div class="kpi-v" style="color:var(--blue)">${fc2(totCA)}</div><div class="kpi-s">${vendus.length} opération(s) clôturée(s)</div></div>
    <div class="kpi"><div class="kpi-l">Marge nette réalisée</div><div class="kpi-v" style="color:var(--gold)">${fc2(totMargeR,true)}</div><div class="kpi-s">${totCA>0?pct(totMargeR/totCA*100)+' du CA':''}</div></div>
  </div>
  <div class="tbl-card">
    <div class="tbl-hdr"><span class="tbl-title">Détail des opérations</span></div>
    <div class="mb-row mb-hdr"><div>Opération</div><div>Capital investi</div><div>Prix cible / vente</div><div>Marge nette</div><div>Marge %</div><div>Durée</div></div>
    ${enCours.length>0?`<div style="padding:6px 14px;font-size:10px;font-weight:600;color:var(--purple);background:var(--purple-d);text-transform:uppercase;letter-spacing:.5px">En cours (${enCours.length})</div>${enCours.map(mbRow).join('')}`:''}
    ${vendus.length>0?`<div style="padding:6px 14px;font-size:10px;font-weight:600;color:var(--green);background:var(--green-d);text-transform:uppercase;letter-spacing:.5px">Réalisées (${vendus.length})</div>${vendus.map(mbRow).join('')}`:''}
    <div class="mb-row mb-tot"><div>Total</div><div>${fc2(totInvesti+totPortage)}</div><div>${fc2(totCA+(enCours.reduce((a,p)=>a+n(p.mbTargetSalePrice),0)))}</div><div style="color:${(totMargePrevi+totMargeR)>=0?'var(--green)':'var(--red)'}">${fc2(totMargePrevi+totMargeR,true)}</div><div></div><div></div></div>
  </div>`;
}

function calcEntityPortfolio(entityIds){
  const props=S.props.filter(p=>entityIds.includes(p.entityId));
  const active=props.filter(p=>p.status!=='vendu');
  let ti=0,mv=0,emr=0,mcf=0,ar=0,ac=0,soldCg=0,totalCRD=0;
  active.forEach(p=>{const c=calc(p);ti+=c.total;mv+=n(p.marketValue||c.total);emr+=c.emr;mcf+=c.mcf;ar+=c.ar;ac+=c.ac;if(c.crd!=null)totalCRD+=c.crd;else if(c.lm>0&&p.loanAmount>0)totalCRD+=n(p.loanAmount);});
  props.filter(p=>p.status==='vendu').forEach(p=>{const c=calc(p);if(c.cg)soldCg+=c.cg});
  const gy=ti>0?(ar/ti)*100:0,ny=ti>0?((ar-ac)/ti)*100:0,pv=mv-ti;
  const patrimoineNet=mv-totalCRD;
  return{ti,mv,emr,mcf,ar,gy,ny,pv,pvp:ti>0?(pv/ti)*100:0,count:active.length,sold:props.filter(p=>p.status==='vendu').length,soldCg,props,totalCRD,patrimoineNet};
}

function calcPortfolio(){
  return calcEntityPortfolio(S.props.map(p=>p.entityId));
}

// ─── FORMAT ──────────────────────────────────────────────
function fc2(v,s=false){const a=Math.abs(v),str=new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(a)+' €';return s?(v>=0?'+':'-')+str:(v<0?'-':'')+str}
function pct(v){return(+v.toFixed(1))+' %'}
function dt(d){return d?new Date(d).toLocaleDateString('fr-FR'):'—'}
function tn(t){return{appartement:'Apt',maison:'Maison',immeuble:'Immeuble',local_commercial:'Local com.',parking:'Parking',terrain:'Terrain'}[t]||t}
function sb(s){if(s==='loué')return'<span class="badge bg">Loué</span>';if(s==='vendu')return'<span class="badge bgray">Vendu</span>';if(s==='vacant')return'<span class="badge br">Vacant</span>';if(s==='travaux')return'<span class="badge bgold">Travaux</span>';return`<span class="badge bgray">${s}</span>`}
function getEntityLabel(entityId){
  const p=S.persons.find(x=>x.id===entityId);if(p)return{name:p.name,type:'person',color:'var(--purple)'};
  const c=S.companies.find(x=>x.id===entityId);if(c)return{name:c.name,type:'company',color:'var(--blue)'};
  return{name:'—',type:'unknown',color:'var(--t2)'};
}
function initials(name){return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function ctyLabel(t){return{SARLU:'SARLU',SAS:'SAS',SCI:'SCI',SARL:'SARL',EURL:'EURL',SNC:'SNC',holding:'Holding'}[t]||t}

// ─── FILTERED PROPS ──────────────────────────────────────
function getFilteredProps(){
  let ps=S.props;
  if(S.entityFilter!=='all'){
    if(S.entityFilter.startsWith('per_')){
      const pid=S.entityFilter.slice(3);
      const eids=getPersonEntityIds(pid);
      ps=ps.filter(p=>eids.includes(p.entityId));
    } else {

      ps=ps.filter(p=>p.entityId===eid);
    }
  }
  if(S.statusFilter!=='all')ps=ps.filter(p=>p.status===S.statusFilter);
  return ps;
}

      <div class="fgrp"><label class="fl">Taxe foncière (€/an)</label><div class="ipfx"><span>€/an</span><input type="text" inputmode="decimal" placeholder="0" value="${tf||''}" oninput="uft('chargeTF',fv(this.value))"></div></div>
      <div class="fgrp"><label class="fl">Taxe ordures ménagères TEOM (€/an)</label><div class="ipfx"><span>€/an</span><input type="text" inputmode="decimal" placeholder="0" value="${teom||''}" oninput="uft('chargeTEOM',fv(this.value))"></div></div>
      <div class="fgrp"><label class="fl">Frais de gestion locative (€/mois)</label><div class="ipfx"><span>€/m</span><input type="text" inputmode="decimal" placeholder="0" value="${gest||''}" oninput="uft('chargeGestion',fv(this.value))"></div></div>
    </div></div>
    <div class="fsec"><div class="fst">Honoraires locataires (ponctuels)</div>
      <div class="info-box">Ces montants sont ponctuels (par rotation) — ils n'impactent pas le cash flow mensuel.</div>
      <div class="fg">
        <div class="fgrp"><label class="fl">Honoraires entrée locataire (€)</label><div class="ipfx"><span>€</span><input type="text" inputmode="decimal" placeholder="0" value="${honE||''}" oninput="uft('chargeHonEntree',fv(this.value))"></div></div>
        <div class="fgrp"><label class="fl">Honoraires sortie / état des lieux (€)</label><div class="ipfx"><span>€</span><input type="text" inputmode="decimal" placeholder="0" value="${honS||''}" oninput="uft('chargeHonSortie',fv(this.value))"></div></div>
      </div>
    </div>
    <div class="fsec"><div class="fst">Autres charges</div>
      <div class="row-list">${C.map((cc,i)=>`<div class="row-item"><input placeholder="ex: Syndic, Eau..." value="${cc.label}" oninput="uc(${i},'label',this.value)" style="flex:2;min-width:0"><input type="text" inputmode="decimal" placeholder="Montant" value="${cc.amount||''}" oninput="uc(${i},'amount',fv(this.value))" style="flex:1;text-align:right;min-width:0"><select onchange="uc(${i},'frequency',this.value)" style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 7px;color:var(--t1);font-size:12px;font-family:inherit"><option value="mensuel"${cc.frequency==='mensuel'?' selected':''}>/mois</option><option value="annuel"${cc.frequency==='annuel'?' selected':''}>/an</option></select><button class="rmb" onclick="rc(${i})">×</button></div>`).join('')}</div>
      <button class="arb" onclick="ac2()">+ Ajouter une charge</button>
    </div>
    ${totalAC>0?`<div style="padding:12px 14px;background:var(--red-d);border:1px solid rgba(248,81,73,.2);border-radius:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--t2)">Total charges annuelles</span>
      <span style="font-size:17px;font-weight:700;color:var(--red)">${fc2(totalAC)}/an · <span style="font-size:14px">${fc2(totalAC/12)}/mois</span></span>
    </div>`:''}`;
  }

  else if(t===5){
    const mr=n(v('monthlyRent',0)),occ=n(v('occupancyRate',95));
    const ti=n(v('acquisitionPrice',0))+n(v('notaryFees',0))+n(v('agencyFees',0))+W.reduce((a,w)=>a+n(w.amount),0);
    const gy=ti>0?((mr*occ/100*12)/ti)*100:0;
    const bs=v('bailStartDate',''),be=v('bailEndDate','');
    let bailRemStr='',bailRemDays=null;
    if(be){
      const end=new Date(be);const now=new Date();
      bailRemDays=Math.round((end-now)/(1000*60*60*24));
      const ry=Math.floor(Math.max(0,bailRemDays/365));
      const rm=Math.round(Math.max(0,(bailRemDays-ry*365)/30.44));
      bailRemStr=bailRemDays>0?`Expire dans ${ry>0?ry+' an'+( ry>1?'s':'')+' ':''} ${rm>0?rm+' mois':''}`:`<span style="color:var(--red)">Bail expiré ou à renouveler</span>`;
    }
    body=`<div class="fsec"><div class="fst">Loyer & Occupation</div><div class="fg">
      <div class="fgrp"><label class="fl">Loyer mensuel hors charges (€)</label><div class="ipfx"><span>€/m</span><input type="text" inputmode="decimal" placeholder="0" value="${v('monthlyRent','')||''}" oninput="uft('monthlyRent',fv(this.value))"></div></div>
      <div class="fgrp"><label class="fl">Taux d'occupation (%)</label><div class="ipfx"><span>%</span><input type="text" inputmode="decimal" placeholder="95" value="${v('occupancyRate','')||''}" oninput="uft('occupancyRate',fv(this.value))"></div></div>
      <div class="fgrp"><label class="fl">Dépôt de garantie (€)</label><div class="ipfx"><span>€</span><input type="text" inputmode="decimal" placeholder="0" value="${v('bailDeposit','')||''}" oninput="uft('bailDeposit',fv(this.value))"></div></div>
    </div>
    ${mr>0?`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px"><div class="mbox"><div class="mbox-l">Loyer annuel eff.</div><div class="mbox-v" style="font-size:16px;color:var(--green)">${fc2(mr*occ/100*12)}</div></div><div class="mbox"><div class="mbox-l">Rdt brut estimé</div><div class="mbox-v" style="font-size:16px;color:var(--gold)">${pct(gy)}</div></div><div class="mbox"><div class="mbox-l">Taux occupation</div><div class="mbox-v" style="font-size:16px">${(+occ.toFixed(0))} %</div></div></div>`:''}</div>
    <div class="fsec"><div class="fst">Bail & Échéances</div><div class="fg">
      <div class="fgrp"><label class="fl">Type de bail</label><select class="fsel" onchange="uf('bailType',this.value)"><option value="">— Non défini —</option>${Object.entries(BAIL_TYPES).map(([k,lb])=>`<option value="${k}"${v('bailType')===k?' selected':''}>${lb}</option>`).join('')}</select></div>
      <div class="fgrp"></div>
      <div class="fgrp"><label class="fl">Date de début du bail</label><input class="fi" type="date" value="${bs}" onchange="uft('bailStartDate',this.value)"></div>
      <div class="fgrp"><label class="fl">Date de fin / échéance</label><input class="fi" type="date" value="${be}" onchange="uft('bailEndDate',this.value)"></div>
      <div class="fgrp"><label class="fl">Prochain renouvellement</label><input class="fi" type="date" value="${v('bailRenewalDate','')}" onchange="uft('bailRenewalDate',this.value)"></div>
      <div class="fgrp"><label class="fl">Préavis locataire</label><select class="fsel" onchange="uf('bailNoticePeriod',this.value)"><option value="">—</option>${['1 mois','2 mois','3 mois','6 mois'].map(x=>`<option${v('bailNoticePeriod')===x?' selected':''}>${x}</option>`).join('')}</select></div>
    </div>
    ${be?`<div style="margin-top:0;padding:12px 14px;background:${bailRemDays<90?'var(--red-d)':'var(--gold-d)'};border:1px solid ${bailRemDays<90?'rgba(248,81,73,.2)':'rgba(232,160,32,.2)'};border-radius:8px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--t2)">Échéance du bail</span><span style="font-weight:700;font-size:13px;color:${bailRemDays<90?'var(--red)':'var(--gold)'}">${bailRemStr}</span></div>`:''}
    </div>`;
  }

  else if(t===6){
    const sp=n(v('salePrice',0));const sf=n(v('saleFees',0));
    const ti=n(v('acquisitionPrice',0))+n(v('notaryFees',0))+n(v('agencyFees',0))+W.reduce((a,w)=>a+n(w.amount),0);
    const cg=(sp-sf)-ti;
    body=`<div class="fsec"><div class="fst">Cession du bien</div><div class="info-box">Ces informations concernent la vente effective ou simulée.</div><div class="fg">
      <div class="fgrp"><label class="fl">Date de vente</label><input class="fi" type="date" value="${v('saleDate','')}" onchange="uft('saleDate',this.value)"></div>
      <div class="fgrp"><label class="fl">Prix de vente (€)</label><div class="ipfx"><span>€</span><input type="text" inputmode="decimal" placeholder="0" value="${v('salePrice','')||''}" oninput="uft('salePrice',fv(this.value))"></div></div>
      <div class="fgrp"><label class="fl">Frais d'agence vente (€)</label><div class="ipfx"><span>€</span><input type="text" inputmode="decimal" placeholder="0" value="${v('saleFees','')||''}" oninput="uft('saleFees',fv(this.value))"></div></div>
    </div>
    ${sp>0?`<div class="div"></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px"><div class="mbox"><div class="mbox-l">Capital investi</div><div class="mbox-v" style="font-size:16px">${fc2(ti)}</div></div><div class="mbox"><div class="mbox-l">Prix net vendeur</div><div class="mbox-v" style="font-size:16px;color:var(--green)">${fc2(sp-sf)}</div></div><div class="mbox"><div class="mbox-l">Plus-value nette</div><div class="mbox-v" style="font-size:16px;color:${cg>=0?'var(--green)':'var(--red)'}">${fc2(cg,true)}</div></div></div>`:''}</div>`;
  }

  return`<div class="ph"><div><div class="pt">${isE?'Modifier le bien':'Ajouter un bien'}</div><div class="ps">${isE?(p?p.name:''):'Renseignez les informations'}</div></div></div>
  <div class="fc"><div class="tabs">${tabs.map((tt,i)=>`<button class="tab${S.formTab===i?' active':''}" onclick="setFT(${i})">${tt}</button>`).join('')}</div>
  ${body}
  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0">
    <div style="display:flex;gap:8px">${t>0?`<button class="btn btn-s" onclick="setFT(${t-1})">← Précédent</button>`:''}${t<tabs.length-1?`<button class="btn btn-s" onclick="setFT(${t+1})">Suivant →</button>`:''}</div>
    <div style="display:flex;gap:8px"><button class="btn btn-s" onclick="nav('properties')">Annuler</button><button class="btn btn-p" onclick="saveP(${isE?`'${eid}'`:'null'})">${isE?'Enregistrer':'Ajouter le bien'}</button></div>
  </div></div>`;
}

function vEntityForm(type, eid){
  const isE=!!eid;
  const isPerson=type==='person';
  const existing=isE?(isPerson?S.persons.find(x=>x.id===eid):S.companies.find(x=>x.id===eid)):null;
  const ef=S.entityForm||{};
  const vv=(k,d='')=>{if(ef[k]!==undefined&&ef[k]!==null)return ef[k];if(existing&&existing[k]!==undefined&&existing[k]!==null)return existing[k];return d};
  const CE=S.entityCessions||[];

  return`<div class="ph"><div><div class="pt">${isE?'Modifier':(isPerson?'Nouvelle personne':'Nouvelle société')}</div></div></div>
  <div class="fc">
  <div class="fsec">
    <div class="fst">${isPerson?'Personne physique':'Identité de la société'}</div>
    <div class="fg">
      <div class="fgrp ${isPerson?'':'full'}"><label class="fl">${isPerson?'Nom complet':'Raison sociale'} *</label><input class="fi" placeholder="${isPerson?'Jean Dupont':'SARLU LCH'}" value="${vv('name')}" oninput="uef('name',this.value)"></div>
      ${isPerson?`<div class="fgrp"><label class="fl">Initiales</label><input class="fi" placeholder="JD" maxlength="3" value="${vv('initials')}" oninput="uef('initials',this.value.toUpperCase())"></div>
      <div class="fgrp full"><label class="fl">Rôle / Fonction</label><input class="fi" placeholder="ex: Directeur, Associé…" value="${vv('role')}" oninput="uef('role',this.value)"></div>
      <div class="fgrp full"><label class="fl">Email</label><input class="fi" type="email" placeholder="email@exemple.fr" value="${vv('email')}" oninput="uef('email',this.value)"></div>`
      :`<div class="fgrp"><label class="fl">Forme juridique</label><select class="fsel" onchange="uef('type',this.value)">${['SAS','SARLU','SCI','SARL','EURL','SNC','holding'].map(tt=>`<option value="${tt}" ${vv('type','SAS')===tt?'selected':''}>${tt}</option>`).join('')}</select></div>
      <div class="fgrp"><label class="fl">Gérant (personne)</label><select class="fsel" onchange="uef('ownerId',this.value)"><option value="">— Sélectionner —</option>${S.persons.map(per=>`<option value="${per.id}" ${vv('ownerId')===per.id?'selected':''}>${per.name}</option>`).join('')}</select></div>
      <div class="fgrp full"><label class="fl">Associés supplémentaires</label><div style="display:flex;flex-direction:column;gap:5px">${S.persons.map(per=>`<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" ${(vv('partnerIds',[])||[]).includes(per.id)?'checked':''} onchange="togglePartner('${per.id}',this.checked)">${per.name}</label>`).join('')}</div></div>
      <div class="fgrp"><label class="fl">SIREN</label><input class="fi" placeholder="123 456 789" value="${vv('siren')}" oninput="uef('siren',this.value)"></div>
      <div class="fgrp"><label class="fl">Date de création</label><input class="fi" type="date" value="${vv('creationDate')}" onchange="uef('creationDate',this.value)"></div>
      <div class="fgrp full"><label class="fl">Objet social</label><input class="fi" placeholder="ex: Acquisition et gestion d'immeubles…" value="${vv('objetSocial')}" oninput="uef('objetSocial',this.value)"></div>`}
    </div>
  </div>
  ${!isPerson?`
  <div class="fsec">
    <div class="fst">Capital social</div>
    <div class="fg">
      <div class="fgrp"><label class="fl">Montant du capital social (€)</label><div class="ipfx"><span>€</span><input type="text" inputmode="decimal" placeholder="0" value="${vv('capitalSocial','')||''}" oninput="uef('capitalSocial',fv(this.value))"></div></div>
      <div class="fgrp"><label class="fl">Nombre de parts / actions</label><input class="fi" type="text" inputmode="numeric" placeholder="100" value="${vv('nbParts','')}" oninput="uef('nbParts',this.value)"></div>
      <div class="fgrp"><label class="fl">Valeur nominale d'une part (€)</label><div class="ipfx"><span>€</span><input type="text" inputmode="decimal" placeholder="1" value="${vv('valNominale','')||''}" oninput="uef('valNominale',fv(this.value))"></div></div>
      <div class="fgrp"><label class="fl">Type d'apport</label><select class="fsel" onchange="uef('apportType',this.value)">
        <option value="">— Sélectionner —</option>
        ${['Apport en numéraire (cash)','Apport en nature (immobilier)','Apport en industrie','Apport mixte (numéraire + nature)'].map(a=>`<option${vv('apportType')===a?' selected':''}>${a}</option>`).join('')}
      </select></div>
      <div class="fgrp full"><label class="fl">Détail des apports (qui a apporté quoi)</label><textarea class="fta" style="min-height:70px" placeholder="ex: Louis Hauchard — 900 parts — 9 000 € en numéraire&#10;Mélodie Hauchard — 100 parts — 1 000 € en numéraire" oninput="uef('apportDetail',this.value)">${vv('apportDetail')}</textarea></div>
    </div>
  </div>
  <div class="fsec">
    <div class="fst">Vie de la société</div>
    <div class="fg">
      <div class="fgrp full"><label class="fl">Événements / historique</label><textarea class="fta" style="min-height:90px" placeholder="ex: 2021 — Augmentation de capital à 15 000 €&#10;2023 — Changement de gérant&#10;2024 — Modification des statuts" oninput="uef('historique',this.value)">${vv('historique')}</textarea></div>
    </div>
  </div>
  <div class="fsec">
    <div class="fst">Cessions de parts</div>
    <div class="info-box">Historique des cessions de parts sociales ou d'actions passées.</div>
    <div class="row-list" id="cessions-list">${CE.map((c,i)=>`<div class="row-item" style="flex-wrap:wrap;gap:6px">
      <input placeholder="Cédant" value="${c.cedant||''}" oninput="ucession(${i},'cedant',this.value)" style="flex:1;min-width:100px">
      <input placeholder="Cessionnaire" value="${c.cessionnaire||''}" oninput="ucession(${i},'cessionnaire',this.value)" style="flex:1;min-width:100px">
      <input type="text" inputmode="numeric" placeholder="Nb parts" value="${c.nbParts||''}" oninput="ucession(${i},'nbParts',this.value)" style="width:80px;min-width:0">
      <input type="text" inputmode="decimal" placeholder="Prix (€)" value="${c.prix||''}" oninput="ucession(${i},'prix',fv(this.value))" style="width:90px;min-width:0">
      <input type="date" value="${c.date||''}" onchange="ucession(${i},'date',this.value)" style="width:140px;min-width:0">
      <button class="rmb" onclick="rcession(${i})">×</button>
    </div>`).join('')}</div>
    <button class="arb" onclick="acession()">+ Ajouter une cession</button>
  </div>`:''}
  <div style="display:flex;justify-content:flex-end;gap:8px;padding:14px 0">
    <button class="btn btn-s" onclick="nav('entities')">Annuler</button>
    <button class="btn btn-p" onclick="saveEntity('${type}','${eid||''}')">Enregistrer</button>
  </div></div>`;
}

// ─── DETAIL PANELS ───────────────────────────────────────
function vDetailProp(id){
  const p=S.props.find(x=>x.id===id);if(!p)return'';
  const c=calc(p);const cc=c.mcf>=0?'var(--green)':'var(--red)';const el=getEntityLabel(p.entityId);
  const RENTAL_LABELS={location_longue_duree_hab:'Longue durée habitation',location_meublee:'Location meublée',location_pro:'Professionnelle',location_commerciale:'Commerciale (3-6-9)',location_courte_duree:'Courte durée'};
  const BAIL_LABELS={hab_nu:'Bail habitation nu (3 ans)',hab_meuble:'Bail meublé (1 an)',commercial:'Bail commercial (9 ans)',pro:'Bail professionnel (6 ans)',courte_duree:'Courte durée'};
  let bailAlert='';
  if(p.bailEndDate){
    const end=new Date(p.bailEndDate);const now=new Date();
    const days=Math.round((end-now)/(1000*60*60*24));
    if(days<90)bailAlert=`<div style="margin-bottom:12px;padding:9px 12px;background:var(--red-d);border:1px solid rgba(248,81,73,.2);border-radius:8px;font-size:12px;color:var(--red)">⚠ Bail ${days<0?'expiré':'expire dans '+days+' jours'} — ${dt(p.bailEndDate)}</div>`;
  }
  return`<div class="dov" onclick="closeDov(event)"><div class="dpanel" onclick="event.stopPropagation()">
    <div class="dhdr"><div><div class="dtitle">${p.name}</div><div class="daddr">${p.address}</div><div style="margin-top:7px;display:flex;gap:6px;flex-wrap:wrap">${sb(p.status)}<span class="badge bb">${{appartement:'Apt',maison:'Maison',immeuble:'Immeuble',local_commercial:'Local com.',parking:'Parking',terrain:'Terrain'}[p.type]||p.type}</span>${p.rentalType?`<span class="badge bgold" style="font-size:10px">${RENTAL_LABELS[p.rentalType]||p.rentalType}</span>`:''}<span style="font-size:11px;color:${el.color}">● ${el.name}</span></div></div>
    <div style="display:flex;gap:6px"><button class="btn btn-s" style="font-size:12px" onclick="editP('${p.id}')">Modifier</button><button class="btn btn-g" onclick="closeD()" style="font-size:20px;padding:3px 9px;line-height:1">×</button></div></div>
    <div class="dbody">
      ${bailAlert}
      <div class="mrow"><div class="mbox"><div class="mbox-l">Capital investi</div><div class="mbox-v">${fc2(c.total)}</div></div><div class="mbox"><div class="mbox-l">Rdt net</div><div class="mbox-v" style="color:var(--gold)">${p.status!=='vendu'?pct(c.ny):'—'}</div></div><div class="mbox"><div class="mbox-l">${p.status==='vendu'?'Plus-value':'Cash flow/mois'}</div><div class="mbox-v" style="color:${p.status==='vendu'?(c.cg>=0?'var(--green)':'var(--red)'):cc}">${p.status==='vendu'?fc2(c.cg||0,true):fc2(c.mcf,true)}</div></div></div>
      <div class="dsec"><div class="dsec-t">Acquisition</div><div class="dr"><span class="dr-l">Date</span><span class="dr-v">${dt(p.acquisitionDate)}</span></div><div class="dr"><span class="dr-l">Prix d'achat</span><span class="dr-v">${fc2(p.acquisitionPrice)}</span></div><div class="dr"><span class="dr-l">Frais notaire</span><span class="dr-v">${fc2(p.notaryFees)}</span></div><div class="dr"><span class="dr-l">Frais agence</span><span class="dr-v">${fc2(p.agencyFees)}</span></div>${c.totalWorks>0?`<div class="dr"><span class="dr-l">Travaux</span><span class="dr-v">${fc2(c.totalWorks)}</span></div>`:''}<div class="dr" style="font-weight:700;border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><span style="color:var(--t1)">Total investi</span><span style="color:var(--gold)">${fc2(c.total)}</span></div></div>
      ${p.loanAmount>0?`<div class="dsec"><div class="dsec-t">Prêt immobilier</div><div class="dr"><span class="dr-l">Montant emprunté</span><span class="dr-v">${fc2(p.loanAmount)}</span></div><div class="dr"><span class="dr-l">Taux</span><span class="dr-v">${p.loanRate} %</span></div>${p.loanStartDate?`<div class="dr"><span class="dr-l">Fin de prêt</span><span class="dr-v">${c.loanEndDate?c.loanEndDate.toLocaleDateString('fr-FR'):'—'}</span></div><div class="dr"><span class="dr-l">Temps restant</span><span class="dr-v" style="color:var(--gold)">${c.loanRemMonths!==null?(c.loanRemMonths>0?Math.floor(c.loanRemMonths/12)+'a '+c.loanRemMonths%12+'m':'Terminé'):'—'}</span></div>`:''}${c.crd!=null?`<div class="dr" style="font-weight:600"><span class="dr-l">Capital restant dû (aujourd'hui)</span><span class="dr-v" style="color:var(--red)">${fc2(c.crd)}</span></div>`:''}${c.im>0?`<div class="dr"><span class="dr-l">Total assurances/mois</span><span class="dr-v" style="color:var(--red)">−${fc2(c.im)}</span></div>`:''}</div>`:''}
      ${(()=>{const tri=calcTRI(p,c);const apport=c.apport;if(!apport||apport<=0)return '';return`<div class="dsec"><div class="dsec-t">TRI sur apport personnel</div><div class="mrow" style="grid-template-columns:repeat(3,1fr);margin-bottom:0"><div class="mbox"><div class="mbox-l">Apport initial</div><div class="mbox-v" style="font-size:14px">${fc2(apport)}</div></div><div class="mbox"><div class="mbox-l">TRI annualisé</div><div class="mbox-v" style="color:${tri!=null&&tri>=8?'var(--green)':tri!=null&&tri>=4?'var(--gold)':'var(--red)'}">${tri!=null?pct(tri):'Insuffisant'}</div></div><div class="mbox"><div class="mbox-l">Cash flow/an</div><div class="mbox-v" style="font-size:14px;color:${c.acf>=0?'var(--green)':'var(--red)'}">${fc2(c.acf,true)}</div></div></div><div style="font-size:11px;color:var(--t2);margin-top:8px">Calcul basé sur la période détenue, le cash flow annuel et la valorisation actuelle</div></div>`;})()}      ${p.status!=='vendu'?`<div class="dsec"><div class="dsec-t">Cash flow mensuel</div><div class="cfr"><span>Loyer effectif (${p.occupancyRate}%)</span><span style="color:var(--green)">+${fc2(c.emr)}</span></div><div class="cfr"><span>Mensualité prêt</span><span style="color:var(--red)">−${fc2(c.lm)}</span></div><div class="cfr"><span>Assurances total</span><span style="color:var(--red)">−${fc2(c.im)}</span></div><div class="cfr"><span>Charges/mois</span><span style="color:var(--red)">−${fc2(c.mc)}</span></div><div class="cft ${c.mcf>=0?'cftp':'cftn'}"><span>Cash flow net mensuel</span><span>${fc2(c.mcf,true)} · ${fc2(c.acf,true)}/an</span></div></div>
      <div class="dsec"><div class="dsec-t">Charges annuelles</div>${n(p.chargeCopro)>0?`<div class="dr"><span class="dr-l">Charges de copro</span><span class="dr-v">${fc2(p.chargeCopro)}/mois</span></div>`:''}${n(p.chargeTF)>0?`<div class="dr"><span class="dr-l">Taxe foncière</span><span class="dr-v">${fc2(p.chargeTF)}/an</span></div>`:''}${n(p.chargeTEOM)>0?`<div class="dr"><span class="dr-l">TEOM</span><span class="dr-v">${fc2(p.chargeTEOM)}/an</span></div>`:''}${n(p.chargeGestion)>0?`<div class="dr"><span class="dr-l">Frais de gestion</span><span class="dr-v">${fc2(p.chargeGestion)}/mois</span></div>`:''}${(p.charges||[]).map(ch=>`<div class="dr"><span class="dr-l">${ch.label}</span><span class="dr-v">${fc2(n(ch.amount))}/${ch.frequency==='mensuel'?'mois':'an'}</span></div>`).join('')}<div class="dr" style="font-weight:700;border-top:1px solid var(--border);padding-top:6px;margin-top:4px"><span style="color:var(--t1)">Total annuel</span><span style="color:var(--red)">−${fc2(c.ac)}</span></div></div>
      <div class="dsec"><div class="dsec-t">Rendements</div><div class="dr"><span class="dr-l">Rdt brut</span><span class="dr-v" style="color:var(--gold)">${pct(c.gy)}</span></div><div class="dr" style="font-weight:700"><span style="color:var(--t1)">Rdt net</span><span style="color:var(--gold)">${pct(c.ny)}</span></div></div>`:''}
      ${p.bailType||p.bailStartDate||p.bailEndDate?`<div class="dsec"><div class="dsec-t">Bail</div>${p.bailType?`<div class="dr"><span class="dr-l">Type</span><span class="dr-v">${{hab_nu:'Habitation nu',hab_meuble:'Meublé',commercial:'Commercial',pro:'Professionnel',courte_duree:'Courte durée'}[p.bailType]||p.bailType}</span></div>`:''}${p.bailStartDate?`<div class="dr"><span class="dr-l">Début</span><span class="dr-v">${dt(p.bailStartDate)}</span></div>`:''}${p.bailEndDate?`<div class="dr"><span class="dr-l">Échéance</span><span class="dr-v">${dt(p.bailEndDate)}</span></div>`:''}${p.bailRenewalDate?`<div class="dr"><span class="dr-l">Renouvellement</span><span class="dr-v">${dt(p.bailRenewalDate)}</span></div>`:''}${p.bailNoticePeriod?`<div class="dr"><span class="dr-l">Préavis</span><span class="dr-v">${p.bailNoticePeriod}</span></div>`:''}${p.bailDeposit?`<div class="dr"><span class="dr-l">Dépôt de garantie</span><span class="dr-v">${fc2(p.bailDeposit)}</span></div>`:''}</div>`:''}

function vDetailEntity(id, type){
  const isPerson=type==='person';

  if(!entity)return'';
  const eids=isPerson?getPersonEntityIds(id):[id];
  const pt=calcEntityPortfolio(eids);
  const cc=pt.mcf>=0?'var(--green)':'var(--red)';
  const companies=isPerson?S.companies.filter(c=>c.ownerId===id||(c.partnerIds||[]).includes(id)):[];
  const directProps=S.props.filter(p=>p.entityId===id);
  const av=isPerson?`<div class="ec-avatar av-p" style="width:44px;height:44px">${entity.initials||initials(entity.name)}</div>`:`<div class="ec-avatar av-c" style="width:44px;height:44px">${entity.name.slice(0,2).toUpperCase()}</div>`;

  return`<div class="dov" onclick="closeDov(event)"><div class="dpanel" onclick="event.stopPropagation()">
    <div class="dhdr"><div style="display:flex;align-items:center;gap:12px">${av}<div><div class="dtitle">${entity.name}</div><div class="daddr">${isPerson?(entity.role||'Personne physique'):(ctyLabel(entity.type)+' · '+((entity.ownerId&&S.persons.find(p=>p.id===entity.ownerId))||{name:'—'}).name)}</div></div></div>
    <div style="display:flex;gap:6px"><button class="btn btn-s" style="font-size:12px" onclick="openEntityForm('${type}','${id}')">Modifier</button><button class="btn btn-g" onclick="closeD()" style="font-size:20px;padding:3px 9px">×</button></div></div>
    <div class="dbody">
      <div class="mrow mrow4">
        <div class="mbox"><div class="mbox-l">Biens actifs</div><div class="mbox-v">${pt.count}</div></div>
        <div class="mbox"><div class="mbox-l">Capital investi</div><div class="mbox-v" style="font-size:15px">${fc2(pt.ti)}</div></div>
        <div class="mbox"><div class="mbox-l">Cash flow/mois</div><div class="mbox-v" style="color:${cc};font-size:15px">${fc2(pt.mcf,true)}</div></div>
        <div class="mbox"><div class="mbox-l">Rdt net moy.</div><div class="mbox-v" style="color:var(--gold);font-size:15px">${pct(pt.ny)}</div></div>
      </div>
      <div class="dr"><span class="dr-l">Plus-value latente totale</span><span class="dr-v" style="color:${pt.pv>=0?'var(--green)':'var(--red)'}">${fc2(pt.pv,true)} (${pct(pt.pvp)})</span></div>
      ${pt.sold>0?`<div class="dr"><span class="dr-l">Plus-values réalisées</span><span class="dr-v" style="color:var(--green)">${fc2(pt.soldCg,true)}</span></div>`:''}
      ${isPerson&&companies.length>0?`<div class="dsec" style="margin-top:16px"><div class="dsec-t">Sociétés contrôlées (${companies.length})</div>${companies.map(c=>{const cp=calcEntityPortfolio([c.id]);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:5px;cursor:pointer" onclick="closeD();openD('${c.id}','company')"><div><div style="font-size:13px;font-weight:600">${c.name}</div><div style="font-size:10px;color:var(--t2)">${ctyLabel(c.type)} · ${cp.count} biens</div></div><div style="text-align:right"><div style="font-size:13px;font-weight:600">${fc2(cp.ti)}</div><div style="font-size:11px;color:${cp.mcf>=0?'var(--green)':'var(--red)'}">${fc2(cp.mcf,true)}/mois</div></div></div>`}).join('')}</div>`:''}
      <div class="dsec" style="margin-top:16px"><div class="dsec-t">Biens ${isPerson?'en nom propre':'dans cette société'} (${directProps.filter(p=>p.status!=='vendu').length})</div>
        ${directProps.filter(p=>p.status!=='vendu').map(p=>{const c=calc(p);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:5px;cursor:pointer" onclick="closeD();openD('${p.id}','prop')"><div><div style="font-size:13px;font-weight:600">${p.name}</div><div style="font-size:10px;color:var(--t2)">${p.address.split(',')[0]} · ${sb(p.status)}</div></div><div style="text-align:right"><div style="font-size:13px">${fc2(c.mcf,true)}/mois</div><div style="font-size:11px;color:var(--gold)">${pct(c.ny)}</div></div></div>`}).join('')}
        ${directProps.filter(p=>p.status==='vendu').length>0?`<div style="margin-top:6px;font-size:11px;color:var(--t2)">Vendus : ${directProps.filter(p=>p.status==='vendu').map(p=>{const c=calc(p);return`<span style="margin-right:10px;cursor:pointer" onclick="closeD();openD('${p.id}','prop')">${p.name} <span style="color:${(c.cg||0)>=0?'var(--green)':'var(--red)'}">${c.cg!==null?fc2(c.cg,true):'—'}</span></span>`}).join('')}</div>`:''}
      </div>
      ${isPerson&&companies.length>0?`<div class="dsec"><div class="dsec-t">Tous les biens via sociétés</div>${companies.map(c=>S.props.filter(p=>p.entityId===c.id&&p.status!=='vendu').map(p=>{const cc2=calc(p);return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:5px;cursor:pointer" onclick="closeD();openD('${p.id}','prop')"><div><div style="font-size:13px;font-weight:600">${p.name}</div><div style="font-size:10px;color:var(--blue)">via ${c.name} · ${p.address.split(',')[0]}</div></div><div style="text-align:right"><div style="font-size:13px">${fc2(cc2.mcf,true)}/mois</div><div style="font-size:11px;color:var(--gold)">${pct(cc2.ny)}</div></div></div>`}).join('')).join('')}</div>`:''}
      ${!isPerson&&(entity.capitalSocial||entity.objetSocial||entity.creationDate||entity.historique||entity.cessions?.length)?`

        ${entity.capitalSocial?`<div class="dr"><span class="dr-l">Capital social</span><span class="dr-v" style="color:var(--gold);font-weight:700">${fc2(entity.capitalSocial)}</span></div>`:''}
        ${entity.nbParts?`<div class="dr"><span class="dr-l">Nombre de parts</span><span class="dr-v">${entity.nbParts}${entity.valNominale?` · ${fc2(entity.valNominale)}/part`:''}</span></div>`:''}
        ${entity.apportType?`<div class="dr"><span class="dr-l">Type d'apport</span><span class="dr-v">${entity.apportType}</span></div>`:''}
        ${entity.objetSocial?`<div class="dr" style="align-items:flex-start"><span class="dr-l">Objet social</span><span class="dr-v" style="text-align:right;font-size:12px;max-width:65%">${entity.objetSocial}</span></div>`:''}
        ${entity.apportDetail?`<div style="margin-top:8px;padding:9px 12px;background:var(--bg3);border-radius:7px;font-size:12px;white-space:pre-wrap;color:var(--t2)">${entity.apportDetail}</div>`:''}
      </div>`:''}
      ${!isPerson&&entity.historique?`<div class="dsec"><div class="dsec-t">Vie de la société</div><div style="padding:9px 12px;background:var(--bg3);border-radius:7px;font-size:12px;white-space:pre-wrap;color:var(--t2)">${entity.historique}</div></div>`:''}
      ${!isPerson&&entity.cessions?.length?`<div class="dsec"><div class="dsec-t">Cessions de parts (${entity.cessions.length})</div>${entity.cessions.map(c=>`<div class="cfr" style="font-size:12px;flex-wrap:wrap;gap:4px"><span style="color:var(--t2)">${dt(c.date)}</span><span>${c.cedant||'—'} → ${c.cessionnaire||'—'}</span><span style="color:var(--t2)">${c.nbParts?c.nbParts+' parts':''}</span><span style="color:var(--gold);font-weight:600">${c.prix?fc2(n(c.prix)):''}</span></div>`).join('')}</div>`:''}
      ${!isPerson?vDocsSection(id,'company'):''}
    </div>
  </div></div>`;
}

function renderCharts(){
  const active=S.props.filter(p=>p.status!=='vendu');
  const yc=document.getElementById('ychart');
  if(yc){if(yc._c)yc._c.destroy();const ys=active.map(p=>parseFloat(calc(p).ny.toFixed(1)));yc._c=new Chart(yc,{type:'bar',data:{labels:active.map(p=>p.name.length>16?p.name.slice(0,14)+'…':p.name),datasets:[{data:ys,backgroundColor:ys.map(y=>y>=5?'rgba(63,185,80,.7)':y>=3?'rgba(232,160,32,.7)':'rgba(248,81,73,.7)'),borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8B949E',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#8B949E',font:{size:11},callback:v=>v+'%'},min:0}}}})}
  const pc2=document.getElementById('pchart');
  if(pc2){
    if(pc2._c)pc2._c.destroy();
    const bt={};
    active.forEach(p=>{const el=getEntityLabel(p.entityId);const nm=el.name;bt[nm]=(bt[nm]||0)+calc(p).total});
    const lbls=Object.keys(bt),vals=Object.values(bt),tot=vals.reduce((a,v)=>a+v,0);
    const CL=['#BC8CFF','#58A6FF','#E8A020','#3FB950','#F85149','#EC775C'];
    pc2._c=new Chart(pc2,{type:'doughnut',data:{labels:lbls,datasets:[{data:vals,backgroundColor:CL.slice(0,lbls.length),borderWidth:2,borderColor:'#161B22',hoverOffset:5}]},options:{responsive:false,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'62%',layout:{padding:4}}});
    const leg=document.getElementById('pleg');
    if(leg)leg.innerHTML=lbls.map((l,i)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:9px"><div style="width:9px;height:9px;border-radius:2px;background:${CL[i]};flex-shrink:0"></div><div><div style="color:#F0F6FC;font-size:12px;font-weight:500">${l}</div><div style="color:#8B949E;font-size:10px">${fc2(vals[i])} · ${Math.round(vals[i]/tot*100)}%</div></div></div>`).join('');
  }
}

// ─── ACTIONS ─────────────────────────────────────────────
function nav(v){S.view=v;S.showDetail=false;if(v==='add'){S.form={};S.fw=[];S.fc=[];S.formTab=0;S.editId=null}render()}
function setSF(f){S.statusFilter=f;render()}
function setEF(f){S.entityFilter=f;render()}
function openD(id,type){S.selId=id;S.selType=type;S.showDetail=true;render()}
function closeD(){S.showDetail=false;render()}
function closeDov(e){if(e.target.classList.contains('dov'))closeD()}
function editP(id){const p=S.props.find(x=>x.id===id);if(!p)return;S.view='edit';S.editId=id;S.showDetail=false;S.form={...p};S.fw=(p.works||[]).map(w=>({...w}));S.fc=(p.charges||[]).map(c=>({...c}));S.formTab=0;render()}
function confDel(id,type){S.delTarget=id;S.delTargetType=type;S.showDel=true;render()}
function closeDM(){S.showDel=false;S.delTarget=null;render()}
function delItem(){
  const t=S.delTargetType;const id=S.delTarget;
  if(t==='prop')S.props=S.props.filter(p=>p.id!==id);
  else if(t==='person')S.persons=S.persons.filter(p=>p.id!==id);
  else if(t==='company'){S.companies=S.companies.filter(c=>c.id!==id);S.props.forEach(p=>{if(p.entityId===id)p.entityId=null})}
  save();S.showDel=false;S.delTarget=null;S.showDetail=false;toast('Supprimé','s');nav(t==='prop'?'properties':'entities');
}
function uf(k,v){if(!S.form)S.form={};S.form[k]=v;}
function setFT(i){S.formTab=i;render()}
function aw(){S.fw.push({id:uid(),label:'',amount:0,date:''});render()}
function rw(i){S.fw.splice(i,1);render()}
function uw(i,k,v){S.fw[i][k]=v;}
function ac2(){S.fc.push({id:uid(),label:'',amount:0,frequency:'mensuel'});render()}
function rc(i){S.fc.splice(i,1);render()}
function uc(i,k,v){S.fc[i][k]=v;}

function parseAmort(){
  const raw=document.getElementById('amort-input')?.value||'';
  const lines=raw.trim().split('\n').map(l=>l.trim()).filter(l=>l);
  const rows=[];
  for(const l of lines){
    const parts=l.replace(/\s+/g,' ').split(/[;,\t]/).map(s=>s.trim());
    if(parts.length>=2){
      const dateStr=parts[0].replace(/\//g,'-');
      const crd=fv(parts[parts.length-1]);
      if(dateStr&&crd>0)rows.push({date:dateStr.slice(0,7),crd});
    }
  }
  if(rows.length===0){toast('Aucune donnée reconnue. Format attendu : date;capital_restant','e');return;}
  if(!S.form)S.form={};
  S.form.amortTable=rows;
  toast(`${rows.length} lignes importées ✓`,'s');
  render();
}

function openEntityForm(type,eid){S.view='entityForm';S.entityFormType=type;S.editEntityId=eid||null;S.entityForm={};
  if(eid&&type==='company'){const cmp=S.companies.find(x=>x.id===eid);S.entityCessions=(cmp?.cessions||[]).map(c=>({...c}));}
  else S.entityCessions=[];
  S.showDetail=false;render()}
function uef(k,v){if(!S.entityForm)S.entityForm={};S.entityForm[k]=v}
function acession(){S.entityCessions.push({id:uid(),cedant:'',cessionnaire:'',nbParts:'',prix:0,date:''});render()}
function rcession(i){S.entityCessions.splice(i,1);render()}
function ucession(i,k,v){S.entityCessions[i][k]=v}
function togglePartner(pid,checked){
  if(!S.entityForm)S.entityForm={};
  const existing=S.editEntityId?S.companies.find(c=>c.id===S.editEntityId):null;
  let pids=[...(S.entityForm.partnerIds||(existing?.partnerIds||[]))];
  if(checked&&!pids.includes(pid))pids.push(pid);
  else if(!checked)pids=pids.filter(x=>x!==pid);
  S.entityForm.partnerIds=pids;
}

function saveEntity(type,eid){
  const f=S.entityForm||{};const isE=!!eid;
  if(type==='person'){
    const existing=isE?S.persons.find(x=>x.id===eid):null;
    const nm=f.name||(existing?.name)||'';
    if(!nm){toast('Le nom est requis','e');return}
    const obj={name:nm,initials:f.initials||(existing?.initials)||initials(nm),role:f.role||(existing?.role)||'',email:f.email||(existing?.email)||''};
    if(isE){const i=S.persons.findIndex(x=>x.id===eid);if(i>=0)S.persons[i]={...S.persons[i],...obj};}
    else S.persons.push({id:uid(),...obj});
  } else {
    const existing=isE?S.companies.find(x=>x.id===eid):null;
    const nm=f.name||(existing?.name)||'';
    if(!nm){toast('La raison sociale est requise','e');return}
    const obj={name:nm,type:f.type||(existing?.type)||'SAS',ownerId:f.ownerId||(existing?.ownerId)||'',
      partnerIds:f.partnerIds||(existing?.partnerIds)||[],siren:f.siren||(existing?.siren)||'',
      creationDate:f.creationDate||(existing?.creationDate)||'',objetSocial:f.objetSocial||(existing?.objetSocial)||'',
      capitalSocial:fv(f.capitalSocial)||(existing?.capitalSocial)||0,nbParts:f.nbParts||(existing?.nbParts)||'',
      valNominale:fv(f.valNominale)||(existing?.valNominale)||0,apportType:f.apportType||(existing?.apportType)||'',
      apportDetail:f.apportDetail||(existing?.apportDetail)||'',historique:f.historique||(existing?.historique)||'',
      cessions:S.entityCessions||[]};
    if(isE){const i=S.companies.findIndex(x=>x.id===eid);if(i>=0)S.companies[i]={...S.companies[i],...obj};}
    else S.companies.push({id:uid(),...obj});
  }
  save();toast('Enregistré','s');nav('entities');
}

function saveP(eid){
  const f=S.form||{};
  if(!f.name){toast('Le nom du bien est requis','e');S.formTab=0;render();return}
  if(!f.entityId){toast('Sélectionnez un propriétaire (personne ou société)','e');S.formTab=0;render();return}
  const fd={name:f.name||'',address:f.address||'',type:f.type||'appartement',status:f.status||'vacant',
    rentalType:f.rentalType||null,entityId:f.entityId||null,
    isMB:!!f.isMB,mbTargetSalePrice:fv(f.mbTargetSalePrice)||null,mbPortageMonths:parseInt(f.mbPortageMonths)||0,
    acquisitionDate:f.acquisitionDate||'',acquisitionPrice:fv(f.acquisitionPrice),notaryFees:fv(f.notaryFees),agencyFees:fv(f.agencyFees),
    works:S.fw.filter(w=>w.label||w.amount>0),
    loanApport:fv(f.loanApport),loanStartDate:f.loanStartDate||null,loanEndDate:f.loanEndDate||null,
    loanAmount:fv(f.loanAmount),loanRate:fv(f.loanRate),loanMonthlyPayment:fv(f.loanMonthlyPayment),
    loanTravauxActive:!!f.loanTravauxActive,loanTravauxMontant:fv(f.loanTravauxMontant),
    manualCRD:f.manualCRD?fv(f.manualCRD):null,amortTable:f.amortTable||[],
    insuranceMonthly:fv(f.insuranceMonthly),insurancePNO:fv(f.insurancePNO),insuranceGLI:fv(f.insuranceGLI),insuranceMultirisque:fv(f.insuranceMultirisque),
    chargeCopro:fv(f.chargeCopro),chargeTF:fv(f.chargeTF),chargeTEOM:fv(f.chargeTEOM),chargeGestion:fv(f.chargeGestion),
    chargeHonEntree:fv(f.chargeHonEntree),chargeHonSortie:fv(f.chargeHonSortie),
    charges:S.fc.filter(c=>c.label||c.amount>0),
    monthlyRent:fv(f.monthlyRent),occupancyRate:fv(f.occupancyRate)||95,
    rentalStartDate:f.rentalStartDate||null,
    bailType:f.bailType||null,bailStartDate:f.bailStartDate||null,bailEndDate:f.bailEndDate||null,
    bailRenewalDate:f.bailRenewalDate||null,bailNoticePeriod:f.bailNoticePeriod||null,bailDeposit:fv(f.bailDeposit),
    saleDate:f.saleDate||null,salePrice:f.salePrice?fv(f.salePrice):null,saleFees:fv(f.saleFees),
    marketValue:f.marketValue?fv(f.marketValue):null};
  if(eid&&eid!=='null'){const i=S.props.findIndex(p=>p.id===eid);if(i>=0)S.props[i]={...S.props[i],...fd,docs:S.props[i].docs||[]};toast('Modifications enregistrées','s')}
  else{S.props.push({id:uid(),...fd,docs:[]});toast('Bien ajouté avec succès','s')}
  save();S.view='properties';S.showDetail=false;render();
}

function toast(m,t){S.toast={m,t};render();setTimeout(()=>{S.toast=null;render()},3000)}

loadData().then(()=>render()).catch(()=>render());
render(); // premier rendu immédiat avant sync
</script>
